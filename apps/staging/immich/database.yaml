apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db-staging-cnpg-v1
  namespace: immich-stage
spec:
  description: Postgres cluster for Immich — pgvecto.rs → VectorChord migration window (RECOVERY MODE)
  # ==========================================================================
  # OPERATOR-GATED — see docs/operations/2026-07-02-immich-v3-upgrade.md.
  # Migrate STAGING first (soak before prod). This "migration" image bundles
  # BOTH pgvecto.rs (vectors.so) AND VectorChord (vchord.so) + pgvector so the
  # existing pgvecto.rs vector columns stay readable while Immich (still v2.7.5)
  # rebuilds them as VectorChord. Rolling to this image only ADDS vchord.so —
  # non-destructive on its own. Do NOT bump immich to v3.0.1 until the
  # VectorChord migration here is verified. DROP EXTENSION vectors is one-way.
  # ==========================================================================
  # Official VectorChord-only image (Phase 2; config dropped vectors.so in Phase 1).
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16-0.4.2@sha256:649da2df5f079dd1f214e3a877cafd0208eff3779e9c60d14d243fbca5e11c97

  instances: 3

  enableSuperuserAccess: true

  inheritedMetadata:
    labels:
      app: immich-database
      env: staging
      policy-type: "database"

  monitoring:
    enablePodMonitor: true

  storage:
    # Target standard = 10Gi (mirror of prod). BUT this MUST stay at the live size
    # (20Gi) until the staging DB Cluster is actually recreated — CNPG's admission
    # webhook REJECTS a spec whose size is < the live PVCs ("can't shrink existing
    # storage"), which blocks the ENTIRE apps-staging reconcile (learned the hard
    # way 2026-07-03 — #1028 set 10Gi against a live 20Gi and broke reconcile).
    # To reach 10Gi: destroy + recreate the Cluster (disposable data), and set 10Gi
    # HERE in the same change. See docs/operations/apps/immich.md §10.
    storageClass: truenas-iscsi
    size: 20Gi

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

  # Prefer high-airflow worker nodes (cpu-tier=high). See production
  # database.yaml for rationale. Soft preference — 3 replicas across 2
  # labeled nodes means one replica lands elsewhere, which is fine.
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: homelab.gjcourt.dev/cpu-tier
                operator: In
                values:
                  - high
  # Cross-cluster spread: see apps/production/golinks/database.yaml for
  # full rationale. Soft (ScheduleAnyway) balance of CNPG postgres pods
  # across nodes via topologySpreadConstraints.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          policy-type: database

  postgresql:
    # Both preloaded during the migration window (see prod database.yaml).
    # VectorChord-only end state (migration complete; `vectors` dropped).
    shared_preload_libraries:
      - "vchord.so"
    parameters:
      search_path: '"$user", public'

  # WAL archiving and base backups via the Barman Cloud Plugin (v0.11.0).
  # S3 configuration is defined in objectstore.yaml (ObjectStore CRD).
  # History:
  #   v3 — clean slate after v2 broke (barman-cloud-check-wal-archive "Expected empty archive")
  #   v4 — bumped after disaster recovery test on 2026-04-18; v4 is the live WAL path post-recovery.
  #        During recovery, the WAL archiver serverName MUST differ from the restore source
  #        serverName because barman-cloud-check-wal-archive requires an empty destination.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: immich-db-staging-cnpg-v1-backup
        serverName: immich-db-staging-cnpg-v1-v4

  # This cluster was rebuilt from backup during disaster recovery on 2026-04-18.
  # CNPG bootstrap mode is creation-time state: once the live cluster exists in
  # recovery mode, Git must continue to describe bootstrap.recovery rather than
  # reverting to initdb, or server-side dry-run/apply will fail with:
  # "Only one bootstrap method can be specified at a time".
  bootstrap:
    recovery:
      source: immich-db-backup

  # externalClusters references the ObjectStore via the plugin for PITR/restore.
  # During normal operation: points to v4 (current WAL path) for replica clone bootstrap.
  # During disaster recovery: change to point at the last-known-good serverName (e.g. v4)
  #   while setting the WAL archiver serverName to v5 (incremented, fresh empty path).
  externalClusters:
    - name: immich-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: immich-db-staging-cnpg-v1-backup
          serverName: immich-db-staging-cnpg-v1-v4
