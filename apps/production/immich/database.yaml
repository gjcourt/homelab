apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db-prod-cnpg-v3
  namespace: immich-prod
spec:
  description: Postgres cluster for Immich — pgvecto.rs → VectorChord migration window
  # ==========================================================================
  # OPERATOR-GATED — DO NOT let this reconcile blindly. Part of the Immich v3
  # upgrade (pgvecto.rs is removed in Immich v3.0). Full procedure + ordering:
  #   docs/operations/2026-07-02-immich-v3-upgrade.md
  #
  # This "migration" image bundles BOTH pgvecto.rs (vectors.so) AND VectorChord
  # (vchord.so) + pgvector, so the cluster can still READ the existing
  # pgvecto.rs vector columns while Immich (still on v2.7.5, which supports
  # both) rebuilds the indexes as VectorChord on startup. Rolling to this image
  # is NON-destructive on its own (it only ADDS vchord.so; nothing is dropped).
  #
  # ORDERING (see runbook): (1) back up + verify restore, (2) apply THIS image +
  # vchord.so preload while Immich is STILL v2.7.5, (3) CREATE EXTENSION vchord
  # + let immich-server auto-migrate/reindex, (4) verify search, (5) DROP
  # EXTENSION vectors + drop vectors.so, (6) ONLY THEN bump immich-server/-ml to
  # v3.0.1. Immich v3 has NO pgvecto.rs support and will NOT perform the
  # pgvecto.rs→VectorChord data migration — it must be done on v2.x first.
  # The DROP EXTENSION vectors step is ONE-WAY: no downgrade below Immich 1.133.
  # ==========================================================================
  imageName: ghcr.io/corentingiraud/cnpg-pgvector-vectorchord:16-migration@sha256:0e4f45d3eacbb948d2f9d229b1cf9018502568bf26b912b9babe77fdf6f5992a
  instances: 3
  enableSuperuserAccess: true
  inheritedMetadata:
    labels:
      app: immich-database
      env: production
      policy-type: "database"
  monitoring:
    enablePodMonitor: true
  storage:
    # Bumped 2Gi → 10Gi (2026-07-03): replica -4 hit 99% (0 bytes free), firing
    # KubePersistentVolumeFillingUp (critical). 2Gi left no WAL/temp headroom over the
    # ~1.1Gi dataset (WAL on -4 had grown to ~2Gi). CNPG expands in place online here
    # (resizeInUseVolumes=true + truenas-iscsi allowVolumeExpansion + democratic-csi
    # v1.9.5 online resize, PR #1019). NOTE: shrinking still needs cluster recreation.
    size: 10Gi
    storageClass: truenas-iscsi
  postgresql:
    # Both preloaded during the migration window so existing pgvecto.rs columns
    # stay readable while VectorChord is introduced. Post-migration (runbook
    # step 5) drop back to just "vchord.so" and remove the vectors search_path.
    shared_preload_libraries:
      - "vectors.so"
      - "vchord.so"
    parameters:
      search_path: '"$user", public, vectors'
  # WAL archiving and base backups via the Barman Cloud Plugin (v0.11.0).
  # S3 configuration is defined in objectstore.yaml (ObjectStore CRD).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: immich-db-prod-cnpg-v3-backup
        serverName: immich-db-prod-cnpg-v3
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-credentials
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vectors;
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;
        - GRANT ALL ON SCHEMA vectors TO immich;
        - GRANT ALL ON ALL TABLES IN SCHEMA vectors TO immich;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA vectors GRANT ALL ON TABLES TO immich;
  # externalClusters references the ObjectStore via the plugin for PITR/restore.
  externalClusters:
    - name: immich-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: immich-db-prod-cnpg-v3-backup
          serverName: immich-db-prod-cnpg-v3
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  # Prefer high-airflow worker nodes (cpu-tier=high) to co-locate the
  # postgres replicas with the immich-server pods and keep heat off the
  # warmer control-plane nodes. Soft preference — falls back to other
  # nodes when needed (drain, NotReady, replica count > labeled nodes).
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: homelab.gjcourt.dev/cpu-tier
                operator: In
                values:
                  - high
  # Cross-cluster spread: see apps/production/golinks/database.yaml for
  # full rationale. Soft (ScheduleAnyway) balance of CNPG postgres pods
  # across nodes via topologySpreadConstraints.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          policy-type: database
