apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: golinks-db-staging-cnpg-v1
  namespace: golinks-stage
spec:
  description: Postgres cluster for the golinks application
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 3
  inheritedMetadata:
    labels:
      app: golinks-database
      env: staging
      policy-type: "database"
  monitoring:
    enablePodMonitor: true
  # Cross-cluster anti-affinity: see apps/production/golinks/database.yaml
  # for full rationale. Soft (weight=50) preference to land new pods on
  # nodes that don't already host other CNPG postgres pods.
  affinity:
    additionalPodAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          podAffinityTerm:
            labelSelector:
              matchLabels:
                policy-type: database
            topologyKey: kubernetes.io/hostname
  storage:
    size: 2Gi
  # WAL archiving and base backups via the Barman Cloud Plugin (v0.11.0).
  # S3 configuration is defined in objectstore.yaml (ObjectStore CRD).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: golinks-db-staging-cnpg-v1-backup
        serverName: golinks-db-staging-cnpg-v1
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: golinks-db-credentials
  # externalClusters references the ObjectStore via the plugin for PITR/restore.
  externalClusters:
    - name: golinks-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: golinks-db-staging-cnpg-v1-backup
          serverName: golinks-db-staging-cnpg-v1
