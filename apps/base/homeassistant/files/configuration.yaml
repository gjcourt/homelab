# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Lovelace runs in storage mode (the default). All dashboards (Map, Floor Plan,
# Switchboard, Control) are registered in /config/.storage/lovelace_dashboards
# and edited via the HA UI's Lovelace editor. We do not register any YAML-mode
# dashboards from this file: HA's slug validator hard-rejects single-word slugs
# like `control` / `switchboard`, and `mode: yaml` in the storage registry is
# silently ignored (HA always uses LovelaceStorage for storage-registered
# dashboards regardless of the `mode` field).

# Bathroom-fan auto-off helpers. Each bathroom has:
#   timer.<name>_fan_timer       — counts down once the switch flips on
#   input_number.<name>_fan_minutes — operator-configurable timeout per bathroom
# The auto-off automation in automations.yaml ties them to the corresponding
# Lutron Caseta switch entities (switch.<name>_exhaust_fan).
input_number:
  hall_bathroom_fan_minutes:
    name: Hall Bathroom Fan Timer
    min: 5
    max: 120
    step: 5
    initial: 30
    unit_of_measurement: min
    mode: slider
  master_bathroom_fan_minutes:
    name: Master Bathroom Fan Timer
    min: 5
    max: 120
    step: 5
    initial: 30
    unit_of_measurement: min
    mode: slider
  powder_bathroom_fan_minutes:
    name: Powder Bathroom Fan Timer
    min: 5
    max: 120
    step: 5
    initial: 30
    unit_of_measurement: min
    mode: slider

timer:
  hall_bathroom_fan_timer:
    name: Hall Bathroom Fan Timer
  master_bathroom_fan_timer:
    name: Master Bathroom Fan Timer
  powder_bathroom_fan_timer:
    name: Powder Bathroom Fan Timer

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
binary_sensor: !include binary_sensors.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 10.244.0.0/16  # Trust Cluster Pod CIDR
    - 10.42.2.0/24 # Trust Node Network (Envoy HostNetwork)
    - 127.0.0.1
