---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: overture
  namespace: overture
  labels:
    app.kubernetes.io/name: overture
    app.kubernetes.io/part-of: network-policies
spec:
  description: Gateway ingress on 8080; egress DNS + CNPG PostgreSQL + external Ethereum RPC (tempo-bridge).
  endpointSelector:
    matchLabels:
      app: overture
  ingress:
    - fromEntities:
        - host
        - remote-node
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            cnpg.io/podRole: instance
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # tempo-bridge makes HTTPS calls to the Moderato/Tempo Ethereum RPC
    # (rpc.moderato.tempo.xyz) and ghcr.io at startup. Without this rule
    # Cilium drops all outbound HTTPS and the container OOM-kills on retry storms.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
