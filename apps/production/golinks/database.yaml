apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: golinks-db-production-cnpg-v1
  namespace: golinks-prod
spec:
  description: Postgres cluster for the golinks application (production)
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 3
  inheritedMetadata:
    labels:
      app: golinks-database
      env: production
      policy-type: "database"
  monitoring:
    enablePodMonitor: true
  # Cross-cluster spread: balance CNPG postgres pods (label
  # `policy-type: database`, inherited by every CNPG pod via
  # inheritedMetadata.labels) across nodes. Unlike pod anti-affinity (which
  # is binary per term — a node either has a matching pod or it doesn't, so
  # offers no spreading signal once every node has at least one), topology
  # spread constraints count pods and enforce `maxSkew`. With ~33 CNPG pods
  # across 6 nodes, the scheduler aims for 5-6 per node. `ScheduleAnyway`
  # keeps it a soft preference so pods don't go Pending when perfect spread
  # isn't possible. This is additive to the CNPG-default intra-cluster
  # anti-affinity (spreads this cluster's own 3 replicas across nodes).
  #
  # Observed behavior (2026-05-14 rebalance attempt): this constraint does
  # NOT reactively rebalance already-placed pods. Rolling restarts of every
  # CNPG cluster (kubectl cnpg restart) and explicit delete-and-recreate
  # both left the distribution byte-for-byte unchanged at 10/10/8/4/2/2.
  # Pods went through the default scheduler (not nodeName-pinned), but
  # `ScheduleAnyway` lost to other scoring factors — probably some mix of
  # the intra-cluster anti-affinity (weight 100), the iSCSI CSI driver's
  # volume-locality hints, and the BalancedAllocation plugin. Kept here as
  # a hint for future pod creations (new clusters, scale-ups). When a
  # specific pod actually needs to move now, use explicit `nodeAffinity`
  # (see apps/production/immich/database.yaml for the cpu-tier=high
  # pattern that did successfully steer immich-prod onto cool nodes).
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          policy-type: database
  storage:
    # Actual usage: ~488Mi; target = 20% headroom → 1Gi.
    # Requires cluster recreation (CNPG cannot shrink PVCs in-place).
    size: 1Gi
  # WAL archiving and base backups via the Barman Cloud Plugin (v0.11.0).
  # S3 configuration is defined in objectstore.yaml (ObjectStore CRD).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: golinks-db-production-cnpg-v1-backup
        serverName: golinks-db-production-cnpg-v1
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: golinks-db-credentials
  # externalClusters references the ObjectStore via the plugin for PITR/restore.
  externalClusters:
    - name: golinks-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: golinks-db-production-cnpg-v1-backup
          serverName: golinks-db-production-cnpg-v1
