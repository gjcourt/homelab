apiVersion: apps/v1
kind: Deployment
metadata:
  name: changes
  namespace: changes
  labels:
    app: changes
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: changes
  template:
    metadata:
      labels:
        app: changes
    spec:
      serviceAccountName: changes
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: changes
          # Public image (ghcr package set to public); no imagePullSecret needed.
          image: ghcr.io/gjcourt/changes:2026-06-25
          ports:
            - containerPort: 8080
          # No env: WEB_DIR=/web is baked into the image; the corpus is embedded
          # in the binary, so there is no database or external dependency.
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 96Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
