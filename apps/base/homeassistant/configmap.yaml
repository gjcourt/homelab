apiVersion: v1
kind: ConfigMap
metadata:
  name: homeassistant-config
  namespace: homeassistant
data:
  configuration.yaml: |
    # Loads default set of integrations. Do not remove.
    default_config:

    # Load frontend themes from the themes folder
    frontend:
      themes: !include_dir_merge_named themes

    # Enable YAML dashboards (loads *.yaml from /config/dashboards/)
    lovelace:
      mode: yaml

    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml
    binary_sensor: !include binary_sensors.yaml

    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.244.0.0/16  # Trust Cluster Pod CIDR
        - 10.42.2.0/24 # Trust Node Network (Envoy HostNetwork)
        - 127.0.0.1
  binary_sensors.yaml: |
    # Time-of-day sensors — used by nightlight and thermostat automations.
    # Note: workday sensor must be configured via the UI (no longer supports YAML platform setup).
    - platform: tod
      name: Night
      after: sunset
      before: sunrise

    - platform: tod
      name: Day
      after: sunrise
      before: sunset

  automations.yaml: |
    # ============================================================================
    # Bathroom fan auto-off timer
    # ============================================================================
    # NOTE: Do NOT wrap in 'automation:' key here. Since configuration.yaml
    # already has 'automation: !include automations.yaml', the included file
    # must be a bare list of automation objects.
    - alias: "Bathroom fan auto-off — start timer"
      description: "When a bathroom fan turns on, start a timer. Turns fan off when timer expires."
      trigger:
        - platform: state
          entity_id:
            - fan.*
          from: "off"
          to: "on"
      condition:
        # Only bathroom fans
        - condition: template
          value_template: >
            {{ "bathroom" in trigger.to_state.entity_id | lower or
               "bath" in trigger.to_state.entity_id | lower }}
      action:
        - variables:
            # Extract bathroom name from entity ID
            # fan.bathroom_main_fan → bathroom_main
            # fan.bath_guest_fan → bath_guest
            fan_name: >
              {{ trigger.to_state.object_id
                 | replace("_fan", "")
                 | replace("fan_", "") }}
            helper_id: >
              {{ "input_text." ~ fan_name ~ "_timer" }}
            timer_entity: >
              {{ "timer." ~ fan_name ~ "_fan_timer" }}
            delay_minutes: >
              {{ states(helper_id) | default("30") | int(30) }}
            delay_seconds: "{{ delay_minutes * 60 }}"
        # Start the timer with configured duration
        - service: timer.start
          target:
            entity_id: "{{ timer_entity }}"
          data:
            duration: "{{ delay_seconds }}"
      mode: restart

    - alias: "Bathroom fan auto-off — turn off fan"
      description: "When a bathroom fan timer expires, turn off the fan."
      trigger:
        - platform: event
          event_type: timer.finished
      condition:
        # Only bathroom fan timers (not other timers in the house)
        - condition: template
          value_template: >
            {{ "timer.bathroom_" in trigger.event.data.entity_id | lower or
               "timer.bath_" in trigger.event.data.entity_id | lower }}
      action:
        - variables:
            # Derive fan entity ID from timer entity ID
            # timer.bathroom_main_fan_timer → fan.bathroom_main_fan
            fan_entity: >
              {{ trigger.event.data.entity_id
                 | replace("timer.", "fan.")
                 | replace("_fan_timer", "_fan") }}
        # Turn off the fan
        - service: fan.turn_off
          target:
            entity_id: "{{ fan_entity }}"
          continue_on_error: true
  control.yaml: |
    # Bathroom Fan Control Dashboard
    #
    # A controlplane dashboard for bathroom fan timers.
    # Shows all bathroom fan timers, their state, and allows manual control.
    #
    # Setup per bathroom (after creating helpers via HA UI):
    #   1. Add a section below for the new bathroom
    #   2. Copy one of the existing <bathroom> sections
    #   3. Replace <bathroom> with the bathroom name
    #   4. Replace the fan entity ID with the actual fan entity
    #
    # Example for a 4th bathroom:
    #   - type: vertical-stack
    #     cards:
    #       - type: entity
    #         entity: timer.bathroom_4th_fan_timer
    #       - type: button
    #         entity: timer.bathroom_4th_fan_timer
    #         name: Cancel Timer
    #         tap_action:
    #           action: call-service
    #           service: timer.cancel
    #           service_data:
    #             entity_id: timer.bathroom_4th_fan_timer
    #       - type: entity
    #         entity: fan.bathroom_4th_fan
    #       - type: button
    #         entity: fan.bathroom_4th_fan
    #         name: Turn Off
    #         tap_action:
    #           action: call-service
    #           service: fan.turn_off
    #           service_data:
    #             entity_id: fan.bathroom_4th_fan

    title: Control
    views:
      - title: Control
        badges: []
        cards:
          # ========================================================================
          # Header
          # ========================================================================
          - type: heading
            heading: Bathroom Fan Timers
            heading_size: h2

          - type: markdown
            content: >
              **How it works:** When a bathroom fan turns on, a timer starts.
              When the timer expires, the fan turns off.
              Adjust the delay per bathroom using the input helper.

          # ========================================================================
          # Bathroom Main
          # ========================================================================
          - type: vertical-stack
            cards:
              - type: heading
                heading: Main Bathroom
                heading_size: h3

              - type: horizontal-stack
                cards:
                  - type: entity
                    entity: timer.bathroom_main_fan_timer
                    name: Timer
                    state_color: true
                  - type: entity
                    entity: input_text.bathroom_main_timer
                    name: Delay (min)
                    state_color: false

              - type: horizontal-stack
                cards:
                  - type: button
                    entity: timer.bathroom_main_fan_timer
                    name: Cancel Timer
                    show_icon: false
                    tap_action:
                      action: call-service
                      service: timer.cancel
                      data:
                        entity_id: timer.bathroom_main_fan_timer
                    show_name: true
                  - type: entity
                    entity: fan.bathroom_main_fan
                    name: Fan
                    state_color: true

              - type: button
                entity: fan.bathroom_main_fan
                name: Turn Off Fan
                show_icon: false
                tap_action:
                  action: call-service
                  service: fan.turn_off
                  data:
                    entity_id: fan.bathroom_main_fan
                show_name: true

          # ========================================================================
          # Bathroom Guest
          # ========================================================================
          - type: vertical-stack
            cards:
              - type: heading
                heading: Guest Bathroom
                heading_size: h3

              - type: horizontal-stack
                cards:
                  - type: entity
                    entity: timer.bathroom_guest_fan_timer
                    name: Timer
                    state_color: true
                  - type: entity
                    entity: input_text.bathroom_guest_timer
                    name: Delay (min)
                    state_color: false

              - type: horizontal-stack
                cards:
                  - type: button
                    entity: timer.bathroom_guest_fan_timer
                    name: Cancel Timer
                    show_icon: false
                    tap_action:
                      action: call-service
                      service: timer.cancel
                      data:
                        entity_id: timer.bathroom_guest_fan_timer
                    show_name: true
                  - type: entity
                    entity: fan.bathroom_guest_fan
                    name: Fan
                    state_color: true

              - type: button
                entity: fan.bathroom_guest_fan
                name: Turn Off Fan
                show_icon: false
                tap_action:
                  action: call-service
                  service: fan.turn_off
                  data:
                    entity_id: fan.bathroom_guest_fan
                show_name: true

          # ========================================================================
          # Bathroom Master
          # ========================================================================
          - type: vertical-stack
            cards:
              - type: heading
                heading: Master Bathroom
                heading_size: h3

              - type: horizontal-stack
                cards:
                  - type: entity
                    entity: timer.bathroom_master_fan_timer
                    name: Timer
                    state_color: true
                  - type: entity
                    entity: input_text.bathroom_master_timer
                    name: Delay (min)
                    state_color: false

              - type: horizontal-stack
                cards:
                  - type: button
                    entity: timer.bathroom_master_fan_timer
                    name: Cancel Timer
                    show_icon: false
                    tap_action:
                      action: call-service
                      service: timer.cancel
                      data:
                        entity_id: timer.bathroom_master_fan_timer
                    show_name: true
                  - type: entity
                    entity: fan.bathroom_master_fan
                    name: Fan
                    state_color: true

              - type: button
                entity: fan.bathroom_master_fan
                name: Turn Off Fan
                show_icon: false
                tap_action:
                  action: call-service
                  service: fan.turn_off
                  data:
                    entity_id: fan.bathroom_master_fan
                show_name: true
