# LAN-only front door: https://finance.burntbytes.com via the Cilium gateway.
# The gateway's *.burntbytes.com listener already terminates TLS with the
# wildcard cert, and internal DNS resolves *.burntbytes.com to the gateway's
# LAN IP — so no per-host DNS or cert change is needed. Not tunneled = LAN-only.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: finance-dashboard-http
  namespace: finance-dashboard
spec:
  hostnames:
    - finance.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: finance-dashboard-https
  namespace: finance-dashboard
spec:
  hostnames:
    - finance.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: https
  rules:
    - backendRefs:
        - name: finance-dashboard
          port: 8080
