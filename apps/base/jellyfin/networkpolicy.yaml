---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: network-policies
spec:
  description: Gateway ingress on 8096; egress DNS + HTTPS for metadata (TMDB, fanart.tv).
  endpointSelector:
    matchLabels:
      app: jellyfin
  ingress:
    - fromEntities:
        - host
        - remote-node
        - ingress
      toPorts:
        - ports:
            - port: "8096"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # External metadata providers: TMDB, fanart.tv, MusicBrainz, etc.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
