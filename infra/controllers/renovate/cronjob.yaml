apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "@hourly"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate@sha256:80667f4688bfa825e993e711714ad0ef4d7577f0fa7923c7d7598e42b8ff49d6

              args:
                - gjcourt/homelab
                - gjcourt/llmux
                - gjcourt/tempo-interview
                - gjcourt/drift
                - gjcourt/Pingo
                - gjcourt/golinks
                - gjcourt/vitals
                - gjcourt/soundbyte
                - gjcourt/python-nginx-signing

              envFrom:
                - configMapRef:
                    name: renovate-container-env
                - secretRef:
                    name: secret-renovate-container-env

          restartPolicy: Never
