apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes-callee-prod
resources:
  - ../../base/hermes-callee/

labels:
  - pairs:
      env: production
      app.kubernetes.io/instance: production
    includeSelectors: false

patches:
  - target:
      kind: Namespace
      name: hermes-callee
    patch: |
      - op: replace
        path: /metadata/name
        value: hermes-callee-prod
