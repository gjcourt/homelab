apiVersion: apps/v1
kind: Deployment
metadata:
  name: memos
  namespace: memos
  labels:
    app: memos
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: memos
  # Single-replica Deployment with an RWO data PVC.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: memos
    spec:
      serviceAccountName: memos
      automountServiceAccountToken: false
      # App runs as the upstream `nonroot` user (UID/GID 10001) per the Memos
      # Dockerfile (https://github.com/usememos/memos/blob/main/scripts/Dockerfile).
      # The entrypoint chown's /var/opt/memos only when started as root; running
      # as 10001 directly skips that branch and execs the binary, so the
      # readOnlyRootFilesystem container securityContext is safe. fsGroup is
      # set to 10001 so the data PVC is group-owned by the app's group.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: memos
          image: neosmemo/memos:0.28.0@sha256:06066de94333c091ee67c2ad5dec5f15bf5f35b31498c90092f9915dd05e9f92
          ports:
            - containerPort: 5230

          envFrom:
            - configMapRef:
                name: memos-container-env

          volumeMounts:
            - name: memos-data
              mountPath: /var/opt/memos
            # Go binary + entrypoint shell script need a writable /tmp
            # (tempfile uploads, intermediate files); required when
            # readOnlyRootFilesystem is enabled.
            - name: tmp
              mountPath: /tmp

          readinessProbe:
            httpGet:
              path: /healthz
              port: 5230
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5230
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      volumes:
        - name: memos-data
          persistentVolumeClaim:
            claimName: memos-data-pvc
        - name: tmp
          emptyDir: {}
