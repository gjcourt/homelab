apiVersion: v1
kind: Service
metadata:
  name: finance-dashboard
  namespace: finance-dashboard
  labels:
    app: finance-dashboard
spec:
  # ClusterIP — the LAN gateway (HTTPRoute → https://finance.burntbytes.com)
  # routes to it. Fallback for debugging without DNS:
  #   kubectl -n finance-dashboard port-forward svc/finance-dashboard 8080:8080
  type: ClusterIP
  selector:
    app: finance-dashboard
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
