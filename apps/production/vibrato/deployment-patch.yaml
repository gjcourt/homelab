apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:75a4506d66ada33ed5a75d089b53c498546b49eb
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
