- Infrastructure:
    - Home Assistant:
        icon: home-assistant.png
        href: https://hass.burntbytes.com
        description: Home automation platform
        siteMonitor: https://hass.burntbytes.com
    - AdGuard Home:
        icon: adguard-home.png
        href: https://adguard.burntbytes.com
        description: DNS ad blocker
        siteMonitor: https://adguard.burntbytes.com
        widget:
          type: adguard
          # Cluster-internal Service URL avoids the gateway round-trip
          # and TLS termination just for widget polling.
          url: http://adguard-admin.adguard-prod.svc.cluster.local:8080
          username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
    - Hestia:
        icon: truenas-scale.png
        href: https://hestia.burntbytes.com
        # Originally provisioned as a GPU server (RTX 4090, vLLM) but the
        # GPU was removed and sold 2026-05-10. Hestia is now a
        # TrueNAS storage server, primarily backing democratic-csi-provisioned
        # iSCSI volumes for the cluster.
        description: TrueNAS storage server (iSCSI for cluster PVCs)
        # TrueNAS root emits a scheme-downgrading 302 → http://hestia.../ui/
        # which homepage's siteMonitor renders as HTTP 500. /ui/ returns 200
        # directly in one hop.
        siteMonitor: https://hestia.burntbytes.com/ui/
    - Zigbee2MQTT:
        icon: zigbee2mqtt.png
        href: https://zigbee.burntbytes.com
        description: Zigbee to MQTT Bridge
        siteMonitor: https://zigbee.burntbytes.com
    - Authelia:
        icon: mdi-shield-account
        href: https://auth.burntbytes.com
        description: Authentication portal (SSO)
        siteMonitor: https://auth.burntbytes.com
    - Pingo:
        icon: mdi-dns
        href: https://vpn.burntbytes.com
        description: DNS updater for vpn.burntbytes.com
        # No siteMonitor: pingo is a CronJob (DNS updater for vpn.burntbytes.com),
        # not an HTTP service — there is no HTTPRoute for vpn.burntbytes.com,
        # so any probe returns 404 from the gateway. The href stays clickable
        # for the operator; the dashboard simply omits the status dot.

- Monitoring:
    - Grafana:
        icon: grafana.png
        href: https://grafana.burntbytes.com
        description: Metrics dashboard
        siteMonitor: https://grafana.burntbytes.com
    - Cluster Resources:
        icon: prometheus.png
        href: "#"
        description: Real-time cluster metrics
        widget:
          type: prometheusmetric
          url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          metrics:
            - label: "CPU (%)"
              query: '100 * sum(rate(container_cpu_usage_seconds_total{container!="POD",image!=""}[5m])) / sum(kube_node_status_allocatable{resource="cpu",unit="core"})'
              format:
                type: number
                options:
                  maximumFractionDigits: 1
            - label: "Mem (%)"
              query: '100 * sum(container_memory_working_set_bytes{container!="POD",image!=""}) / sum(kube_node_status_allocatable{resource="memory",unit="byte"})'
              format:
                type: number
                options:
                  maximumFractionDigits: 1
            - label: "PVC (%)"
              query: '100 * sum(kubelet_volume_stats_used_bytes{persistentvolumeclaim!=""}) / sum(kubelet_volume_stats_capacity_bytes{persistentvolumeclaim!=""})'
              format:
                type: number
                options:
                  maximumFractionDigits: 1
