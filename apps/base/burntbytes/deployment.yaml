apiVersion: apps/v1
kind: Deployment
metadata:
  name: burntbytes
  namespace: burntbytes
  labels:
    app: burntbytes
spec:
  # Two replicas: this serves the public apex (burntbytes.com), so spread
  # across nodes for zero-downtime rollouts and single-node resilience.
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: burntbytes
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: burntbytes
    spec:
      serviceAccountName: burntbytes
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-secret
      # Spread the two replicas across nodes where possible; ScheduleAnyway
      # so a single-schedulable-node window doesn't block rollout.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: burntbytes
      securityContext:
        # nginx-unprivileged runs as uid 101 by default; match it here so the
        # container's /tmp + cache emptyDirs are owned correctly.
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: burntbytes
          image: ghcr.io/gjcourt/burntbytes:2026-06-10-29cc91a
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          # Probe pattern per docs/operations/2026-05-02-adding-an-app.md:
          # readiness HTTP-tight, liveness tcpSocket-loose so the two can't
          # co-restart the pod off a single flap.
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          # nginx-unprivileged writes its pid + temp paths under /tmp and
          # caches under /var/cache/nginx; mount emptyDirs so
          # readOnlyRootFilesystem doesn't break startup.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
