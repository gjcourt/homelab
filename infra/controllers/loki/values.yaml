deploymentMode: SingleBinary

# Cluster-critical: Loki holds the cluster log archive; eviction during a
# pinch loses ingestion until reschedule.
global:
  priorityClassName: system-cluster-critical

loki:
  auth_enabled: false
  limits_config:
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    # Retain logs for 7 days then delete via the compactor. 30d did NOT fit the
    # 40Gi filesystem PVC — it filled to 100%, which wedges Loki (a full disk
    # means it can't start, so the compactor can't run to free space → permanent
    # CrashLoop). 7d holds ~24Gi (~60%) in practice. With filesystem storage,
    # retention MUST be sized to the PVC. See the 2026-06-24 incident doc.
    retention_period: 7d
  commonConfig:
    replication_factor: 1
  storage:
    type: 'filesystem'
  # Enable the compactor's retention enforcement. The compactor runs
  # periodically to delete chunks older than limits_config.retention_period.
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
  schemaConfig:
    configs:
      - from: 2024-04-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  # Ruler config: enables the built-in Loki ruler component to evaluate LogQL
  # alerting rules and forward firing alerts to Alertmanager.
  # Rules are mounted from the loki-alerting-rules ConfigMap at the path
  # expected by storage.local.directory (/var/loki/rules/<tenant_id>/).
  rulerConfig:
    storage:
      type: local
      local:
        # auth_enabled: false → tenant ID is "fake"
        directory: /var/loki/rules
    rule_path: /var/loki/rules-temp
    alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
    ring:
      kvstore:
        store: inmemory
    enable_api: true
    enable_alertmanager_v2: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: truenas-iscsi
    size: 40Gi
    # Do NOT auto-delete the data PVC when the StatefulSet is scaled down or
    # deleted. The chart default deletes it (whenScaled/whenDeleted: Delete),
    # so a routine `scale --replicas=0` destroys the log archive. The PV is
    # Retain, so it's recoverable, but that's a footgun — keep the PVC.
    enableStatefulSetAutoDeletePVC: false
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 512Mi
  # Mount the loki-alerting-rules ConfigMap into the pod at the path that
  # matches rulerConfig.storage.local.directory + the "fake" tenant directory.
  extraVolumes:
    - name: loki-rules
      configMap:
        name: loki-alerting-rules
  extraVolumeMounts:
    - name: loki-rules
      mountPath: /var/loki/rules/fake
      readOnly: true

# Disable unused components for single binary mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

chunksCache:
  enabled: false

resultsCache:
  enabled: false

gateway:
  enabled: false

test:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
