# Deployment patches for production - GPU acceleration and database connection
# Immich v2.x requires IMMICH_CONFIG_FILE for OAuth settings. An init container
# injects the client_secret from the immich-sso-secret into the config template.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
spec:
  template:
    spec:
      # Authelia OIDC issuerUrl must resolve from within the pod.
      # AdGuard DNS rewrites are not visible to CoreDNS, so we add
      # a hostAlias pointing at the production gateway.
      hostAliases:
        - ip: "10.42.2.40"
          hostnames:
            - auth.burntbytes.com
      securityContext:
        supplementalGroups:
          - 44 # video group
          - 100 # users group
          - 109 # render group
      initContainers:
        - name: oauth-config
          # busybox 1.37
          image: busybox@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            - sh
            - -c
            - |
              sed "s/__CLIENT_SECRET_PLACEHOLDER__/${CLIENT_SECRET}/g" \
                /config-template/immich-config.yaml > /config/immich-config.yaml
          env:
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: immich-sso-secret
                  key: client_secret
          volumeMounts:
            - name: oauth-config-template
              mountPath: /config-template
              readOnly: true
            - name: oauth-config
              mountPath: /config
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: immich-server
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
          env:
            # Hardware Acceleration for AMD
            - name: LIBVA_DRIVER_NAME
              value: radeonsi
            - name: LIBVA_DRIVERS_PATH
              value: /usr/lib/jellyfin-ffmpeg/lib/dri
            # Database connection - use CNPG service and credentials secret
            - name: DB_HOSTNAME
              value: immich-db-prod-cnpg-v3-rw.immich-prod.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: password
            # Immich v2.x config file for OAuth/OIDC settings
            - name: IMMICH_CONFIG_FILE
              value: "/etc/immich/immich-config.yaml"
          volumeMounts:
            - name: upload
              mountPath: /usr/src/app/upload
            - name: photos
              mountPath: /mnt/photos
            - name: dri
              mountPath: /dev/dri
            - name: oauth-config
              mountPath: /etc/immich
              readOnly: true
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "8000m"
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: upload
          persistentVolumeClaim:
            claimName: immich-upload-pvc
        - name: photos
          persistentVolumeClaim:
            claimName: immich-photos-pvc
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: oauth-config-template
          configMap:
            name: immich-oauth-config
        - name: oauth-config
          emptyDir: {}
---
# Machine Learning with GPU acceleration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  # Fan-out: 4 ML replicas, one per AMD-iGPU node (all 4 have the amdgpu
  # extension). immich-server load-balances ML jobs across them, so smart-search
  # + face-detection run on all 4 iGPUs (ROCm) instead of one.
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxSurge:0 — never create a 5th ML pod. With replicas==node-count(4) and
      # only-soft anti-affinity, a surge pod would have to double up on a node
      # that already runs an ML replica, putting two privileged ROCm pods on one
      # /dev/dri iGPU. Drain-one-then-replace instead (one iGPU idle mid-roll).
      maxSurge: 0
      maxUnavailable: 1
  template:
    spec:
      # Soft (preferred) pod anti-affinity spreads the 4 replicas one-per-node.
      # Kept soft on purpose: this cluster loses nodes often (Talos upgrades,
      # maintenance) and replicas==node-count, so a `required` rule would leave
      # the 4th replica Pending whenever a node is down — soft lets it double up
      # and keep serving instead. The base's soft nodeAffinity (prefer
      # cpu-tier=high) still nudges one toward kot-7x7.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: immich
                    component: machine-learning
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        supplementalGroups:
          - 44 # video group
          - 109 # render group
      containers:
        - name: immich-machine-learning
          # Per-arch (linux/amd64) digest of :v2.7.5; this overrides the base
          # multi-arch index pin so the GPU-accelerated build runs in production.
          # When bumping: update both the tag and the digest from
          # `docker manifest inspect ghcr.io/immich-app/immich-machine-learning:vX.Y.Z`
          # → pick the linux/amd64 entry's digest.
          image: ghcr.io/immich-app/immich-machine-learning:v3.0.1@sha256:cb2128c5cbc554fdaa2a036fb4419c808a9f3e0f27170e569dd9e727243da909
          securityContext:
            privileged: true
          env:
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "9.0.0"
          volumeMounts:
            - name: model-cache
              mountPath: /cache
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              memory: "4Gi"
              cpu: "2000m"
              # emptyDir model-cache lives on node ephemeral storage; request it
              # so the scheduler accounts for the model download (see base).
              ephemeral-storage: "3Gi"
            limits:
              memory: "12Gi"
              cpu: "8000m"
              ephemeral-storage: "10Gi"
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            # ROCm/ONNX model loading can take 10+ minutes on first inference;
            # give the container 600s before the first liveness check and allow
            # 30 consecutive failures (5 min window) before killing.
            initialDelaySeconds: 600
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
        # model-cache is emptyDir in the base now (per-replica, enables the
        # 4-way GPU fan-out). Download time is tracked in homelabscope; revisit
        # a StatefulSet + per-replica PVC if the re-download proves costly.
        - name: model-cache
          emptyDir:
            sizeLimit: 10Gi
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
---
# Redis resource tuning
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-redis
  namespace: immich
spec:
  template:
    spec:
      containers:
        - name: redis
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
