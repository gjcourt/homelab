# alcatraz — Synology NAS (10.42.2.11)
# Synology DSM serves its UI on port 5000 (HTTP). Gateway terminates TLS
# at the edge and proxies plaintext to alcatraz:5000.
---
apiVersion: v1
kind: Service
metadata:
  name: alcatraz
  namespace: external-services
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5000
      protocol: TCP
      targetPort: 5000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: alcatraz
  namespace: external-services
subsets:
  - addresses:
      - ip: 10.42.2.11
    ports:
      - name: http
        port: 5000
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: alcatraz-http
  namespace: external-services
spec:
  hostnames:
    - alcatraz.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: alcatraz-https
  namespace: external-services
spec:
  hostnames:
    - alcatraz.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: https
  rules:
    - backendRefs:
        - name: alcatraz
          port: 5000
