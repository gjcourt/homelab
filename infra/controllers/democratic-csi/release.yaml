apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi
  namespace: democratic-csi

spec:
  interval: 30m
  chart:
    spec:
      chart: democratic-csi
      version: 0.14.6
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: democratic-csi
      interval: 12h

  install:
    crds: Create
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      strategy: rollback

  driftDetection:
    mode: enabled

  valuesFrom:
    - kind: ConfigMap
      name: democratic-csi-helm-values
