---
# Production compose for the hestia vllm SCALE app.
#
# Promoted from the experiments plan
# (docs/plans/2026-05-07-vllm-frontier-model-experiments.md) — Phase 6 v2 winner.
#
# Result: vLLM beats the prior llama.cpp prod config on the same MoE model
# family by ~12% on single-stream decode (193.0 vs 173.9 tok/s) and ~4×
# under concurrent load (625.8 tok/s aggregate at concurrency 8). 30-min
# soak: 1463 reqs, 0 errors, 0 MiB VRAM drift. Long-context probe at 24,875
# tokens (76% of max_model_len): pass with end-to-end recall.
#
# Full results: docs/research/2026-05-07-vllm-frontier-experiments.md
#
# Image is pinned to v0.20.1 — do NOT use :latest. SCALE doesn't auto-refresh
# :latest, and Docker Hub's :latest drifts with each upstream release.
#
# To deploy this compose: paste into the vllm SCALE app's custom_compose_config
# via midclt or the Apps UI. The llama-cpp SCALE app must be stopped first
# (port 8000 conflict).
services:
  vllm:
    command:
      - '-c'
      - >-
        echo "=== START $(date) ===" >> /root/.cache/huggingface/vllm.log 2>&1;
        exec vllm serve cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
        --served-model-name qwen3.6-35b-a3b-awq
        --host 0.0.0.0 --port 8000
        --tensor-parallel-size 2
        --dtype auto
        --gpu-memory-utilization 0.90
        --max-model-len 32768
        --kv-cache-dtype fp8
        --enable-chunked-prefill
        --max-num-seqs 8
        --enable-auto-tool-choice
        --tool-call-parser hermes
        --trust-remote-code
        >> /root/.cache/huggingface/vllm.log 2>&1
    container_name: vllm
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
                - utility
              count: all
              driver: nvidia
    entrypoint:
      - /bin/bash
    environment:
      HUGGING_FACE_HUB_TOKEN: ""  # set in SCALE UI env-var section (masked); do not commit a real token here
      NCCL_P2P_DISABLE: '1'
      OMP_NUM_THREADS: '8'
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      TOKENIZERS_PARALLELISM: 'false'
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 900s
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:8000/health
      timeout: 10s
    image: vllm/vllm-openai:v0.20.1
    ipc: host
    ports:
      - '8000:8000'
    restart: unless-stopped
    shm_size: 16gb
    ulimits:
      memlock:
        hard: -1
        soft: -1
      stack:
        hard: 67108864
        soft: 67108864
    volumes:
      - /mnt/main/ai/models:/root/.cache/huggingface
