apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: flashcards-db-staging-cnpg-v1-backup
  namespace: flashcards-stage
spec:
  cluster:
    name: flashcards-db-staging-cnpg-v1
  schedule: "0 10 2 * * *"
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
