---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: navidrome
  namespace: navidrome
  labels:
    app.kubernetes.io/name: navidrome
    app.kubernetes.io/part-of: network-policies
spec:
  description: Gateway ingress on 4533; egress DNS + HTTPS for Last.fm and Deezer scrobbling.
  endpointSelector:
    matchLabels:
      app: navidrome
  ingress:
    - fromEntities:
        - host
        - remote-node
        - ingress
      toPorts:
        - ports:
            - port: "4533"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Last.fm scrobbling, Deezer cover art, artist bios.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
