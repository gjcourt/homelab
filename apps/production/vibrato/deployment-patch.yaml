apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:6c82a8aaf923116f287ea687d06f54d6ebd1d570
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
