---
# Variant compose for the vLLM frontier-model experiments plan
# (see docs/plans/2026-05-07-vllm-frontier-model-experiments.md).
#
# This file is rewritten per phase. The current contents are PHASE 1:
#   model:        cyankiwi/Qwen3.6-27B-AWQ-INT4 (~14 GB AWQ-INT4 weights)
#   parallelism:  TP=1, GPU0 only (device_ids: ['0'])
#   purpose:      establish the "best vLLM single-stream on this hardware"
#                 reference point. Highest probability of clearing the
#                 stability gauntlet on first try.
#
# The vllm SCALE app's custom_compose_config mirrors this file. To deploy:
#   1. midclt call app.update vllm '{"custom_compose_config": <THIS FILE AS JSON>}'
#   2. midclt call app.start vllm
#
# Production llama-cpp on the same port 8000 must be stopped first.
services:
  vllm:
    command:
      - '-c'
      - >-
        echo "=== START $(date) [PHASE 1: AWQ-INT4 TP=1 GPU0] ===" >>
        /root/.cache/huggingface/vllm.log 2>&1;
        exec vllm serve cyankiwi/Qwen3.6-27B-AWQ-INT4
        --served-model-name qwen3.6-27b-awq
        --host 0.0.0.0 --port 8000
        --dtype auto
        --gpu-memory-utilization 0.95
        --max-model-len 16384
        --kv-cache-dtype fp8
        --enable-chunked-prefill
        --max-num-seqs 8
        --enable-auto-tool-choice
        --tool-call-parser hermes
        --trust-remote-code
        >> /root/.cache/huggingface/vllm.log 2>&1
    container_name: vllm
    deploy:
      resources:
        reservations:
          devices:
            # Phase 1 pins to GPU0 only (TP=1, leaves GPU1 free for a future
            # second-tenant phase or for keeping llama-cpp partially online).
            - capabilities:
                - gpu
                - utility
              device_ids:
                - '0'
              driver: nvidia
    entrypoint:
      - /bin/bash
    environment:
      HUGGING_FACE_HUB_TOKEN: ""  # set in SCALE UI env-var section (masked); do not commit a real token here
      # NCCL settings retained for parity with prod-disabled compose, even
      # though they don't apply to single-GPU TP=1.
      NCCL_P2P_DISABLE: '1'
      OMP_NUM_THREADS: '8'
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      TOKENIZERS_PARALLELISM: 'false'
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 600s
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:8000/health
      timeout: 10s
    image: vllm/vllm-openai:latest
    ipc: host
    ports:
      - '8000:8000'
    restart: unless-stopped
    shm_size: 16gb
    ulimits:
      memlock:
        hard: -1
        soft: -1
      stack:
        hard: 67108864
        soft: 67108864
    volumes:
      - /mnt/main/ai/models:/root/.cache/huggingface
