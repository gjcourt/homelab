apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: thermalscope-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # Recording rules backing the dashboard's Power & Energy row. RAPL
    # exposes a microjoule counter per CPU package; rate() over it yields
    # watts, and increase() over 24h converted to kWh drives the energy
    # and cost panels.
    - name: thermalscope.recording
      rules:
        # CPU package power (watts) per node — rate of the RAPL energy
        # counter (µJ/s = µW) divided by 1e6 to convert to watts.
        - record: instance:thermalscope_cpu_package_watts:rate5m
          expr: rate(thermalscope_rapl_energy_microjoules_total{domain="package-0"}[5m]) / 1e6

        # CPU package energy over the trailing 24h (kWh) per node.
        # increase() yields µJ; 1 kWh = 3.6e12 µJ.
        - record: instance:thermalscope_cpu_package_kwh:increase1d
          expr: increase(thermalscope_rapl_energy_microjoules_total{domain="package-0"}[24h]) / 3.6e12

        # --- Phase 2: Headroom & Throttle ---

        # NVMe thermal headroom (°C) to the SMART crit threshold, per drive.
        # Joins the threshold and current-temp series on their shared
        # (instance,device,sensor) labels. Only temp1/Composite exposes a
        # crit threshold, so headroom is defined exactly where crit exists.
        - record: instance:thermalscope_nvme_headroom_celsius
          expr: thermalscope_nvme_temperature_threshold_celsius{level="crit"} - on(instance,device,sensor) thermalscope_nvme_temperature_celsius

        # CPU frequency ratio (current / max) for the worst-throttled core,
        # per node. A throttle indicator: <1 means at least one core is
        # below its max clock. Note these AMD APUs idle-park cores well
        # below max, so the idle baseline is ~0.4–0.7, NOT ~1.0 — a low
        # ratio is only meaningful when paired with high temperature (see
        # ThermalScopeCPUThrottling). node-exporter keys series by
        # instance="<ip>:9100"; we re-key to the thermalscope
        # instance="<nodename>" via node_uname_info so this rule joins
        # cleanly with thermalscope_cpu_temperature_celsius and matches the
        # dashboard's $instance variable. node-exporter covers the 6 Talos
        # nodes only (hestia is a bare host outside the DaemonSet).
        - record: instance:thermalscope_cpu_freq_ratio
          expr: |
            min by(instance) (
              label_replace(
                (node_cpu_scaling_frequency_hertz / node_cpu_scaling_frequency_max_hertz)
                  * on(instance) group_left(nodename) node_uname_info,
                "instance", "$1", "nodename", "(.+)"
              )
            )

        # CPU thermal headroom (°C) to Tjmax, per host. These AMD APUs
        # expose no crit sensor in sysfs, so Tjmax is an advisory constant.
        # Hardcoded 95 here; the dashboard panel single-sources the same
        # value through the $cpu_tjmax constant template variable. Keep the
        # two in sync if you change the assumption.
        - record: instance:thermalscope_cpu_headroom_celsius
          expr: 95 - thermalscope_cpu_temperature_celsius{sensor="Tctl"}

        # --- Phase 3: Degradation & Fans ---

        # Per-host CPU utilization (0–1) over 5m, re-keyed to the
        # thermalscope instance="<nodename>" label so it joins cleanly with
        # thermalscope_cpu_temperature_celsius for the temp-vs-load
        # degradation analysis. node-exporter keys series by
        # instance="<ip>:9100"; node_uname_info maps that to nodename. The
        # outer sum by(instance) drops the temporary nodename label left by
        # group_left so the result carries exactly the thermalscope label
        # set (matches the dashboard's $instance variable). node-exporter
        # covers the 6 Talos nodes only — hestia is a bare host outside the
        # DaemonSet, so it has no utilization series here (its temps still
        # appear, just without a load pairing).
        - record: instance:node_cpu_utilization:rate5m
          expr: |
            sum by(instance) (
              label_replace(
                (1 - avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])))
                  * on(instance) group_left(nodename) node_uname_info,
                "instance", "$1", "nodename", "(.+)"
              )
            )

        # Per-host busy disk fraction (0–1) over 5m — the hottest device on
        # each node. Same node-exporter → nodename re-key as the CPU
        # utilization rule above, so it shares the thermalscope instance
        # label. Used as a secondary load axis in the degradation row.
        - record: instance:node_disk_busy:rate5m
          expr: |
            max by(instance) (
              label_replace(
                rate(node_disk_io_time_seconds_total[5m])
                  * on(instance) group_left(nodename) node_uname_info,
                "instance", "$1", "nodename", "(.+)"
              )
            )

    - name: thermalscope
      rules:
        - alert: ThermalScopeScraperDown
          expr: up{job="thermalscope"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "thermalscope exporter on {{ $labels.instance }} is not reachable"
            description: "No metrics have been scraped from thermalscope on {{ $labels.instance }} for 5 minutes."

        # Fires per-instance when CPU Tctl exceeds 85°C across any rack
        # host (hestia + all Talos nodes). 85°C matches AMD's typical
        # Ryzen/EPYC Tctl warning threshold and is a sane shared default.
        - alert: ThermalScopeCPUTemperatureHigh
          expr: thermalscope_cpu_temperature_celsius{sensor="Tctl"} > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "CPU temperature on {{ $labels.instance }} is high"
            description: "Tctl on {{ $labels.instance }} is {{ $value }}°C (threshold 85°C)."

        # Fires per-instance per-device when the Composite NVMe sensor
        # exceeds 65°C. Restricted to sensor="Composite" (the SMART
        # rollup) to avoid double-firing on Sensor1/Sensor2 which read
        # identical values per drive. 65°C is conservative; throttling
        # typically kicks in around 70-75°C.
        - alert: ThermalScopeNVMeTemperatureHigh
          expr: thermalscope_nvme_temperature_celsius{sensor="Composite"} > 65
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "NVMe {{ $labels.device }} on {{ $labels.instance }} is hot"
            description: "{{ $labels.device }} (Composite) on {{ $labels.instance }} is {{ $value }}°C (threshold 65°C)."

        # Scoped to hestia because 83°C is the NVIDIA RTX 4090 thermal
        # warning threshold. AMD iGPUs run hotter by design — see
        # ThermalScopeAMDGPUTemperatureHigh below.
        - alert: ThermalScopeNVIDIAGPUTemperatureHigh
          expr: thermalscope_gpu_temperature_celsius{instance="hestia"} > 83
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "hestia NVIDIA GPU {{ $labels.gpu }} temperature is high"
            description: "NVIDIA GPU {{ $labels.gpu }} ({{ $labels.name }}) on hestia is {{ $value }}°C (threshold 83°C — NVIDIA RTX 4090 limit)."

        # AMD iGPU thermal headroom is generous (Tjmax ~100°C for most
        # Ryzen APUs). Only fire on genuinely concerning numbers.
        - alert: ThermalScopeAMDGPUTemperatureHigh
          expr: thermalscope_amdgpu_temperature_celsius > 90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "AMD iGPU on {{ $labels.instance }} is hot"
            description: "amdgpu {{ $labels.sensor }} on {{ $labels.instance }} is {{ $value }}°C (threshold 90°C)."

        # --- Phase 2: Headroom & Throttle ---

        # Fires per-instance per-device when an NVMe drive is within 5°C of
        # its SMART crit threshold. This complements the fixed-65°C
        # ThermalScopeNVMeTemperatureHigh alert by tracking the
        # drive-reported limit directly, so it stays correct across drives
        # with different crit points (currently 82–88°C).
        - alert: ThermalScopeNVMeHeadroomLow
          expr: instance:thermalscope_nvme_headroom_celsius < 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "NVMe {{ $labels.device }} on {{ $labels.instance }} has low thermal headroom"
            description: "{{ $labels.device }} on {{ $labels.instance }} is only {{ $value }}°C from its crit threshold (<5°C headroom)."

        # Real throttling = depressed clock WHILE hot. The freq ratio alone
        # is meaningless on these APUs (idle cores park at ~0.4–0.7), so we
        # gate on Tctl > 80°C. The join keys both sides on the thermalscope
        # instance label (the recording rule re-keys node-exporter to
        # nodename for exactly this reason). 0.85/80 chosen to sit below the
        # 85°C ThermalScopeCPUTemperatureHigh threshold while still
        # requiring genuinely high heat alongside the clock drop.
        - alert: ThermalScopeCPUThrottling
          expr: |
            instance:thermalscope_cpu_freq_ratio < 0.85
              and on(instance) max by(instance)(thermalscope_cpu_temperature_celsius{sensor="Tctl"}) > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "CPU on {{ $labels.instance }} appears to be thermally throttling"
            description: "{{ $labels.instance }} worst-core frequency ratio is {{ $value }} (<0.85) while Tctl is above 80°C — likely thermal throttling."

        # --- Phase 3: Degradation & Fans ---

        # A hestia chassis fan is stalled/degraded WHILE the CPU is hot.
        # Two failure signals OR'd together:
        #   - ipmi_fan_speed_state != 0 — the BMC's own per-fan assessment
        #     (0 = "ok"/nominal; non-zero = warning/critical per IPMI SDR).
        #   - ipmi_fan_speed_rpm < 500 — a hard RPM floor. Observed baseline
        #     over 7d is ~1000–1400 rpm steady across all five fans, so 500
        #     sits well below normal idle and only trips on a genuine stall
        #     (a spun-down or seized fan), not on normal fan-curve dips.
        # Gated on hestia Tctl > 70°C so a fan that idles low while the box
        # is cool does not page — a degraded fan only matters under heat.
        # Fan and temp series are joined on instance="hestia" (ipmi-exporter
        # and thermalscope both label this host literally "hestia" — no
        # node_uname_info re-key needed, unlike the node-exporter joins).
        # The temp side is reduced with max by(instance) so a single high
        # CPU sensor satisfies the gate for every fan on the host.
        - alert: ThermalScopeFanFailing
          expr: |
            (
              ipmi_fan_speed_state{instance="hestia"} != 0
              or ipmi_fan_speed_rpm{instance="hestia"} < 500
            )
              and on(instance) max by(instance)(
                thermalscope_cpu_temperature_celsius{instance="hestia", sensor="Tctl"}
              ) > 70
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "hestia chassis fan {{ $labels.name }} may be failing"
            description: "Fan {{ $labels.name }} on hestia is stalled or in a non-OK state while CPU Tctl is above 70°C — possible fan failure under load."

    # NVMe SMART wear/health (thermalscope PR #7, opt-in smart-agent). These
    # alerts are global and inactive until the metrics exist — they begin
    # firing only once a thermalscope-smart DaemonSet is scraped. The staging
    # smart-agent (job="thermalscope-smart") emits them first; the prod
    # promotion is a gated follow-up. Wear/spare/error counters change
    # slowly, so the `for:` windows are long and the scrape is every 5m.
    - name: thermalscope.nvmehealth
      rules:
        # Percentage-used is the SMART endurance estimate (0–1 here; 1.0 =
        # rated write endurance consumed). >80% is a plan-a-replacement
        # warning; the drive is typically still healthy past 100%, but at
        # >95% it is firmly end-of-life and should be swapped.
        - alert: ThermalScopeNVMeWearHigh
          expr: thermalscope_nvme_percentage_used_ratio > 0.8
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "NVMe {{ $labels.device }} on {{ $labels.instance }} is wearing out"
            description: "{{ $labels.device }} on {{ $labels.instance }} reports {{ $value | humanizePercentage }} of rated write endurance used (>80%). Plan a replacement."

        - alert: ThermalScopeNVMeWearCritical
          expr: thermalscope_nvme_percentage_used_ratio > 0.95
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "NVMe {{ $labels.device }} on {{ $labels.instance }} is at end-of-life"
            description: "{{ $labels.device }} on {{ $labels.instance }} reports {{ $value | humanizePercentage }} of rated write endurance used (>95%). Replace the drive."

        # Available spare blocks have fallen below the drive's own SMART
        # threshold — the drive is signalling that spare capacity is running
        # out. Gated on threshold>0 so drives that don't report a threshold
        # (threshold=0) never trip this.
        - alert: ThermalScopeNVMeSpareLow
          expr: |
            thermalscope_nvme_available_spare_ratio < thermalscope_nvme_available_spare_threshold_ratio
              and thermalscope_nvme_available_spare_threshold_ratio > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "NVMe {{ $labels.device }} on {{ $labels.instance }} is low on spare blocks"
            description: "{{ $labels.device }} on {{ $labels.instance }} available spare {{ $value | humanizePercentage }} is below its SMART threshold. The drive is running out of spare capacity."

        # The SMART critical-warning bitfield is non-zero — the drive is
        # reporting at least one critical condition (spare below threshold,
        # temperature out of range, reliability degraded, read-only, or
        # volatile-memory backup failed). Any non-zero value pages.
        - alert: ThermalScopeNVMeCriticalWarning
          expr: thermalscope_nvme_critical_warning != 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "NVMe {{ $labels.device }} on {{ $labels.instance }} reports a SMART critical warning"
            description: "{{ $labels.device }} on {{ $labels.instance }} critical_warning bitfield is {{ $value }} (non-zero). Inspect the drive's SMART status immediately."

        # New media (uncorrectable) errors in the last 24h. Media errors are
        # rare and cumulative; any increase is worth surfacing.
        - alert: ThermalScopeNVMeMediaErrors
          expr: increase(thermalscope_nvme_media_errors_total[24h]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "NVMe {{ $labels.device }} on {{ $labels.instance }} logged new media errors"
            description: "{{ $labels.device }} on {{ $labels.instance }} recorded {{ $value }} new media/uncorrectable error(s) in the last 24h."
