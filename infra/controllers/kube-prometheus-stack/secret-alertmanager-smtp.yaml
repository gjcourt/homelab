kind: Secret
metadata:
  name: alertmanager-smtp
  namespace: monitoring
type: Opaque
stringData:
  password: ENC[AES256_GCM,data:wR2oPyQM1n/9NLhlFaPA+g==,iv:Sl43z9r/zBkntQWRXm5oLpUF/j2DJRfKq6+0FvMNHnk=,tag:0A2e1ipcK2P0kOcjRwPnnA==,type:str]
