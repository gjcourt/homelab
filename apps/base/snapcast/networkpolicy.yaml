---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: snapcast
  namespace: snapcast
  labels:
    app.kubernetes.io/name: snapcast
    app.kubernetes.io/part-of: network-policies
spec:
  description: LAN snapclients (world entity; SNAT prevents CIDR match) on 1704/1705/1780; egress DNS + Spotify HTTPS.
  endpointSelector:
    matchLabels:
      app: snapcast
  ingress:
    # Cilium SNATs external traffic to a node IP (10.244.x.x) before the pod sees
    # it, so fromCIDR: 10.42.2.0/24 never matches. Use world to allow all external
    # sources; the real boundary is the LAN VLAN which is the only path to this VIP.
    - fromEntities:
        - host
        - remote-node
        - ingress
        - world
      toPorts:
        - ports:
            - port: "1704"
              protocol: TCP
            - port: "1705"
              protocol: TCP
            - port: "1780"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # go-librespot (Spotify Connect) connects to Spotify's servers over HTTPS.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
