apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: signal-cli-stage
resources:
  - ../../base/signal-cli/

labels:
  - pairs:
      env: staging
      app.kubernetes.io/instance: staging
    includeSelectors: false

patches:
  - target:
      kind: Namespace
      name: signal-cli
    patch: |
      - op: replace
        path: /metadata/name
        value: signal-cli-stage
