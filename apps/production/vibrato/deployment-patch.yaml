apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:6b1c3ebb9cf1b4e4f9efa264f19ce272538459d5
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
