# IR codes captured from remotes — hand this to Claude to build blaster.yaml
- name: "Power"
  decode: "NEC: address=0x3412, command=0xE718"
- name: "mute"
  decode: "NEC: address=0x3412, command=0xF906"
- name: "volume-up"
  decode: "NEC: address=0x3412, command=0xB946"
- name: "volume-down"
  decode: "NEC: address=0x3412, command=0xE916"
- name: "previous"
  decode: "NEC: address=0x3412, command=0xB847"
- name: "next"
  decode: "NEC: address=0x3412, command=0xEA15"
- name: "menu"
  decode: "NEC: address=0x3412, command=0xAA55"
- name: "c1"
  decode: "NEC: address=0x3412, command=0xFB04"
- name: "c2"
  decode: "NEC: address=0x3412, command=0xBF40"
- name: "fir"
  decode: "NEC: address=0x3412, command=0xAB54"
- name: "output"
  decode: "NEC: address=0x3412, command=0xAF50"
- name: "auto"
  decode: "NEC: address=0x3412, command=0xEF10"
- name: "brightness"
  decode: "NEC: address=0x3412, command=0xEB14"
