apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openwebui
  namespace: openwebui
  labels:
    app: openwebui
    app.kubernetes.io/name: openwebui
    app.kubernetes.io/part-of: network-policies
spec:
  description: "Gateway ingress + kubelet probes; egress to DNS, llama.cpp, and internet HTTPS (model downloads)."
  endpointSelector:
    matchLabels:
      app: openwebui
  ingress:
    # Cilium Envoy (Gateway API) binds upstream sockets to a dedicated proxy IP
    # (e.g. 10.244.x.15) that Cilium marks as reserved identity 8 ("ingress").
    # Same-node connections arrive as "host"; cross-node VXLAN connections arrive
    # as "remote-node". All three are required. Kubelet probes are auto-exempted.
    - fromEntities:
        - host
        - remote-node
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS resolution via CoreDNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # llama.cpp OpenAI-compat API on hestia (TrueNAS, 10.42.2.10:8000)
    - toCIDR:
        - 10.42.2.10/32
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Internet HTTPS for Hugging Face sentence-transformer downloads on first boot
    - toCIDR:
        - 0.0.0.0/0
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
