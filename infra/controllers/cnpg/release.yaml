apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system

spec:
  interval: 30m
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.25.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      interval: 12h

  install:
    crds: Create
  upgrade:
    crds: CreateReplace
    # uninstall (not rollback): the CNPG operator manages Cluster CRs that
    # back PostgreSQL with StatefulSets; rollback on stuck StatefulSets is a
    # known Flux failure mode. Uninstall + reinstall is safer for the operator.
    remediation:
      retries: 3
      strategy: uninstall

  driftDetection:
    mode: enabled

  valuesFrom:
    - kind: ConfigMap
      name: cnpg-helm-values
