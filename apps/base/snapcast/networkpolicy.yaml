---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: snapcast
  namespace: snapcast
  labels:
    app.kubernetes.io/name: snapcast
    app.kubernetes.io/part-of: network-policies
spec:
  description: LAN snapclients (world entity; SNAT prevents CIDR match) on 1704/1705/1780 + MPD on 6600; egress DNS, Spotify HTTPS, and in-cluster Navidrome Subsonic (4533).
  endpointSelector:
    matchLabels:
      app: snapcast
  ingress:
    # Cilium SNATs external traffic to a node IP (10.244.x.x) before the pod sees
    # it, so fromCIDR: 10.42.2.0/24 never matches. Use world to allow all external
    # sources; the real boundary is the LAN VLAN which is the only path to this VIP.
    - fromEntities:
        - host
        - remote-node
        - ingress
        - world
      toPorts:
        - ports:
            - port: "1704"
              protocol: TCP
            - port: "1705"
              protocol: TCP
            - port: "1780"
              protocol: TCP
            # MPD protocol — the mopidy sidecar serves LAN clients
            # (Symfonium, MALP, ncmpcpp) on 6600 via the snapcast LB.
            - port: "6600"
              protocol: TCP
            # Mopidy HTTP — the Mopidy-Iris web client, via the gateway
            # (cast.burntbytes.com) or the LB IP directly.
            - port: "6680"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # go-librespot (Spotify Connect) reaches Spotify over HTTPS (443) for OAuth +
    # apresolve, and the access-point on 4070 (apresolve hands out :4070 hosts).
    # Without 4070 the interactive login completes the token exchange but fails the
    # AP connect, exits, and never persists credentials → the device never appears.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "4070"
              protocol: TCP
    # mopidy sidecar pulls the library from Navidrome's in-cluster Subsonic
    # API (only the blog is exposed via the tunnel, so no hairpin).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: navidrome-prod
            app: navidrome
      toPorts:
        - ports:
            - port: "4533"
              protocol: TCP
