apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: memos-db-production-cnpg-v1
  namespace: memos-prod

spec:
  description: Postgres cluster for the memos application (production)
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5

  instances: 3

  inheritedMetadata:
    labels:
      app: memos-database
      env: production
      policy-type: "database"

  monitoring:
    enablePodMonitor: true

  # Cross-cluster anti-affinity: see apps/production/golinks/database.yaml
  # for full rationale. Soft (weight=50) preference to land new pods on
  # nodes that don't already host other CNPG postgres pods.
  affinity:
    additionalPodAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          podAffinityTerm:
            labelSelector:
              matchLabels:
                policy-type: database
            topologyKey: kubernetes.io/hostname

  storage:
    # Actual usage: ~633Mi; target = 20% headroom → 1Gi.
    # Requires cluster recreation (CNPG cannot shrink PVCs in-place).
    size: 1Gi

  # WAL archiving and base backups via the Barman Cloud Plugin (v0.11.0).
  # S3 configuration is defined in objectstore.yaml (ObjectStore CRD).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: memos-db-production-cnpg-v1-backup
        serverName: memos-db-production-cnpg-v1

  # Bootstrap from backup if available, otherwise initialize fresh
  # To restore: uncomment recovery section and comment out initdb
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: memos-db-credentials
        # recovery:
        #   source: memos-db-backup

  # externalClusters references the ObjectStore via the plugin for PITR/restore.
  externalClusters:
    - name: memos-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: memos-db-production-cnpg-v1-backup
          serverName: memos-db-production-cnpg-v1
