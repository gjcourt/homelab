---
# Variant compose for the vLLM frontier-model experiments plan
# (see docs/plans/2026-05-07-vllm-frontier-model-experiments.md).
#
# This file is rewritten per phase. The current contents are PHASE 6 v2:
#   model:        cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit (~22 GB AWQ-INT4 MoE)
#   parallelism:  TP=2 across both GPUs (model doesn't fit single-GPU)
#   purpose:      direct A/B vs production llama.cpp on the same model
#                 family. Result: vLLM beats llama.cpp by ~12% on single-
#                 stream decode (194.5 vs 173.9 t/s) and 4× under
#                 concurrent load (625.8 t/s aggregate at concurrency 8).
#
# Phase 1 (Qwen3.6-27B-AWQ-INT4 / TP=1 / GPU0) and Phase 6 v1 (35B-A3B
# AWQ TP=1 GPU0 only — OOM, doesn't fit) are recorded in the research log.
#
# The vllm SCALE app's custom_compose_config mirrors this file. To deploy:
#   midclt call app.update vllm '{"custom_compose_config": <THIS FILE AS JSON>}'
#   midclt call app.redeploy vllm   # prefer over app.start; avoids stuck DEPLOYING states
#
# Production llama-cpp on the same port 8000 must be stopped first.
services:
  vllm:
    command:
      - '-c'
      - >-
        echo "=== START $(date) [PHASE 6 v2: 35B-A3B-AWQ / TP=2] ===" >>
        /root/.cache/huggingface/vllm.log 2>&1;
        exec vllm serve cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
        --served-model-name qwen3.6-35b-a3b-awq
        --host 0.0.0.0 --port 8000
        --tensor-parallel-size 2
        --dtype auto
        --gpu-memory-utilization 0.90
        --max-model-len 32768
        --kv-cache-dtype fp8
        --enable-chunked-prefill
        --max-num-seqs 8
        --enable-auto-tool-choice
        --tool-call-parser hermes
        --trust-remote-code
        >> /root/.cache/huggingface/vllm.log 2>&1
    container_name: vllm
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
                - utility
              # Phase 6 v2 uses both GPUs (TP=2). Phase 1 used device_ids: ['0'].
              count: all
              driver: nvidia
    entrypoint:
      - /bin/bash
    environment:
      HUGGING_FACE_HUB_TOKEN: ""  # set in SCALE UI env-var section (masked); do not commit a real token here
      NCCL_P2P_DISABLE: '1'
      OMP_NUM_THREADS: '8'
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      TOKENIZERS_PARALLELISM: 'false'
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 900s
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:8000/health
      timeout: 10s
    image: vllm/vllm-openai:latest
    ipc: host
    ports:
      - '8000:8000'
    restart: unless-stopped
    shm_size: 16gb
    ulimits:
      memlock:
        hard: -1
        soft: -1
      stack:
        hard: 67108864
        soft: 67108864
    volumes:
      - /mnt/main/ai/models:/root/.cache/huggingface
