apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unpoller
  namespace: monitoring
  labels:
    # Picked up by the kube-prometheus-stack Prometheus
    # (serviceMonitorSelector matches on this label).
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: unpoller
      app.kubernetes.io/component: unifi-exporter
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: metrics
      path: /metrics
      interval: 60s
      scrapeTimeout: 30s
      # Force the job label to "unpoller" so the PrometheusRule alerts
      # (which match on job="unpoller") align with the scraped series.
      relabelings:
        - targetLabel: job
          replacement: unpoller
