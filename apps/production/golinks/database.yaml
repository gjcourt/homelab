apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: golinks-db-production-cnpg-v1
  namespace: golinks-prod
spec:
  description: Postgres cluster for the golinks application (production)
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 3
  inheritedMetadata:
    labels:
      app: golinks-database
      env: production
      policy-type: "database"
  monitoring:
    enablePodMonitor: true
  # Cross-cluster anti-affinity: prefer nodes that aren't already running
  # other CNPG postgres pods (label `policy-type: database`, inherited by
  # every CNPG pod via inheritedMetadata.labels). This is additive to the
  # CNPG-default intra-cluster anti-affinity (weight=100, spreads this
  # cluster's 3 replicas across nodes via kubernetes.io/hostname).
  # Weight 50 keeps the in-cluster spread dominant; this is a soft tiebreaker
  # to smooth concentration across the ~11 CNPG clusters in the homelab.
  affinity:
    additionalPodAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          podAffinityTerm:
            labelSelector:
              matchLabels:
                policy-type: database
            topologyKey: kubernetes.io/hostname
  storage:
    # Actual usage: ~488Mi; target = 20% headroom → 1Gi.
    # Requires cluster recreation (CNPG cannot shrink PVCs in-place).
    size: 1Gi
  # WAL archiving and base backups via the Barman Cloud Plugin (v0.11.0).
  # S3 configuration is defined in objectstore.yaml (ObjectStore CRD).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: golinks-db-production-cnpg-v1-backup
        serverName: golinks-db-production-cnpg-v1
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: golinks-db-credentials
  # externalClusters references the ObjectStore via the plugin for PITR/restore.
  externalClusters:
    - name: golinks-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: golinks-db-production-cnpg-v1-backup
          serverName: golinks-db-production-cnpg-v1
