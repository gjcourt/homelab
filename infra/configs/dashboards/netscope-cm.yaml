apiVersion: v1
kind: ConfigMap
metadata:
  name: netscope-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  netscope.json: |
    {
      "title": "Netscope (eBPF Network Traffic)",
      "uid": "netscope-overview",
      "tags": ["homelab", "netscope", "ebpf"],
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "panels": [
        {
          "id": 1,
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "type": "stat",
          "title": "Nodes Reporting",
          "description": "Count of netscope-agent scrape targets currently up. Should equal the number of nodes in the cluster (6); a smaller number means at least one DaemonSet pod is unhealthy or has lost its scrape endpoint.",
          "targets": [
            {
              "refId": "A",
              "expr": "count(up{job=\"netscope-agent\"} == 1)",
              "legendFormat": "up"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "thresholds": {
              "mode": "absolute",
              "steps": [
                { "value": null, "color": "red" },
                { "value": 1, "color": "yellow" },
                { "value": 6, "color": "green" }
              ]
            }
          }
        },
        {
          "id": 2,
          "gridPos": { "x": 6, "y": 0, "w": 9, "h": 4 },
          "type": "stat",
          "title": "Cluster Ingress Rate (B/s)",
          "description": "sum(rate(netscope_rx_bytes_total[5m])) — total bytes/sec received at tcx ingress across every node's primary interface. Sanity check that all DaemonSet pods are publishing data.",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(netscope_rx_bytes_total[5m]))",
              "legendFormat": "cluster B/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value"
          }
        },
        {
          "id": 3,
          "gridPos": { "x": 15, "y": 0, "w": 9, "h": 4 },
          "type": "stat",
          "title": "Per-Node Scrape Status",
          "description": "up{job=\"netscope-agent\"} broken out per node. A 0 here means Prometheus has lost a scrape target — investigate before trusting traffic graphs.",
          "targets": [
            {
              "refId": "A",
              "expr": "up{job=\"netscope-agent\"}",
              "legendFormat": "{{nodename}}"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "colorMode": "background",
            "textMode": "value_and_name",
            "thresholds": {
              "mode": "absolute",
              "steps": [
                { "value": null, "color": "red" },
                { "value": 1, "color": "green" }
              ]
            }
          }
        },
        {
          "id": 10,
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 10 },
          "type": "timeseries",
          "title": "Per-Node Receive Rate (B/s)",
          "description": "rate(netscope_rx_bytes_total[5m]) by nodename — bytes/sec at tcx ingress on each node's primary interface. The headline panel: one line per node, gaps indicate scrape loss, sustained spikes indicate a noisy node.",
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (nodename) (rate(netscope_rx_bytes_total[5m]))",
              "legendFormat": "{{nodename}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10
              }
            }
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 11,
          "gridPos": { "x": 0, "y": 14, "w": 24, "h": 8 },
          "type": "timeseries",
          "title": "Total Cluster Ingress Rate (B/s)",
          "description": "sum(rate(netscope_rx_bytes_total[5m])) — single line view of cluster-wide ingress, useful for capacity-planning.",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(netscope_rx_bytes_total[5m]))",
              "legendFormat": "cluster"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 20
              }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          }
        },
        {
          "id": 19,
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 1 },
          "type": "row",
          "title": "Phase 2 — TCP depth signals",
          "collapsed": false,
          "panels": []
        },
        {
          "id": 20,
          "gridPos": { "x": 0, "y": 23, "w": 15, "h": 10 },
          "type": "timeseries",
          "title": "TCP Retransmit Rate per Node",
          "description": "rate(netscope_tcp_retransmits_total[5m]) by nodename — TCP retransmit events/sec per node, sampled by the eBPF probe. Headline reliability signal: sustained non-zero on a worker indicates either local NIC trouble or a noisy peer; control-plane nodes typically run a low background rate from kube-apiserver traffic.",
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (nodename) (rate(netscope_tcp_retransmits_total[5m]))",
              "legendFormat": "{{nodename}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10
              }
            }
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 21,
          "gridPos": { "x": 15, "y": 23, "w": 9, "h": 10 },
          "type": "stat",
          "title": "Cluster Retransmits (24h)",
          "description": "sum(increase(netscope_tcp_retransmits_total[24h])) — total retransmits cluster-wide over the last 24 hours. Sits next to the per-node rate panel as a quick at-a-glance regression check.",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(netscope_tcp_retransmits_total[24h]))",
              "legendFormat": "retransmits"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 200000, "color": "yellow" },
                  { "value": 500000, "color": "red" }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value"
          }
        },
        {
          "id": 22,
          "gridPos": { "x": 0, "y": 33, "w": 24, "h": 10 },
          "type": "timeseries",
          "title": "TCP Smoothed RTT Percentiles",
          "description": "histogram_quantile over netscope_tcp_srtt_microseconds_bucket aggregated cluster-wide. p50 tracks typical pod-to-pod RTT (expect ~2ms on-cluster), p99 captures the off-cluster tail. Bucket boundaries are seconds (Prometheus convention); the eBPF collector converts from µs before bucketing.",
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.50, sum(rate(netscope_tcp_srtt_microseconds_bucket[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "refId": "B",
              "expr": "histogram_quantile(0.95, sum(rate(netscope_tcp_srtt_microseconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "refId": "C",
              "expr": "histogram_quantile(0.99, sum(rate(netscope_tcp_srtt_microseconds_bucket[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 5
              }
            }
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 23,
          "gridPos": { "x": 0, "y": 43, "w": 24, "h": 12 },
          "type": "heatmap",
          "title": "TCP Smoothed RTT Distribution",
          "description": "sum(rate(netscope_tcp_srtt_microseconds_bucket[5m])) by (le) — cumulative-bucket heatmap of SRTT samples cluster-wide. The percentile panel shows trend, this panel shows shape: a clean horizontal band means stable latency; a vertical smear means new tail behavior. Y-axis is seconds on a log scale because buckets span ~1µs to ~8s.",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(netscope_tcp_srtt_microseconds_bucket[5m])) by (le)",
              "legendFormat": "{{le}}",
              "format": "heatmap"
            }
          ],
          "options": {
            "calculate": false,
            "yAxis": {
              "unit": "s",
              "axisLabel": "SRTT",
              "scale": { "type": "log", "log": 2 }
            },
            "color": { "mode": "scheme", "scheme": "Spectral", "steps": 64, "reverse": true },
            "cellGap": 1,
            "tooltip": { "show": true, "yHistogram": true },
            "legend": { "show": true }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "scaleDistribution": { "type": "log", "log": 2 },
                "hideFrom": { "tooltip": false, "viz": false, "legend": false }
              }
            }
          }
        }
      ]
    }
