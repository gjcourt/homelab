apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:4f7f6cd79cb83a57f2f1d242c566e354638f4b06
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
