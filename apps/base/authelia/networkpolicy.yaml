---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: authelia
  namespace: authelia
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/part-of: network-policies
spec:
  description: Gateway ingress on 9091; Prometheus scrape on 9959; egress DNS + SMTP (port 465) for email notifications.
  endpointSelector:
    matchLabels:
      app: authelia
  ingress:
    - fromEntities:
        - host
        - remote-node
        - ingress
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
    # Prometheus scrapes the metrics endpoint (port 9959). Without this rule the
    # ServiceMonitor target stays up=0 — the default-deny CNP drops the scrape.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9959"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # SMTP submissions to Gmail for email-based 2FA notifications.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "465"
              protocol: TCP
