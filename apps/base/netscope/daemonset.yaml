apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netscope-agent
  namespace: netscope
  labels:
    app.kubernetes.io/name: netscope
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: netscope
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netscope
        app.kubernetes.io/component: agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9101"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: netscope-agent
      hostNetwork: true
      hostPID: false
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: "ghcr.io/gjcourt/netscope:a4982ac@sha256:f838246a72add4bfb0fd1463f3bf8c93f65e8a49117950f4989e3baf93c1bc03"
          imagePullPolicy: IfNotPresent
          env:
            - name: NETSCOPE_IFACE
              value: "eno1"
          ports:
            - name: metrics
              containerPort: 9101
              hostPort: 9101
              protocol: TCP
          securityContext:
            privileged: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              add:
                - BPF
                - PERFMON
                - NET_ADMIN
                # SYS_ADMIN is required for bpf(BPF_PROG_GET_NEXT_ID),
                # which the agent uses at startup to discover Cilium's
                # ingress program for tcx anchor placement.
                - SYS_ADMIN
              drop:
                - ALL
          volumeMounts:
            - name: bpffs
              mountPath: /sys/fs/bpf
              mountPropagation: HostToContainer
            - name: btf
              mountPath: /sys/kernel/btf
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9101
              host: 127.0.0.1
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9101
              host: 127.0.0.1
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: btf
          hostPath:
            path: /sys/kernel/btf
            type: Directory
