# ============================================================================
# Bathroom fan auto-off timer
# ============================================================================
# NOTE: Do NOT wrap in 'automation:' key here. Since configuration.yaml
# already has 'automation: !include automations.yaml', the included file
# must be a bare list of automation objects.

- alias: "Bathroom fan auto-off — start timer"
  description: "When a bathroom exhaust fan switch turns on, start a timer. Turns fan off when timer expires."
  trigger:
    - platform: state
      entity_id:
        - switch.hall_bathroom_exhaust_fan
        - switch.master_bathroom_exhaust_fan
        - switch.powder_bathroom_exhaust_fan
      from: "off"
      to: "on"
  action:
    - variables:
        # Extract bathroom name from entity ID
        # switch.master_bathroom_exhaust_fan → master_bathroom
        # switch.hall_bathroom_exhaust_fan → hall_bathroom
        # switch.powder_bathroom_exhaust_fan → powder_bathroom
        fan_name: >
          {{ trigger.to_state.object_id
             | replace("_exhaust_fan", "") }}
        helper_id: >
          {{ "input_number." ~ fan_name ~ "_fan_minutes" }}
        timer_entity: >
          {{ "timer." ~ fan_name ~ "_fan_timer" }}
        delay_minutes: >
          {{ states(helper_id) | default("30") | int(30) }}
        delay_seconds: "{{ delay_minutes * 60 }}"
    # Start the timer with configured duration
    - service: timer.start
      target:
        entity_id: "{{ timer_entity }}"
      data:
        duration: "{{ delay_seconds }}"
  mode: restart

- alias: "Bathroom fan auto-off — turn off fan"
  description: "When a bathroom fan timer expires, turn off the fan."
  trigger:
    - platform: event
      event_type: timer.finished
  condition:
    # Only bathroom fan timers (not other timers in the house)
    - condition: template
      value_template: >
        {{ "timer.master_bathroom" in trigger.event.data.entity_id | lower or
           "timer.hall_bathroom" in trigger.event.data.entity_id | lower or
           "timer.powder_bathroom" in trigger.event.data.entity_id | lower }}
  action:
    - variables:
        # Derive switch entity ID from timer entity ID
        # timer.master_bathroom_fan_timer → switch.master_bathroom_exhaust_fan
        # timer.hall_bathroom_fan_timer → switch.hall_bathroom_exhaust_fan
        # timer.powder_bathroom_fan_timer → switch.powder_bathroom_exhaust_fan
        switch_entity: >
          {{ trigger.event.data.entity_id
             | replace("timer.", "switch.")
             | replace("_fan_timer", "_exhaust_fan") }}
    # Turn off the fan
    - service: switch.turn_off
      target:
        entity_id: "{{ switch_entity }}"
      continue_on_error: true

- alias: "Bathroom fan auto-off — cancel timer when switched off manually"
  description: "If someone flips the switch off before the timer expires, cancel the corresponding timer."
  trigger:
    - platform: state
      entity_id:
        - switch.hall_bathroom_exhaust_fan
        - switch.master_bathroom_exhaust_fan
        - switch.powder_bathroom_exhaust_fan
      from: "on"
      to: "off"
  action:
    - variables:
        bathroom: "{{ trigger.to_state.object_id | replace('_exhaust_fan', '') }}"
        timer_entity: "timer.{{ bathroom }}_fan_timer"
    - service: timer.cancel
      target:
        entity_id: "{{ timer_entity }}"
      continue_on_error: true

# ============================================================================
# Nightlight automation
# ============================================================================
# At sundown, bring up the dining room chandelier components at a configurable
# brightness. At a configurable time (+ daily-random jitter), turn off the
# dining room chandelier.
#
# Sunset behavior depends on the master Lutron switch:
#   - Master OFF → turn master on, force both LED chandeliers to preset
#                  brightness (LEDs may come up at factory default when
#                  the switch re-powers them; force-set ensures preset).
#   - Master ON  → leave master alone. For each LED, turn it on at preset
#                  only if currently off; otherwise leave it alone
#                  (someone's actively using the chandelier).
#
# Input helpers:
#   input_number.nightlight_brightness       — target brightness % (default 6)
#   input_number.nightlight_random_offset    — MAX jitter minutes (default 30)
#   input_number.nightlight_offset_today     — today's actual jitter (auto)
#   input_datetime.nightlight_turnoff_time   — base turnoff time (default 23:00)
#
# Template sensor:
#   sensor.nightlight_turnoff_time           — base time + today's offset → HH:MM

- alias: "Nightlight — turn on at sundown"
  description: "Turn on dining room chandelier components at sundown."
  trigger:
    - platform: sun
      event: sunset
  action:
    - choose:
        # Case 1: master switch is OFF → turn master on, force both LEDs
        # to preset brightness (LEDs may auto-power-on at factory default
        # when the Lutron switch re-powers them).
        - conditions:
            - condition: state
              entity_id: switch.dining_room_chandelier
              state: "off"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.dining_room_chandelier
            - service: light.turn_on
              target:
                entity_id:
                  - light.0xa4c138b55dac7973  # chandelier_central (MiBoxer)
                  - light.0xa4c138a9f6011cac  # chandelier_flowers (MiBoxer)
              data:
                brightness: "{{ states('input_number.nightlight_brightness') | int(6) }}"
      # Case 2 (default): master is already ON. Don't touch master.
      # For each LED, only turn on if currently off; leave running LEDs alone.
      default:
        - if:
            - condition: state
              entity_id: light.0xa4c138b55dac7973
              state: "off"
          then:
            - service: light.turn_on
              target:
                entity_id: light.0xa4c138b55dac7973
              data:
                brightness: "{{ states('input_number.nightlight_brightness') | int(6) }}"
        - if:
            - condition: state
              entity_id: light.0xa4c138a9f6011cac
              state: "off"
          then:
            - service: light.turn_on
              target:
                entity_id: light.0xa4c138a9f6011cac
              data:
                brightness: "{{ states('input_number.nightlight_brightness') | int(6) }}"

- alias: "Nightlight — pick today's random offset at midnight"
  description: "At midnight, choose today's jitter from [0, max] and store it."
  trigger:
    - platform: time
      at: "00:00:01"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.nightlight_offset_today
      data:
        value: "{{ range(0, states('input_number.nightlight_random_offset') | int(30) + 1) | random }}"

- alias: "Nightlight — prime today's offset on HA start"
  description: >
    On Home Assistant startup, re-roll today's offset so the first night
    after a restart isn't pinned to the input_number.initial value (0).
    Also covers the case where the user just bumped the max.
  trigger:
    - platform: homeassistant
      event: start
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.nightlight_offset_today
      data:
        value: "{{ range(0, states('input_number.nightlight_random_offset') | int(30) + 1) | random }}"

- alias: "Nightlight — turn off dining room chandelier"
  description: "Turn off the dining room chandelier at configurable time + today's jitter."
  trigger:
    - platform: template
      value_template: >
        {{ now().strftime('%H:%M') == states('sensor.nightlight_turnoff_time') }}
  condition:
    - condition: state
      entity_id: switch.dining_room_chandelier
      state: "on"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.dining_room_chandelier

# ============================================================================
# Laundry room light auto-off timer
# ============================================================================
# When either laundry room light turns on, start a timer. When the timer
# expires, turn off both lights. If both lights are manually turned off
# before the timer expires, cancel the timer.
#
# Input helper:
#   input_number.laundry_room_light_minutes — configurable timeout (default 30 min)
#
# Timer:
#   timer.laundry_room_light_timer — counts down once either light turns on

- alias: "Laundry room light auto-off — start timer"
  description: "When a laundry room light turns on, start a timer. Turns off both lights when timer expires."
  trigger:
    - platform: state
      entity_id:
        - light.laundry_room_main_lights
        - light.laundry_room_cove
      from: "off"
      to: "on"
  action:
    - variables:
        timer_entity: "timer.laundry_room_light_timer"
        delay_minutes: >
          {{ states('input_number.laundry_room_light_minutes') | default('30') | int(30) }}
        delay_seconds: "{{ delay_minutes * 60 }}"
    # Start the timer with configured duration
    - service: timer.start
      target:
        entity_id: "{{ timer_entity }}"
      data:
        duration: "{{ delay_seconds }}"
  mode: restart

- alias: "Laundry room light auto-off — turn off lights"
  description: "When the laundry room light timer expires, turn off both lights."
  trigger:
    - platform: event
      event_type: timer.finished
  condition:
    # Only laundry room light timer (not other timers in the house)
    - condition: template
      value_template: >
        {{ "timer.laundry_room_light_timer" in trigger.event.data.entity_id | lower }}
  action:
    # Turn off both laundry room lights
    - service: light.turn_off
      target:
        entity_id:
          - light.laundry_room_main_lights
          - light.laundry_room_cove
      continue_on_error: true

- alias: "Laundry room light auto-off — cancel timer when both lights off"
  description: "If both laundry room lights are turned off before the timer expires, cancel the timer."
  trigger:
    - platform: state
      entity_id:
        - light.laundry_room_main_lights
        - light.laundry_room_cove
  condition:
    # Only cancel if BOTH lights are off
    - condition: state
      entity_id: light.laundry_room_main_lights
      state: "off"
    - condition: state
      entity_id: light.laundry_room_cove
      state: "off"
  action:
    - service: timer.cancel
      target:
        entity_id: timer.laundry_room_light_timer
      continue_on_error: true
