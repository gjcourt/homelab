csiDriver:
  name: "org.democratic-csi.truenas-iscsi"

driver:
  config:
    driver: truenas-iscsi
  existingConfigSecret: democratic-csi-driver-config
  existingConfigSecretKey: driver-config-file.yaml

# Pin the democratic-csi driver image off the chart default `:latest`.
# Bumped v1.9.0 → v1.9.5 (2026-07-02): v1.9.0's ControllerExpandVolume reloads the
# iSCSI target by writing /sys/.../resync_size via a `simple-file-writer` helper
# that does NOT exist on TrueNAS SCALE (upstream #390) → EVERY PVC expand fails
# with `sudo: simple-file-writer: command not found`. v1.9.5 drops that helper for a
# direct `echo 1 > .../resync_size` write (src/driver/freenas/ssh.js). Validate the
# paired chart bump to 0.15.1 alongside this (see release.yaml).
#
# ⚠️ v1.9.5 fixes only the CONTROLLER half. In-place iSCSI ext4 PVC *growth* still
# does NOT complete end-to-end on this Talos cluster: the node-side online resize2fs
# hits EPERM (EXT4_IOC_RESIZE_FS, cross-namespace, Talos kernel — not caps/seccomp).
# To grow a volume, RECREATE the PVC (scale workload 0 → flux suspend → delete PVC →
# scale up → fresh volume provisions at the new size, no resize2fs) + cut ingestion
# to fit; never `kubectl patch pvc <grow>`. (xfs may dodge this — untested.)
# See docs/operations/incidents/2026-07-02-jellyfin-cache-pvc-expand-simple-file-writer.md
# and docs/plans/2026-06-28-democratic-csi-ssh-to-api-driver.md.
controller:
  driver:
    image: democraticcsi/democratic-csi:v1.9.5@sha256:fc3b7d7ed3a616714139525075312758e23a5d425ffb539ad12c9bd20fb6001f

storageClasses:
  - name: truenas-iscsi
    defaultClass: false
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

  - name: truenas-iscsi-ssd
    defaultClass: false
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

  - name: truenas-iscsi-ephemeral
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

  # xfs variants of the iSCSI StorageClasses above.
  # Rationale: online PVC *expansion* works on xfs but NOT on ext4 with this
  # democratic-csi + Talos setup. ext4 node-side resize2fs fails the online
  # EXT4_IOC_RESIZE_FS ioctl with EPERM against the host-mounted globalmount;
  # xfs grows via `xfs_growfs <mountpoint>` (mountpoint-based, no block-device
  # ioctl), which succeeds. Verified end-to-end on melodic-muse 2026-06-28
  # (1Gi -> 2Gi, df confirmed 2Gi, data preserved).
  # These are *additive* — existing ext4 volumes keep their fsType and still
  # require recreate-to-grow. Use the xfs classes for NEW volumes that may
  # need to expand in place.
  - name: truenas-iscsi-xfs
    defaultClass: false
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: xfs
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

  - name: truenas-iscsi-ssd-xfs
    defaultClass: false
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: xfs
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

  - name: truenas-iscsi-ephemeral-xfs
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: xfs
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

# Talos: /etc/iscsi is a read-only tmpfs mount — DirectoryOrCreate skips the strict type check.
# hostPID required for nsenter strategy to find iscsid PID in the host process namespace.
node:
  hostPID: true
  driver:
    image: democraticcsi/democratic-csi:v1.9.5@sha256:fc3b7d7ed3a616714139525075312758e23a5d425ffb539ad12c9bd20fb6001f
    iscsiDirHostPathType: DirectoryOrCreate
    extraEnv:
      - name: ISCSIADM_HOST_STRATEGY
        value: nsenter
      - name: ISCSIADM_HOST_PATH
        value: /usr/local/sbin/iscsiadm

volumeSnapshotClasses:
  - name: truenas-iscsi-snapshot
    driver: org.democratic-csi.truenas-iscsi
    deletionPolicy: Delete
    parameters:
      description: "Kubernetes CSI"
