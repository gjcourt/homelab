apiVersion: v1
kind: Service
metadata:
  name: snapcast
  namespace: snapcast
  labels:
    app: snapcast
  annotations:
    lbipam.cilium.io/ip-pool: home-c-pool
spec:
  type: LoadBalancer
  selector:
    app: snapcast
  ports:
    - name: stream
      port: 1704
      targetPort: 1704
      protocol: TCP
    - name: control
      port: 1705
      targetPort: 1705
      protocol: TCP
    - name: http
      port: 1780
      targetPort: 1780
      protocol: TCP

    # Spotify Connect (go-librespot zeroconf HTTP server)
    - name: spotify-zeroconf
      port: 57621
      targetPort: 57621
      protocol: TCP

    # go-librespot interactive auth callback
    - name: spotify-auth
      port: 57622
      targetPort: 57622
      protocol: TCP

    # MPD protocol — mopidy sidecar exposes port 6600 for clients
    # (Symfonium, MALP, ncmpcpp). Browse the Navidrome library, queue
    # tracks; audio streams into the snapcast `navidrome` source.
    - name: mpd
      port: 6600
      targetPort: 6600
      protocol: TCP
    # Mopidy HTTP — serves the Mopidy-Iris web client (browse Navidrome +
    # play to the `navidrome` stream). Reached via the cast.burntbytes.com
    # gateway route (LAN only) or directly on the LB IP:6680.
    - name: iris
      port: 6680
      targetPort: 6680
      protocol: TCP
