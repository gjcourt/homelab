apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-automerge
  namespace: renovate
spec:
  # Every 6 hours at :00 (00:00, 06:00, 12:00, 18:00 UTC)
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: automerge
              # python 3.14-slim
              image: python@sha256:4d7dd74c5b2d3151fe58eb8ecc9c56be13471a240ce5423ba765b04f8f95ebe8
              command: ["python3", "/scripts/automerge.py"]
              env:
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: secret-renovate-container-env
                      key: RENOVATE_TOKEN
              envFrom:
                - configMapRef:
                    name: renovate-automerge-env
                - secretRef:
                    name: secret-renovate-automerge-env
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: renovate-automerge-script
          restartPolicy: Never
