# kitchen-music — HifiBerry (10.42.2.38)
# Served at kitchen-music.burntbytes.com (flat subdomain — the existing
# *.burntbytes.com wildcard cert does not cover kitchen.music.burntbytes.com).
# HifiBerry OS web interface runs HTTP on port 80.
---
apiVersion: v1
kind: Service
metadata:
  name: kitchen-music
  namespace: external-services
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kitchen-music
  namespace: external-services
subsets:
  - addresses:
      - ip: 10.42.2.38
    ports:
      - name: http
        port: 80
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: kitchen-music-http
  namespace: external-services
spec:
  hostnames:
    - kitchen-music.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: kitchen-music-https
  namespace: external-services
spec:
  hostnames:
    - kitchen-music.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: https
  rules:
    - backendRefs:
        - name: kitchen-music
          port: 80
