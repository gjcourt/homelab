apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app: homeassistant
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: homeassistant
  # Home Assistant uses a single RWO config PVC. RollingUpdate can wedge the
  # rollout with one old pod still holding the volume and one new pod pending.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      serviceAccountName: homeassistant
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-files
          image: busybox@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
          # Write an empty YAML list for each include file if it doesn't already exist
          # or is empty (0 bytes). A bare touch creates a 0-byte file which HA refuses
          # to parse as a list, causing it to enter recovery mode and drop trusted_proxies.
          command:
            - sh
            - -c
            - |
              for f in /config/automations.yaml /config/scripts.yaml /config/scenes.yaml; do
                [ ! -s "$f" ] && printf '[]' > "$f"
              done
              true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # Tiny budget so the pod stays Burstable alongside the main
          # container. Closes the init-container portion of finding #7
          # (docs/plans/2026-05-02-critique-remediation.md).
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - image: ghcr.io/home-assistant/home-assistant@sha256:c1e5f0147f4cb51ccb05bb30b62a1269cc1bd48a6274792d3b38a77ab274dfd2
          name: homeassistant
          ports:
            - containerPort: 8123
          resources:
            requests:
              cpu: 10m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-file
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
            - name: config-file
              mountPath: /config/binary_sensors.yaml
              subPath: binary_sensors.yaml
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homeassistant-config-pvc
        - name: config-file
          configMap:
            name: homeassistant-config
