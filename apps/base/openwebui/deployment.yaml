apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: openwebui
  labels:
    app: openwebui
spec:
  # Disabled 2026-05-10: GPUs removed from hestia for sale, vLLM at
  # http://10.42.2.10:8000 is unavailable. Restore replicas to 1 once
  # GPU inference is back online (or the upstream URL is repointed).
  replicas: 0
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: openwebui
  # RWO PVC requires Recreate — only one pod can mount at a time
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      serviceAccountName: openwebui
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:v0.9.4@sha256:172e1fe0e89af2a07f42f2b1d943f30c8ddd7b9c2e182f3678b4790cdb83abea
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: openwebui-env
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          # startupProbe gates liveness/readiness while Open WebUI initializes.
          # Allows up to 5 minutes for first-run model loading.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data-pvc
