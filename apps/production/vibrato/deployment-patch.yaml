apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:d64b59ec2276c0fb2a01cbf1d9775e991a4fae3d
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
