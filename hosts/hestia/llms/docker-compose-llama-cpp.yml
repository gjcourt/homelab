services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp@sha256:a8c56356fbfde209910b8098d0a060f4b84997f23b65491df3f2b61fae91dd7b
    container_name: llama
    restart: unless-stopped
    volumes:
      - /mnt/main/ai/models/gguf:/models
    ports:
      - "8000:8080"
    command: >
      -m /models/Qwen3.6-35B-A3B-UD-IQ4_NL.gguf
      --alias Qwen3.6-35B-A3B
      --host 0.0.0.0
      --port 8080
      --ctx-size 32768
      --flash-attn on
      --cache-type-k f16
      --cache-type-v f16
      --n-gpu-layers 99
      --parallel 4
      --cont-batching
      --threads 16
      --threads-batch 16
      --batch-size 512
      --ubatch-size 512
      --temp 0.6
      --top-k 20
      --top-p 0.95
      --min-p 0
      --presence-penalty 0
      --repeat-penalty 1
      --chat-template-kwargs '{"preserve_thinking":true}'
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
                - utility
              count: all
              driver: nvidia
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
