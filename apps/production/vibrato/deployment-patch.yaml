apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:6efd7c120c5bc7058226f593f7dac40182e90203
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
