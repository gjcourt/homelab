apiVersion: apps/v1
kind: Deployment
metadata:
  name: excalidraw
  namespace: excalidraw
  labels:
    app: excalidraw
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: excalidraw
  template:
    metadata:
      labels:
        app: excalidraw
    spec:
      serviceAccountName: excalidraw
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: excalidraw
          image: excalidraw/excalidraw@sha256:20ffa04668e19616bb0c1b3632849e5cd96e0bc7a1336b73d9d072667f2c2854
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
