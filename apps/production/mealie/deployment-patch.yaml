apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  namespace: mealie
spec:
  template:
    spec:
      hostAliases:
        - ip: "192.168.5.33"
          hostnames:
            - "auth.burntbytes.com"
      containers:
        - name: mealie
          envFrom:
            - configMapRef:
                name: mealie-oidc-config
            - secretRef:
                name: mealie-oidc-secret