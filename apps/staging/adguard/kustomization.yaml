apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: adguard-stage
resources:
  - ../../base/adguard
  - configmap.yaml
  - httproute.yaml
  - secret-adguard-container-env.yaml
  - secret-sync.yaml

labels:
  - pairs:
      env: staging
      app.kubernetes.io/instance: staging
    includeSelectors: false

patches:
  - target:
      kind: Service
      name: adguard
    patch: |
      - op: replace
        path: /metadata/annotations/lbipam.cilium.io~1sharing-cross-namespace
        value: default,adguard-stage,audiobookshelf-stage,linkding-stage,mealie-stage,memos-stage
  - target:
      kind: Namespace
      name: adguard
    patch: |
      - op: replace
        path: /metadata/name
        value: adguard-stage
      # Opt staging into the cluster-wide default-deny scaffolding from
      # infra/configs/network-policies/. With this label set, the
      # CiliumClusterwideNetworkPolicy `default-deny` blocks all traffic
      # to pods in this namespace except what the per-app
      # CiliumNetworkPolicy (apps/base/adguard/networkpolicy.yaml) allows.
      - op: add
        path: /metadata/labels/network-policies
        value: enforced
  - target:
      kind: StatefulSet
      name: adguard
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: adguard
      spec:
        # Run a single replica in staging. HA (replicas: 2) requires adguard-sync
        # to bootstrap a fresh second replica before its readiness probe passes,
        # which needs manual initial setup of adguard-1. Staging does not need HA.
        replicas: 1
