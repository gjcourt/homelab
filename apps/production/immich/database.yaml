apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db-prod-cnpg-v3
  namespace: immich-prod
spec:
  description: Postgres cluster for Immich with VectorChord (vchord) for ML search
  # ==========================================================================
  # PHASE C (end state) — VectorChord only. Full procedure + ordering:
  #   docs/operations/2026-07-02-immich-v3-upgrade.md
  #
  # This is the post-migration cleanup: the dual-extension migration image
  # (Phase B / PR-B) has been applied, `CREATE EXTENSION vchord CASCADE` was run
  # as the postgres superuser, Immich v2.7.5 migrated the embeddings into
  # VectorChord and dropped the old `vectors` extension, and search/faces were
  # verified. This PR drops back to the slim VectorChord-only image
  # (tensorchord/cloudnative-vectorchord) with only vchord.so preloaded and no
  # `vectors` in the search_path.
  #
  # MUST NOT reconcile before Phase B is merged AND its manual migration +
  # verify have completed — dropping vectors.so while the DB still holds
  # pgvecto.rs data would break Immich. The vector migration is ONE-WAY: no
  # downgrade below Immich 1.133 after this.
  # ==========================================================================
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16-0.4.2@sha256:649da2df5f079dd1f214e3a877cafd0208eff3779e9c60d14d243fbca5e11c97
  instances: 3
  enableSuperuserAccess: true
  inheritedMetadata:
    labels:
      app: immich-database
      env: production
      policy-type: "database"
  monitoring:
    enablePodMonitor: true
  storage:
    # Bumped 2Gi → 10Gi (2026-07-03): replica -4 hit 99% (0 bytes free), firing
    # KubePersistentVolumeFillingUp (critical). 2Gi left no WAL/temp headroom over the
    # ~1.1Gi dataset (WAL on -4 had grown to ~2Gi). CNPG expands in place online here
    # (resizeInUseVolumes=true + truenas-iscsi allowVolumeExpansion + democratic-csi
    # v1.9.5 online resize, PR #1019). NOTE: shrinking still needs cluster recreation.
    size: 10Gi
    storageClass: truenas-iscsi
  postgresql:
    # VectorChord only. vectors.so (pgvecto.rs) was dropped in Phase C after the
    # v2.7.5 migration moved the embeddings into VectorChord and dropped the
    # `vectors` extension.
    shared_preload_libraries:
      - "vchord.so"
    parameters:
      search_path: '"$user", public'
  # WAL archiving and base backups via the Barman Cloud Plugin (v0.11.0).
  # S3 configuration is defined in objectstore.yaml (ObjectStore CRD).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: immich-db-prod-cnpg-v3-backup
        serverName: immich-db-prod-cnpg-v3
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-credentials
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vectors;
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;
        - GRANT ALL ON SCHEMA vectors TO immich;
        - GRANT ALL ON ALL TABLES IN SCHEMA vectors TO immich;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA vectors GRANT ALL ON TABLES TO immich;
  # externalClusters references the ObjectStore via the plugin for PITR/restore.
  externalClusters:
    - name: immich-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: immich-db-prod-cnpg-v3-backup
          serverName: immich-db-prod-cnpg-v3
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  # Prefer high-airflow worker nodes (cpu-tier=high) to co-locate the
  # postgres replicas with the immich-server pods and keep heat off the
  # warmer control-plane nodes. Soft preference — falls back to other
  # nodes when needed (drain, NotReady, replica count > labeled nodes).
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: homelab.gjcourt.dev/cpu-tier
                operator: In
                values:
                  - high
  # Cross-cluster spread: see apps/production/golinks/database.yaml for
  # full rationale. Soft (ScheduleAnyway) balance of CNPG postgres pods
  # across nodes via topologySpreadConstraints.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          policy-type: database
