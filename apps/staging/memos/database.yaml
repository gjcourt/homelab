apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: memos-db-staging-cnpg-v1
  namespace: memos-stage

spec:
  description: Postgres cluster for the memos application
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5

  instances: 1

  inheritedMetadata:
    labels:
      app: memos-database
      env: staging
      policy-type: "database"

  monitoring:
    enablePodMonitor: true

  # Cross-cluster spread: see apps/production/golinks/database.yaml for
  # full rationale. Soft (ScheduleAnyway) balance of CNPG postgres pods
  # across nodes via topologySpreadConstraints.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          policy-type: database

  storage:
    # Actual usage: ~634Mi; target = 20% headroom → 1Gi.
    # Requires cluster recreation (CNPG cannot shrink PVCs in-place).
    storageClass: truenas-iscsi
    size: 1Gi

  # Bootstrap from backup if available, otherwise initialize fresh
  # To restore: uncomment recovery section and comment out initdb
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: memos-db-credentials
        # recovery:
        #   source: memos-db-backup
