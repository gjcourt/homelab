apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes-stage
resources:
  - ../../base/hermes/

labels:
  - pairs:
      env: staging
      app.kubernetes.io/instance: staging
    includeSelectors: false

patches:
  - target:
      kind: Namespace
      name: hermes
    patch: |
      - op: replace
        path: /metadata/name
        value: hermes-stage
  # Staging shares the production signal-cli (staging has no registered accounts)
  - target:
      kind: ConfigMap
      name: hermes-config
    patch: |
      - op: replace
        path: /data/SIGNAL_HTTP_URL
        value: http://signal-cli-bridge.signal-cli.svc.cluster.local:8080

# Tighter checkpoint retention + DEBUG logging to keep the smaller staging PVC
# in check and surface bot behaviour while iterating. Merged on top of base's
# config.yaml via configMapGenerator behavior: merge — the file is the full
# staging config (configMapGenerator merges at the data-key level, not within
# a YAML document, so the whole file is replaced for this key).
configMapGenerator:
  - name: hermes-config-yaml
    namespace: hermes
    behavior: merge
    files:
      - config/config.yaml
