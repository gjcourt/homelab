apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: golinks-db-staging-cnpg-v1
  namespace: golinks-stage
spec:
  description: Postgres cluster for the golinks application
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 1
  inheritedMetadata:
    labels:
      app: golinks-database
      env: staging
      policy-type: "database"
  monitoring:
    enablePodMonitor: true
  # Cross-cluster spread: see apps/production/golinks/database.yaml for
  # full rationale. Soft (ScheduleAnyway) balance of CNPG postgres pods
  # across nodes via topologySpreadConstraints.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          policy-type: database
  storage:
    storageClass: truenas-iscsi
    size: 2Gi
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: golinks-db-credentials