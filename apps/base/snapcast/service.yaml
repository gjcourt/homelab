apiVersion: v1
kind: Service
metadata:
  name: snapcast
  namespace: snapcast
  labels:
    app: snapcast
  annotations:
    lbipam.cilium.io/ip-pool: home-compute-pool
    lbipam.cilium.io/ips: 10.42.2.37
spec:
  type: LoadBalancer
  # Preserve source IPs from LAN clients so the CNP fromCIDR rule can match.
  # Without this, Cilium SNATs traffic to a node IP before it reaches the pod.
  externalTrafficPolicy: Local
  selector:
    app: snapcast
  ports:
    - name: stream
      port: 1704
      targetPort: 1704
      protocol: TCP
    - name: control
      port: 1705
      targetPort: 1705
      protocol: TCP
    - name: http
      port: 1780
      targetPort: 1780
      protocol: TCP

    # Spotify Connect (go-librespot zeroconf HTTP server)
    - name: spotify-zeroconf
      port: 57621
      targetPort: 57621
      protocol: TCP

    # go-librespot interactive auth callback
    - name: spotify-auth
      port: 57622
      targetPort: 57622
      protocol: TCP
