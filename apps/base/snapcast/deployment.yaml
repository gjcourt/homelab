apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapcast
  namespace: snapcast
  labels:
    app: snapcast
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: snapcast
  template:
    metadata:
      labels:
        app: snapcast
    spec:
      serviceAccountName: snapcast
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-fifo
          # busybox 1.37
          image: busybox@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -e
              rm -f /tmp/snapfifo
              mkfifo /tmp/snapfifo
              chmod 666 /tmp/snapfifo
          # Tiny budget so the pod stays Burstable. Closes the init-container
          # portion of finding #7 (docs/plans/2026-05-02-critique-remediation.md).
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: snapcast-tmp
              mountPath: /tmp

        - name: init-spotify-fifo
          # busybox 1.37
          image: busybox@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -e
              rm -f /audio/spotify.fifo
              mkfifo /audio/spotify.fifo
              chmod 666 /audio/spotify.fifo
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: audio-pipes
              mountPath: /audio

        - name: init-navidrome-fifo
          # busybox 1.37
          image: busybox@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -e
              rm -f /audio/navidrome.fifo
              mkfifo /audio/navidrome.fifo
              chmod 666 /audio/navidrome.fifo
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: audio-pipes
              mountPath: /audio

      containers:
        - name: snapserver
          image: gjcourt/snapcast:0.34.0-snapweb0.9.3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: HOME
              value: /tmp
            # State file (server.json: client MACs, group/stream assignments) is
            # persisted to the spotify-state PVC so pod restarts don't lose stream
            # assignments. go-librespot files live at the PVC root; snapserver
            # writes to the snapserver/ subdirectory — no conflict.
            - name: XDG_CONFIG_HOME
              value: /var/lib/snapserver
          ports:
            - name: stream
              containerPort: 1704
            - name: control
              containerPort: 1705
            - name: http
              containerPort: 1780
          readinessProbe:
            tcpSocket:
              port: control
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: snapserver-config
              mountPath: /etc/snapserver.conf
              subPath: snapserver.conf
            - name: snapcast-tmp
              mountPath: /tmp
            - name: audio-pipes
              mountPath: /audio
            - name: spotify-state
              mountPath: /var/lib/snapserver
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

        - name: go-librespot
          image: gjcourt/go-librespot:v0.6.2-1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: HOME
              value: /config
          ports:
            - name: spotify-auth
              containerPort: 57622
          command:
            - sh
            - -c
            - |
              set -e
              rm -f /config/lockfile
              /usr/local/bin/go-librespot --config_dir /config
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  test -p /audio/spotify.fifo
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  test -p /audio/spotify.fifo
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: spotify-state
              mountPath: /config
            - name: go-librespot-config
              mountPath: /config/config.yml
              subPath: config.yml
              readOnly: true
            - name: audio-pipes
              mountPath: /audio
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi

        - name: mopidy
          # ghcr.io/gjcourt/mopidy:2026-06-11 — first-party image built by
          # .github/workflows/build-mopidy.yml from images/mopidy/. Digest-pinned;
          # this build adds Mopidy-Iris (#901) on top of the Debian + system
          # GStreamer/gi base.
          image: ghcr.io/gjcourt/mopidy:2026-06-11@sha256:bcbec138dc9c29a2ac56b5e265b825a82a93d57a7eece9349c8f2f5b18df6382
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            # The Navidrome URL isn't a secret — keep it a plaintext literal so
            # it's reviewable in git and can't drift inside the encrypted blob.
            # In-cluster Subsonic API (only the blog is exposed via the tunnel).
            - name: NAVIDROME_URL
              value: "http://navidrome.navidrome-prod.svc.cluster.local:4533"
            - name: NAVIDROME_USER
              valueFrom:
                secretKeyRef:
                  name: navidrome-credentials
                  key: NAVIDROME_USER
            - name: NAVIDROME_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: navidrome-credentials
                  key: NAVIDROME_PASSWORD
            - name: HOME
              value: /mopidy-state
          ports:
            - name: mpd
              containerPort: 6600
            - name: iris
              containerPort: 6680
          command:
            - sh
            - -c
            - |
              # Substitute env vars into the templated config before starting.
              # gettext-base provides envsubst in the python:slim base image.
              envsubst < /etc/mopidy/mopidy.conf > /tmp/mopidy.conf
              exec mopidy --config /tmp/mopidy.conf
          readinessProbe:
            tcpSocket:
              port: mpd
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          volumeMounts:
            - name: mopidy-config
              mountPath: /etc/mopidy/mopidy.conf
              subPath: mopidy.conf
              readOnly: true
            - name: mopidy-state
              mountPath: /mopidy-state
            - name: audio-pipes
              mountPath: /audio
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        - name: snapserver-config
          configMap:
            name: snapserver-config
        - name: snapcast-tmp
          emptyDir: {}
        - name: audio-pipes
          emptyDir: {}
        - name: spotify-state
          persistentVolumeClaim:
            claimName: snapcast-spotify-state
        - name: go-librespot-config
          configMap:
            name: go-librespot-config
        - name: mopidy-config
          configMap:
            name: mopidy-config
        - name: mopidy-state
          persistentVolumeClaim:
            claimName: snapcast-mopidy-state
