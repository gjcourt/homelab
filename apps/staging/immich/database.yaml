apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db-staging-cnpg-v1
  namespace: immich-stage
spec:
  description: Postgres cluster for Immich (staging testbed) — VectorChord, fixed 5Gi, fresh initdb bootstrap
  # ==========================================================================
  # OPERATOR-GATED — see docs/operations/2026-07-02-immich-v3-upgrade.md.
  # Migrate STAGING first (soak before prod). This "migration" image bundles
  # BOTH pgvecto.rs (vectors.so) AND VectorChord (vchord.so) + pgvector so the
  # existing pgvecto.rs vector columns stay readable while Immich (still v2.7.5)
  # rebuilds them as VectorChord. Rolling to this image only ADDS vchord.so —
  # non-destructive on its own. Do NOT bump immich to v3.0.1 until the
  # VectorChord migration here is verified. DROP EXTENSION vectors is one-way.
  # ==========================================================================
  # Official VectorChord-only image (Phase 2; config dropped vectors.so in Phase 1).
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16-0.4.2@sha256:649da2df5f079dd1f214e3a877cafd0208eff3779e9c60d14d243fbca5e11c97

  instances: 3

  enableSuperuserAccess: true

  inheritedMetadata:
    labels:
      app: immich-database
      env: staging
      policy-type: "database"

  monitoring:
    enablePodMonitor: true

  storage:
    # Staging is a small, disposable rehearsal testbed — it holds NO real data (fresh
    # initdb + a last-30-days external library that Immich re-indexes), so its size is
    # fixed at 5Gi and is INDEPENDENT of prod (prod is 10Gi). Do NOT tie this to prod.
    #
    # CNPG's admission webhook REJECTS a spec whose size is < the live PVCs ("can't
    # shrink existing storage"), which blocks the ENTIRE apps-staging reconcile
    # (learned the hard way 2026-07-03 — #1028 set 10Gi against a live 20Gi and broke
    # reconcile). Applying 5Gi against the live 20Gi therefore REQUIRES a destroy +
    # recreate of the Cluster, done in the SAME change. See docs/operations/apps/immich.md §10.
    storageClass: truenas-iscsi
    size: 5Gi

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

  # Prefer high-airflow worker nodes (cpu-tier=high). See production
  # database.yaml for rationale. Soft preference — 3 replicas across 2
  # labeled nodes means one replica lands elsewhere, which is fine.
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: homelab.gjcourt.dev/cpu-tier
                operator: In
                values:
                  - high
  # Cross-cluster spread: see apps/production/golinks/database.yaml for
  # full rationale. Soft (ScheduleAnyway) balance of CNPG postgres pods
  # across nodes via topologySpreadConstraints.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          policy-type: database

  postgresql:
    # Both preloaded during the migration window (see prod database.yaml).
    # VectorChord-only end state (migration complete; `vectors` dropped).
    shared_preload_libraries:
      - "vchord.so"
    parameters:
      search_path: '"$user", public'
      # Safety valve against a runaway/inactive replication slot pinning WAL and
      # filling this 5Gi PVC — the failure mode behind the 2026-07-10 immich-PROD
      # incident (stale slots pinned ~13Gi of WAL → CrashLoop + blocked reconcile).
      # Past this cap CNPG invalidates the lagging slot instead of retaining WAL
      # unbounded. Reloadable GUC (SIGHUP, no restart).
      max_slot_wal_keep_size: "2GB"

  # WAL archiving and base backups via the Barman Cloud Plugin (v0.11.0).
  # S3 configuration is defined in objectstore.yaml (ObjectStore CRD).
  # History:
  #   v3 — clean slate after v2 broke (barman-cloud-check-wal-archive "Expected empty archive")
  #   v4 — bumped after disaster recovery test on 2026-04-18; v4 is the live WAL path post-recovery.
  #        During recovery, the WAL archiver serverName MUST differ from the restore source
  #        serverName because barman-cloud-check-wal-archive requires an empty destination.
  #   v5 — bumped for the 2026-07 fresh-initdb testbed recreate. A freshly-initdb'd cluster
  #        MUST archive to an EMPTY serverName path, or barman-cloud-check-wal-archive fails
  #        ("Expected empty archive"). v4 already holds WAL from the DR'd cluster, so the new
  #        cluster archives to the empty v5 path instead. Bump on every future recreate.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: immich-db-staging-cnpg-v1-backup
        serverName: immich-db-staging-cnpg-v1-v5

  # Fresh-initdb bootstrap (testbed end state). Staging holds no real data, so we do
  # NOT recover from S3 — we initialize an EMPTY cluster and let Immich re-index the
  # last-30-days external library. postInitSQL runs ONCE at init as the postgres
  # SUPERUSER, so it can create the vchord extension even though the `immich` role is
  # NOT a superuser and cannot create extensions itself (this bit prod). Mirrors
  # apps/production/immich/database.yaml. VectorChord end state: create vchord
  # (CASCADEs in pgvector) + earthdistance — NOT the removed pgvecto.rs `vectors`.
  #
  # CNPG bootstrap mode is creation-time state: this initdb block only takes effect
  # when the Cluster is (re)created from scratch — it does NOT re-run on an existing
  # cluster. The switch from bootstrap.recovery → bootstrap.initdb therefore MUST be
  # paired with the destroy + recreate in docs/operations/apps/immich.md §10; applying
  # it against the live recovery-mode cluster fails with "Only one bootstrap method can
  # be specified at a time".
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-credentials
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;

  # externalClusters references the ObjectStore via the plugin for PITR/manual restore.
  # Points at the current live WAL path (v5). Not used by fresh initdb bootstrap, but
  # kept in sync so a future point-in-time restore targets the live archive.
  externalClusters:
    - name: immich-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: immich-db-staging-cnpg-v1-backup
          serverName: immich-db-staging-cnpg-v1-v5
