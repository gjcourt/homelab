apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
  - prometheus-rule.yaml
  - networkpolicy.yaml
  # SOPS-encrypted; operator-created from secret-mqtt.yaml.example
  # (kustomize build / CI fails until it exists — the intended gate).
  - secret-mqtt.yaml
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: mqttscope
      app.kubernetes.io/component: exporter
      app.kubernetes.io/part-of: homelab
      app.kubernetes.io/managed-by: flux
