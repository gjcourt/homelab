apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system

spec:
  interval: 12h
  chart:
    spec:
      chart: cilium
      version: 1.19.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
      interval: 12h
  # CRDs are pre-installed by infra/crds/cilium (infra-crds Kustomization) and
  # managed by the Cilium operator at runtime; no Helm CRD ownership needed.
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  driftDetection:
    mode: enabled

  valuesFrom:
    - kind: ConfigMap
      name: cilium-helm-values
