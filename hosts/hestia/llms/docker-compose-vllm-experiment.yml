---
# Variant compose for the vLLM frontier-model experiments plan
# (see docs/plans/2026-05-07-vllm-frontier-model-experiments.md).
#
# This file is rewritten per phase. Current contents: PHASE 7 v3
#   model:        nvidia/Gemma-4-31B-IT-NVFP4 (~31 GB on disk; NVFP4 transformer
#                                              + FP16 vision tower + embeddings)
#   parallelism:  TP=2 across both GPUs (single-GPU OOMs in v0.20.0's NVFP4 path)
#   purpose:      cross-family sanity check — different architecture (Gemma),
#                 different quant format (NVFP4) than Phase 6 v2's Qwen+AWQ.
#                 Result: 49.6 t/s decode, 0.033 s TTFT (best in matrix), 157 t/s
#                 at concurrency 8. Confirms TP=2 dense is slow on NODE topology;
#                 doesn't beat Phase 6 v2's MoE TP=2 (194.5 t/s).
#
# Iteration log for each phase lives in docs/research/2026-05-07-vllm-frontier-experiments.md.
#
# The vllm SCALE app's custom_compose_config mirrors this file. To deploy:
#   midclt call app.update vllm '{"custom_compose_config": <THIS FILE AS JSON>}'
#   midclt call app.redeploy vllm   # prefer over app.start; avoids stuck DEPLOYING states
#
# Production llama-cpp on the same port 8000 must be stopped first.
services:
  vllm:
    command:
      - '-c'
      - >-
        echo "=== START $(date) [PHASE 7 v3: Gemma-4-31B-NVFP4 / TP=2] ===" >>
        /root/.cache/huggingface/vllm.log 2>&1;
        exec vllm serve nvidia/Gemma-4-31B-IT-NVFP4
        --served-model-name gemma-4-31b-nvfp4
        --host 0.0.0.0 --port 8000
        --tensor-parallel-size 2
        --dtype auto
        --gpu-memory-utilization 0.90
        --max-model-len 16384
        --max-num-batched-tokens 4096
        --kv-cache-dtype fp8
        --enable-chunked-prefill
        --max-num-seqs 8
        --enable-auto-tool-choice
        --tool-call-parser hermes
        --trust-remote-code
        >> /root/.cache/huggingface/vllm.log 2>&1
    container_name: vllm
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
                - utility
              count: all
              driver: nvidia
    entrypoint:
      - /bin/bash
    environment:
      HUGGING_FACE_HUB_TOKEN: ""  # set in SCALE UI env-var section (masked); do not commit a real token here
      NCCL_P2P_DISABLE: '1'
      OMP_NUM_THREADS: '8'
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      TOKENIZERS_PARALLELISM: 'false'
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 1200s
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:8000/health
      timeout: 10s
    image: vllm/vllm-openai:latest
    ipc: host
    ports:
      - '8000:8000'
    restart: unless-stopped
    shm_size: 16gb
    ulimits:
      memlock:
        hard: -1
        soft: -1
      stack:
        hard: 67108864
        soft: 67108864
    volumes:
      - /mnt/main/ai/models:/root/.cache/huggingface
