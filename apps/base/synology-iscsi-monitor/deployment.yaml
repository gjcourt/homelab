apiVersion: apps/v1
kind: Deployment
metadata:
  name: synology-iscsi-exporter
  namespace: synology-iscsi-monitor
  labels:
    app: synology-iscsi-exporter
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: synology-iscsi-exporter
  template:
    metadata:
      labels:
        app: synology-iscsi-exporter
    spec:
      serviceAccountName: synology-iscsi-monitor
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          # python 3.14-slim
          image: python@sha256:0ba001803c72c128063cfa88863755f905cefabe73c026c66a5a86d8f1d63e98
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --user paramiko prometheus_client && python /app/exporter.py
          env:
            - name: HOME
              value: "/tmp"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SYNOLOGY_IP
              value: "10.42.2.11"
            - name: SYNOLOGY_USER
              value: "melodic-muse-app"
            - name: SYNOLOGY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: synology-secret
                  key: password
          ports:
            - containerPort: 8000
              name: metrics
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            # The exporter installs paramiko/prometheus_client via pip on
            # startup before listening, so allow a generous initial delay.
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: script-volume
              mountPath: /app
      volumes:
        - name: script-volume
          configMap:
            name: synology-iscsi-exporter-script
