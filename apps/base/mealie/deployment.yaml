apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  namespace: mealie
  labels:
    app: mealie
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: mealie
  # Single-replica Deployment with an RWO data PVC.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mealie
    spec:
      serviceAccountName: mealie
      automountServiceAccountToken: false
      # App runs as the upstream `abc` user (UID/GID 911) per the Mealie
      # Dockerfile (https://github.com/mealie-recipes/mealie/blob/v3.16.0/docker/Dockerfile).
      # When the entrypoint sees it is already running as 911 it skips the
      # root-only chown branch and execs straight into the app, so a hard
      # securityContext here is safe.
      securityContext:
        runAsNonRoot: true
        runAsUser: 911
        runAsGroup: 911
        fsGroup: 911
        seccompProfile:
          type: RuntimeDefault
      containers:
        # mealie v3.16.0
        - image: ghcr.io/mealie-recipes/mealie:v3.19.2@sha256:f68e959bf66f4f458893ea58facac71690fe6f2ac7a31466b5cecb41b4e99c02
          name: mealie
          ports:
            - containerPort: 9000
          readinessProbe:
            httpGet:
              path: /api/app/about
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/app/about
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: mealie-data
              mountPath: /app/data
            # Mealie / FastAPI writes upload temp files and Python tempfiles
            # under /tmp; required when readOnlyRootFilesystem is enabled.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: mealie-data
          persistentVolumeClaim:
            claimName: mealie-data-pvc
        - name: tmp
          emptyDir: {}
