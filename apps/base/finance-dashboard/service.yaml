apiVersion: v1
kind: Service
metadata:
  name: finance-dashboard
  namespace: finance-dashboard
  labels:
    app: finance-dashboard
spec:
  # Internal-only. Reach it with:
  #   kubectl -n finance-dashboard port-forward svc/finance-dashboard 8080:8080
  # then open http://localhost:8080. (Swap to type: LoadBalancer +
  # lbipam.cilium.io/ip-pool: home-c-pool for a stable LAN IP later.)
  type: ClusterIP
  selector:
    app: finance-dashboard
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
