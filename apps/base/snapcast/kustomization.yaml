apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - namespace.yaml
  - networkpolicy.yaml
  - pdb.yaml
  - service.yaml
  - serviceaccount.yaml
  - storage.yaml
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: snapcast
      app.kubernetes.io/component: audio
      app.kubernetes.io/part-of: homelab
      app.kubernetes.io/managed-by: flux
configMapGenerator:
  - name: snapserver-config
    namespace: snapcast
    files:
      - config/snapserver.conf
  - name: go-librespot-config
    namespace: snapcast
    files:
      - config/config.yml
