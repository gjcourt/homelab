apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:fb7afab9a0c8bf62397c9da5e754b56cc9247328
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
