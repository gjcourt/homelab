apiVersion: batch/v1
kind: Job
metadata:
  name: immich-db-init
  # Flux/Helm hook annotations to ensure it runs during sync/upgrade
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      name: immich-db-init
    spec:
      serviceAccountName: immich
      automountServiceAccountToken: false
      containers:
        - name: db-init
          # postgres 18-alpine
          image: postgres@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
          command: ["/bin/sh", "-c"]
          args:
            - echo "Patch me"
          env:
            - name: PGPASSWORD
            - name: PGHOST
      restartPolicy: OnFailure
