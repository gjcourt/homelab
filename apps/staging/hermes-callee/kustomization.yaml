apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes-callee-stage
resources:
  - ../../base/hermes-callee/

labels:
  - pairs:
      env: staging
      app.kubernetes.io/instance: staging
    includeSelectors: false

patches:
  - target:
      kind: Namespace
      name: hermes-callee
    patch: |
      - op: replace
        path: /metadata/name
        value: hermes-callee-stage
  # Staging shares the production signal-cli (staging has no registered accounts)
  - target:
      kind: ConfigMap
      name: hermes-config
    patch: |
      - op: replace
        path: /data/SIGNAL_HTTP_URL
        value: http://signal-cli-bridge.signal-cli.svc.cluster.local:8080
