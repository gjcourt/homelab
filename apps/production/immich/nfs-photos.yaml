# Static PV for the Immich external library NFS share.
# Repointed alcatraz (10.42.2.11) -> hestia (10.42.2.10) in the 2026-06-01
# hestia-SOT migration; see docs/plans/2026-06-01-hestia-photos-sot.md.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-photos-pv-prod
  labels:
    app: immich
    env: production
spec:
  capacity:
    storage: 5Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 10.42.2.10
    # Repointed images/photos -> media/photos per assimilation-plan Phase 4c.
    # METADATA-SAFE: the container mountPath (/mnt/photos, in deployment-patch)
    # is UNCHANGED and media/photos has an identical <owner>/<year>/<month>
    # substructure, so every asset's originalPath (/mnt/photos/...) stays the
    # same and Immich matches all 141k assets — no re-import, albums/faces/people
    # preserved. nfs.path is immutable, so applying needs a PV+PVC delete/recreate
    # (Retain — NFS data safe); do it with immich scaled to 0.
    path: /mnt/main/family/media/photos
    readOnly: false
  mountOptions:
    - nfsvers=3
    - rsize=1048576
    - wsize=1048576
    - hard
    - timeo=600
    - retrans=2
    - nolock
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-photos-pvc
  namespace: immich-prod
  labels:
    app: immich
    env: production
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: immich-photos-pv-prod
  resources:
    requests:
      storage: 5Ti
