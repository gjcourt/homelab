csiDriver:
  name: "org.democratic-csi.truenas-iscsi"

driver:
  config:
    # API-only driver (FreeNASApiDriver): all ops over the TrueNAS middleware API
    # via the melodic-muse-csi key — no SSH/sudo. (Authoritative config lives in
    # the existingConfigSecret below; this field is kept in sync for clarity.)
    driver: freenas-api-iscsi
  existingConfigSecret: democratic-csi-driver-config
  existingConfigSecretKey: driver-config-file.yaml

# Pin the democratic-csi driver image off the chart default `:latest` — that tag
# silently left the fleet on a stale v1.9.0 while :latest drifted to v1.9.5.
# Digest below = the v1.9.0 already running → zero behavior change, just stops
# the silent drift. (A tested bump to v1.9.5 / chart 0.15.1 is a separate change.)
#
# ⚠️ In-place iSCSI ext4 PVC *growth* does NOT work on this Talos cluster: the
# node-side online resize2fs hits EPERM (EXT4_IOC_RESIZE_FS, cross-namespace,
# Talos kernel — not a caps/seccomp issue). To grow a volume, RECREATE the PVC
# (scale workload 0 → flux suspend → delete PVC → scale up → fresh volume) +
# cut ingestion to fit; never `kubectl patch pvc <grow>`. (xfs may dodge this —
# untested.) See docs/plans/2026-06-28-democratic-csi-ssh-to-api-driver.md.
controller:
  driver:
    image: democraticcsi/democratic-csi:v1.9.0@sha256:944d0e65077efbd9c1fdf23997eec8fac4b4bfb7c3de400f63e33a0a849c5ced

storageClasses:
  - name: truenas-iscsi
    defaultClass: false
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

  - name: truenas-iscsi-ssd
    defaultClass: false
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

  - name: truenas-iscsi-ephemeral
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

  # xfs variants of the iSCSI StorageClasses above.
  # Rationale: online PVC *expansion* works on xfs but NOT on ext4 with this
  # democratic-csi + Talos setup. ext4 node-side resize2fs fails the online
  # EXT4_IOC_RESIZE_FS ioctl with EPERM against the host-mounted globalmount;
  # xfs grows via `xfs_growfs <mountpoint>` (mountpoint-based, no block-device
  # ioctl), which succeeds. Verified end-to-end on melodic-muse 2026-06-28
  # (1Gi -> 2Gi, df confirmed 2Gi, data preserved).
  # These are *additive* — existing ext4 volumes keep their fsType and still
  # require recreate-to-grow. Use the xfs classes for NEW volumes that may
  # need to expand in place.
  - name: truenas-iscsi-xfs
    defaultClass: false
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: xfs
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

  - name: truenas-iscsi-ssd-xfs
    defaultClass: false
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: xfs
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

  - name: truenas-iscsi-ephemeral-xfs
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: xfs
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

# Talos: /etc/iscsi is a read-only tmpfs mount — DirectoryOrCreate skips the strict type check.
# hostPID required for nsenter strategy to find iscsid PID in the host process namespace.
node:
  hostPID: true
  driver:
    image: democraticcsi/democratic-csi:v1.9.0@sha256:944d0e65077efbd9c1fdf23997eec8fac4b4bfb7c3de400f63e33a0a849c5ced
    iscsiDirHostPathType: DirectoryOrCreate
    extraEnv:
      - name: ISCSIADM_HOST_STRATEGY
        value: nsenter
      - name: ISCSIADM_HOST_PATH
        value: /usr/local/sbin/iscsiadm

volumeSnapshotClasses:
  - name: truenas-iscsi-snapshot
    driver: org.democratic-csi.truenas-iscsi
    deletionPolicy: Delete
    parameters:
      description: "Kubernetes CSI"
