apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: flashcards-db-production-cnpg-v1
  namespace: flashcards-prod
spec:
  description: Postgres cluster for the flashcards sync service (production)
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 3
  inheritedMetadata:
    labels:
      app: flashcards-database
      env: production
      policy-type: "database"
  monitoring:
    enablePodMonitor: true
  storage:
    size: 5Gi
    storageClass: truenas-iscsi-ssd
  postgresql:
    parameters:
      # Safety valve against a runaway/inactive replication slot pinning WAL and
      # filling this PVC — the failure mode behind the 2026-07-10 immich incident
      # (stale slots pinned ~13Gi of WAL → CrashLoop + blocked operator reconcile).
      # Past this cap CNPG invalidates the lagging slot instead of retaining WAL
      # unbounded. Sized well under the 5Gi volume. Reloadable GUC (SIGHUP).
      max_slot_wal_keep_size: "2GB"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: flashcards-db-production-cnpg-v1-backup
        serverName: flashcards-db-production-cnpg-v1
  externalClusters:
    - name: flashcards-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: flashcards-db-production-cnpg-v1-backup
          serverName: flashcards-db-production-cnpg-v1
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: flashcards-db-credentials
