# Deployment patches for staging - GPU acceleration and database connection
# Immich v2.x requires IMMICH_CONFIG_FILE for OAuth settings. An init container
# injects the client_secret from the immich-sso-secret into the config template.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
spec:
  replicas: 1
  template:
    spec:
      # Authelia OIDC issuerUrl must resolve from within the pod.
      # AdGuard DNS rewrites are not visible to CoreDNS, so we add
      # a hostAlias pointing at the staging gateway.
      hostAliases:
        - ip: "10.42.2.41"
          hostnames:
            - auth.stage.burntbytes.com
      # No supplementalGroups: the api worker doesn't touch /dev/dri after the
      # split (transcode moved to the microservices worker).
      initContainers:
        - name: oauth-config
          # busybox 1.37
          image: busybox@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            - sh
            - -c
            - |
              sed "s/__CLIENT_SECRET_PLACEHOLDER__/${CLIENT_SECRET}/g" \
                /config-template/immich-config.json > /config/immich-config.json
          env:
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: immich-sso-secret
                  key: client_secret
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: config-rendered
              mountPath: /config
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: immich-server
          # api worker does not transcode after the split, so it needs neither
          # privileged mode nor /dev/dri (both moved to the microservices worker).
          securityContext:
            # Root (uid 0) to write client uploads to the root-owned iSCSI upload
            # volume — matches prod and removes the pre-split reliance on
            # privileged mode's CAP_DAC_OVERRIDE for that write.
            runAsUser: 0
            runAsGroup: 0
          env:
            # Immich v2.x config file for OAuth/OIDC and ffmpeg settings
            - name: IMMICH_CONFIG_FILE
              value: /etc/immich/immich-config.json
            # Database connection - use CNPG service and credentials secret
            - name: DB_HOSTNAME
              value: immich-db-staging-cnpg-v1-rw.immich-stage.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: password
          # api-only (interactive serve path); jobs moved to the microservices
          # deployment. Staging is a small testbed, so keep this modest.
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: upload
              mountPath: /usr/src/app/upload
            - name: photos
              mountPath: /mnt/photos
            - name: config-rendered
              mountPath: /etc/immich
              readOnly: true
      volumes:
        - name: upload
          persistentVolumeClaim:
            claimName: immich-upload-pvc
        - name: photos
          persistentVolumeClaim:
            claimName: immich-photos-pvc
        - name: config-template
          configMap:
            name: immich-config-file
        - name: config-rendered
          emptyDir: {}
---
# Microservices worker (staging) — rehearses the prod split topology at small
# size. Same runtime env as the api pod (privileged VAAPI transcode, DB, JSON
# OAuth/ffmpeg config via the init container) but IMMICH_WORKERS_EXCLUDE=api (base).
# Co-located with the api pod (podAffinity in base) on staging's RWO upload PVC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-microservices
  namespace: immich
spec:
  template:
    spec:
      hostAliases:
        - ip: "10.42.2.41"
          hostnames:
            - auth.stage.burntbytes.com
      securityContext:
        # Mirror prod's group set so staging is a faithful rehearsal of the prod
        # microservices worker: 44 (video) + 109 (render) for /dev/dri VAAPI
        # transcode, 100 (users) for photo/upload file access.
        supplementalGroups:
          - 44 # video group
          - 100 # users group
          - 109 # render group
      initContainers:
        - name: oauth-config
          # busybox 1.37
          image: busybox@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            - sh
            - -c
            - |
              sed "s/__CLIENT_SECRET_PLACEHOLDER__/${CLIENT_SECRET}/g" \
                /config-template/immich-config.json > /config/immich-config.json
          env:
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: immich-sso-secret
                  key: client_secret
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: config-rendered
              mountPath: /config
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: immich-microservices
          securityContext:
            privileged: true
            # Explicit root (matches prod microservices) to write transcode /
            # thumbnail output to the root-owned iSCSI upload volume, rather than
            # relying on the image-default user + privileged CAP_DAC_OVERRIDE.
            runAsUser: 0
            runAsGroup: 0
          env:
            # Hardware Acceleration for AMD (video transcode runs in this worker).
            - name: LIBVA_DRIVER_NAME
              value: radeonsi
            - name: LIBVA_DRIVERS_PATH
              value: /usr/lib/jellyfin-ffmpeg/lib/dri
            # Immich v2.x config file for OAuth/OIDC and ffmpeg settings
            - name: IMMICH_CONFIG_FILE
              value: /etc/immich/immich-config.json
            # Database connection - use CNPG service and credentials secret
            - name: DB_HOSTNAME
              value: immich-db-staging-cnpg-v1-rw.immich-stage.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: password
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: upload
              mountPath: /usr/src/app/upload
            - name: photos
              mountPath: /mnt/photos
            - name: dri
              mountPath: /dev/dri
            - name: config-rendered
              mountPath: /etc/immich
              readOnly: true
      volumes:
        - name: upload
          persistentVolumeClaim:
            claimName: immich-upload-pvc
        - name: photos
          persistentVolumeClaim:
            claimName: immich-photos-pvc
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: config-template
          configMap:
            name: immich-config-file
        - name: config-rendered
          emptyDir: {}
---
# Machine Learning with GPU acceleration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  replicas: 1
  template:
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        supplementalGroups:
          - 44 # video group
          - 109 # render group
      containers:
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:v3.0.1@sha256:cb2128c5cbc554fdaa2a036fb4419c808a9f3e0f27170e569dd9e727243da909
          securityContext:
            privileged: true
          env:
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "9.0.0"
          volumeMounts:
            - name: model-cache
              mountPath: /cache
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
      volumes:
        # model-cache is inherited from the base (emptyDir). Do NOT re-declare it
        # as a PVC here: strategic-merge keys volumes by name and would emit both
        # an emptyDir and a persistentVolumeClaim on the same volume, which the
        # API server rejects ("may not specify more than one volume type").
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
---
# Redis resource tuning
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-redis
  namespace: immich
spec:
  template:
    spec:
      containers:
        - name: redis
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
