---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: signal-cli
  namespace: signal-cli
  labels:
    app.kubernetes.io/name: signal-cli
    app.kubernetes.io/part-of: network-policies
spec:
  description: Ingress from hermes + Prometheus scrape on 8080; egress DNS + HTTPS for Signal servers.
  endpointSelector:
    matchLabels:
      app: signal-cli
  ingress:
    # hermes and hermes-callee call signal-bridge on port 8080. Cilium
    # fromEndpoints is namespace-scoped for namespaced CNPs — each hermes
    # namespace must be listed explicitly with k8s:io.kubernetes.pod.namespace.
    - fromEndpoints:
        - matchLabels:
            app: hermes
            k8s:io.kubernetes.pod.namespace: hermes-prod
        - matchLabels:
            app: hermes
            k8s:io.kubernetes.pod.namespace: hermes-stage
        - matchLabels:
            app: hermes
            k8s:io.kubernetes.pod.namespace: hermes-callee-prod
        - matchLabels:
            app: hermes
            k8s:io.kubernetes.pod.namespace: hermes-callee-stage
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Prometheus scrapes /metrics on the same bridge port (8080). Without this
    # rule the ServiceMonitor target stays up=0 — the default-deny CNP drops
    # the scrape even after the SM is discovered.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Signal protocol servers (TLS websocket over 443).
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
