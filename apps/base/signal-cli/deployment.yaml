apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-cli
  namespace: signal-cli
  labels:
    app: signal-cli
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: signal-cli
  template:
    metadata:
      labels:
        app: signal-cli
    spec:
      automountServiceAccountToken: false
      containers:
        - name: signal-cli
          image: ghcr.io/asamk/signal-cli@sha256:23a808b97eaa65e15f09809e5644aedf33e838db833552dfe825ca52dcd0940e
          command:
            - /opt/signal-cli/bin/signal-cli
            - --config
            - /var/lib/signal-cli
            - daemon
            - --tcp
            - 0.0.0.0:7583
            - --receive-mode
            - manual
            - --ignore-stories
          ports:
            - name: json-rpc
              containerPort: 7583
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: json-rpc
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: signal-cli-config
              mountPath: /var/lib/signal-cli
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: signal-bridge
          image: ghcr.io/gjcourt/signal-bridge:2026-05-02-4
          env:
            - name: SIGNAL_CLI_HOST
              value: "127.0.0.1"
            - name: SIGNAL_CLI_PORT
              value: "7583"
            - name: POLL_INTERVAL
              value: "2s"
            - name: HEARTBEAT_INTERVAL
              value: "30s"
            - name: LISTEN_ADDR
              value: "0.0.0.0"
            - name: LISTEN_PORT
              value: "8080"
            - name: HERMES_ALLOWED_ACCOUNTS
              value: "+16179397251"
            - name: HERMES_ALLOW_ALL_USERS
              value: "false"
            - name: HERMES_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: signal-bridge-auth
                  key: token
                  optional: true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: signal-cli-config
          persistentVolumeClaim:
            claimName: signal-cli-config
