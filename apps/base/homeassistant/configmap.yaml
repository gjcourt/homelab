apiVersion: v1
kind: ConfigMap
metadata:
  name: homeassistant-config
  namespace: homeassistant
data:
  configuration.yaml: |
    # Loads default set of integrations. Do not remove.
    default_config:

    # Load frontend themes from the themes folder
    frontend:
      themes: !include_dir_merge_named themes

    # Enable YAML dashboards (explicit dashboard registration)
    lovelace:
      dashboards:
        control:
          mode: yaml
          filename: dashboards/control.yaml
          title: Control
          show_in_sidebar: true

    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml
    binary_sensor: !include binary_sensors.yaml

    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.244.0.0/16  # Trust Cluster Pod CIDR
        - 10.42.2.0/24 # Trust Node Network (Envoy HostNetwork)
        - 127.0.0.1
  binary_sensors.yaml: |
    # Time-of-day sensors — used by nightlight and thermostat automations.
    # Note: workday sensor must be configured via the UI (no longer supports YAML platform setup).
    - platform: tod
      name: Night
      after: sunset
      before: sunrise

    - platform: tod
      name: Day
      after: sunrise
      before: sunset

  automations.yaml: |
    # ============================================================================
    # Bathroom fan auto-off timer
    # ============================================================================
    # NOTE: Do NOT wrap in 'automation:' key here. Since configuration.yaml
    # already has 'automation: !include automations.yaml', the included file
    # must be a bare list of automation objects.
    - alias: "Bathroom fan auto-off — start timer"
      description: "When a bathroom exhaust fan turns on, start a timer. Turns fan off when timer expires."
      trigger:
        - platform: state
          entity_id:
            - switch.*_exhaust_fan
          from: "off"
          to: "on"
      condition:
        # Only bathroom exhaust fans
        - condition: template
          value_template: >
            {{ "bathroom" in trigger.to_state.entity_id | lower or
               "bath" in trigger.to_state.entity_id | lower or
               "powder" in trigger.to_state.entity_id | lower }}
      action:
        - variables:
            # Extract bathroom name from entity ID
            # switch.master_bathroom_exhaust_fan → master_bathroom
            # switch.hall_bathroom_exhaust_fan → hall_bathroom
            # switch.powder_bathroom_exhaust_fan → powder_bathroom
            fan_name: >
              {{ trigger.to_state.object_id
                 | replace("_exhaust_fan", "") }}
            helper_id: >
              {{ "input_number." ~ fan_name ~ "_fan_minutes" }}
            timer_entity: >
              {{ "timer." ~ fan_name ~ "_fan_timer" }}
            delay_minutes: >
              {{ states(helper_id) | default("30") | int(30) }}
            delay_seconds: "{{ delay_minutes * 60 }}"
        # Start the timer with configured duration
        - service: timer.start
          target:
            entity_id: "{{ timer_entity }}"
          data:
            duration: "{{ delay_seconds }}"
      mode: restart

    - alias: "Bathroom fan auto-off — turn off fan"
      description: "When a bathroom fan timer expires, turn off the fan."
      trigger:
        - platform: event
          event_type: timer.finished
      condition:
        # Only bathroom fan timers (not other timers in the house)
        - condition: template
          value_template: >
            {{ "timer.master_bathroom" in trigger.event.data.entity_id | lower or
               "timer.hall_bathroom" in trigger.event.data.entity_id | lower or
               "timer.powder_bathroom" in trigger.event.data.entity_id | lower }}
      action:
        - variables:
            # Derive switch entity ID from timer entity ID
            # timer.master_bathroom_fan_timer → switch.master_bathroom_exhaust_fan
            # timer.hall_bathroom_fan_timer → switch.hall_bathroom_exhaust_fan
            # timer.powder_bathroom_fan_timer → switch.powder_bathroom_exhaust_fan
            switch_entity: >
              {{ trigger.event.data.entity_id
                 | replace("timer.", "switch.")
                 | replace("_fan_timer", "_exhaust_fan") }}
        # Turn off the fan
        - service: switch.turn_off
          target:
            entity_id: "{{ switch_entity }}"
          continue_on_error: true
  control.yaml: |
    # Exhaust Fan Control Dashboard
    #
    # A controlplane dashboard for exhaust fan timers.
    # Shows all exhaust fan timers, their state, and allows manual control.
    #
    # Setup per bathroom (after creating helpers via HA UI):
    #   1. Add a section below for the new bathroom
    #   2. Copy one of the existing <bathroom> sections
    #   3. Replace <bathroom> with the bathroom name
    #   4. Replace the fan entity ID with the actual switch entity
    #
    # Example for a new bathroom:
    #   - type: vertical-stack
    #     cards:
    #       - type: entity
    #         entity: timer.new_bathroom_fan_timer
    #       - type: button
    #         entity: timer.new_bathroom_fan_timer
    #         name: Cancel Timer
    #         tap_action:
    #           action: call-service
    #           service: timer.cancel
    #           service_data:
    #             entity_id: timer.new_bathroom_fan_timer
    #       - type: entity
    #         entity: switch.new_bathroom_exhaust_fan
    #       - type: button
    #         entity: switch.new_bathroom_exhaust_fan
    #         name: Turn Off
    #         tap_action:
    #           action: call-service
    #           service: switch.turn_off
    #           service_data:
    #             entity_id: switch.new_bathroom_exhaust_fan

    title: Control
    views:
      - title: Control
        badges: []
        cards:
          # ========================================================================
          # Header
          # ========================================================================
          - type: heading
            heading: Exhaust Fan Timers
            heading_size: h2

          - type: markdown
            content: >
              **How it works:** When an exhaust fan turns on, a timer starts.
              When the timer expires, the fan turns off.
              Adjust the delay per bathroom using the input helper.

          # ========================================================================
          # Master Bathroom
          # ========================================================================
          - type: vertical-stack
            cards:
              - type: heading
                heading: Master Bathroom
                heading_size: h3

              - type: horizontal-stack
                cards:
                  - type: entity
                    entity: timer.master_bathroom_fan_timer
                    name: Timer
                    state_color: true
                  - type: entity
                    entity: input_number.master_bathroom_fan_minutes
                    name: Delay (min)
                    state_color: false

              - type: horizontal-stack
                cards:
                  - type: button
                    entity: timer.master_bathroom_fan_timer
                    name: Cancel Timer
                    show_icon: false
                    tap_action:
                      action: call-service
                      service: timer.cancel
                      data:
                        entity_id: timer.master_bathroom_fan_timer
                    show_name: true
                  - type: entity
                    entity: switch.master_bathroom_exhaust_fan
                    name: Fan
                    state_color: true

              - type: button
                entity: switch.master_bathroom_exhaust_fan
                name: Turn Off Fan
                show_icon: false
                tap_action:
                  action: call-service
                  service: switch.turn_off
                  data:
                    entity_id: switch.master_bathroom_exhaust_fan
                show_name: true

          # ========================================================================
          # Hall Bathroom
          # ========================================================================
          - type: vertical-stack
            cards:
              - type: heading
                heading: Hall Bathroom
                heading_size: h3

              - type: horizontal-stack
                cards:
                  - type: entity
                    entity: timer.hall_bathroom_fan_timer
                    name: Timer
                    state_color: true
                  - type: entity
                    entity: input_number.hall_bathroom_fan_minutes
                    name: Delay (min)
                    state_color: false

              - type: horizontal-stack
                cards:
                  - type: button
                    entity: timer.hall_bathroom_fan_timer
                    name: Cancel Timer
                    show_icon: false
                    tap_action:
                      action: call-service
                      service: timer.cancel
                      data:
                        entity_id: timer.hall_bathroom_fan_timer
                    show_name: true
                  - type: entity
                    entity: switch.hall_bathroom_exhaust_fan
                    name: Fan
                    state_color: true

              - type: button
                entity: switch.hall_bathroom_exhaust_fan
                name: Turn Off Fan
                show_icon: false
                tap_action:
                  action: call-service
                  service: switch.turn_off
                  data:
                    entity_id: switch.hall_bathroom_exhaust_fan
                show_name: true

          # ========================================================================
          # Powder Bathroom
          # ========================================================================
          - type: vertical-stack
            cards:
              - type: heading
                heading: Powder Bathroom
                heading_size: h3

              - type: horizontal-stack
                cards:
                  - type: entity
                    entity: timer.powder_bathroom_fan_timer
                    name: Timer
                    state_color: true
                  - type: entity
                    entity: input_number.powder_bathroom_fan_minutes
                    name: Delay (min)
                    state_color: false

              - type: horizontal-stack
                cards:
                  - type: button
                    entity: timer.powder_bathroom_fan_timer
                    name: Cancel Timer
                    show_icon: false
                    tap_action:
                      action: call-service
                      service: timer.cancel
                      data:
                        entity_id: timer.powder_bathroom_fan_timer
                    show_name: true
                  - type: entity
                    entity: switch.powder_bathroom_exhaust_fan
                    name: Fan
                    state_color: true

              - type: button
                entity: switch.powder_bathroom_exhaust_fan
                name: Turn Off Fan
                show_icon: false
                tap_action:
                  action: call-service
                  service: switch.turn_off
                  data:
                    entity_id: switch.powder_bathroom_exhaust_fan
                show_name: true
