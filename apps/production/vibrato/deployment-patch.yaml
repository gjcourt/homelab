apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:c9a8206a4b7790861634da29d96dad81778de2a5
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
