apiVersion: v1
kind: ConfigMap
metadata:
  name: thermalscope-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  thermalscope.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 99,
          "title": "Overview — at-a-glance thermals",
          "type": "row",
          "panels": []
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Per-host CPU control temperature (Tctl). Orange ≥75°C, red ≥85°C.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 75},
                  {"color": "red", "value": 85}
                ]
              },
              "unit": "celsius",
              "min": 0,
              "max": 100
            }
          },
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 1},
          "id": 20,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": ""},
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "thermalscope_cpu_temperature_celsius{instance=~\"$instance\", sensor=\"Tctl\"}",
              "legendFormat": "{{instance}}"
            }
          ],
          "title": "CPU Tctl per host",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Hottest NVMe Composite sensor per host. Orange ≥55°C, red ≥65°C.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 55},
                  {"color": "red", "value": 65}
                ]
              },
              "unit": "celsius",
              "min": 0,
              "max": 90
            }
          },
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 1},
          "id": 21,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": ""},
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "max by (instance) (thermalscope_nvme_temperature_celsius{instance=~\"$instance\"})",
              "legendFormat": "{{instance}}"
            }
          ],
          "title": "NVMe max per host",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "UniFi gateway (UDM/UXG/UCG/UGW) board temperature. Orange ≥60°C, red ≥70°C.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 60},
                  {"color": "red", "value": 70}
                ]
              },
              "unit": "celsius",
              "min": 0,
              "max": 100
            }
          },
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 1},
          "id": 22,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": ""},
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "max by (name) (unpoller_device_temperature_celsius{type=~\"udm|uxg|ucg|ugw\"})",
              "legendFormat": "{{name}}"
            }
          ],
          "title": "UniFi gateway temp",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "UniFi PoE switch (type=usw) board temperature. Orange ≥50°C, red ≥65°C.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 50},
                  {"color": "red", "value": 65}
                ]
              },
              "unit": "celsius",
              "min": 0,
              "max": 100
            }
          },
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 1},
          "id": 23,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": ""},
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "unpoller_device_temperature_celsius{type=\"usw\"}",
              "legendFormat": "{{name}}"
            }
          ],
          "title": "UniFi switch temp",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Number of UniFi devices currently exceeding their type-specific overheating threshold. Mirrors the UniFiDeviceOverheating alert.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]
              },
              "unit": "short"
            }
          },
          "gridPos": {"h": 3, "w": 24, "x": 0, "y": 6},
          "id": 203,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": ""},
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "count(unpoller_device_temperature_celsius{type=\"usw\"} > 70) or vector(0)",
              "legendFormat": "Switches overheating"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "count(unpoller_device_temperature_celsius{type=~\"udm|uxg|ucg|ugw\"} > 75) or vector(0)",
              "legendFormat": "Gateways overheating"
            }
          ],
          "title": "Overheating Devices",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9},
          "id": 100,
          "title": "CPU",
          "type": "row",
          "panels": []
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "spanNulls": false},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 75},
                  {"color": "red", "value": 85}
                ]
              },
              "unit": "celsius"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 10},
          "id": 1,
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "thermalscope_cpu_temperature_celsius{instance=~\"$instance\", sensor=\"Tctl\"}",
              "legendFormat": "{{instance}} Tctl"
            }
          ],
          "title": "CPU Control Temperature (Tctl)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "spanNulls": false},
              "unit": "celsius"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 10},
          "id": 2,
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "thermalscope_cpu_temperature_celsius{instance=~\"$instance\", sensor=~\"Tccd.*\"}",
              "legendFormat": "{{instance}} {{sensor}}"
            }
          ],
          "title": "CPU Die Temperatures (Tccd1–4)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 18},
          "id": 101,
          "title": "NVMe Drives",
          "type": "row",
          "panels": []
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "spanNulls": false},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 55},
                  {"color": "red", "value": 65}
                ]
              },
              "unit": "celsius"
            }
          },
          "gridPos": {"h": 8, "w": 16, "x": 0, "y": 19},
          "id": 3,
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "right"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "thermalscope_nvme_temperature_celsius{instance=~\"$instance\", sensor=\"Composite\"}",
              "legendFormat": "{{instance}} {{device}}"
            }
          ],
          "title": "NVMe Drive Temperatures",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 55},
                  {"color": "red", "value": 65}
                ]
              },
              "unit": "celsius",
              "min": 0,
              "max": 90
            }
          },
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 19},
          "id": 4,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "horizontal",
            "displayMode": "gradient"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "thermalscope_nvme_temperature_celsius{instance=~\"$instance\", sensor=\"Composite\"}",
              "legendFormat": "{{instance}} {{device}}"
            }
          ],
          "title": "NVMe Current Temps",
          "type": "bargauge"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 27},
          "id": 200,
          "title": "UniFi Thermals",
          "type": "row",
          "panels": []
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Per-device board temperature for all UniFi devices reported by unpoller. One line per (device, sensor).",
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 60},
                  {"color": "red", "value": 70}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 16, "x": 0, "y": 28},
          "id": 201,
          "options": {"legend": {"displayMode": "table", "placement": "right", "showLegend": true}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "unpoller_device_temperature_celsius",
              "legendFormat": "{{name}} {{temp_area}}"
            }
          ],
          "title": "UniFi Device Temperatures",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Current board temperature per UniFi PoE switch (type=usw). Cell turns red ≥65°C — see UniFiPoESwitchTempHigh alert.",
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 50},
                  {"color": "red", "value": 65}
                ]
              },
              "min": 0,
              "max": 100
            }
          },
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 28},
          "id": 202,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": ""},
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "unpoller_device_temperature_celsius{type=\"usw\"}",
              "legendFormat": "{{name}}"
            }
          ],
          "title": "PoE Switch Temperatures",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "UniFi PoE switch fan level (0–4 typical). High sustained levels indicate elevated chassis heat.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "spanNulls": false},
              "unit": "short",
              "min": 0
            }
          },
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 36},
          "id": 204,
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "unpoller_device_fan_level{type=\"usw\"}",
              "legendFormat": "{{name}} fan level"
            }
          ],
          "title": "PoE Switch Fan Level",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 42},
          "id": 106,
          "title": "Chassis Fans (hestia)",
          "type": "row",
          "panels": []
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "spanNulls": false},
              "unit": "rotrpm"
            }
          },
          "gridPos": {"h": 8, "w": 16, "x": 0, "y": 43},
          "id": 14,
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "right"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "ipmi_fan_speed_rpm{instance=\"hestia\"}",
              "legendFormat": "{{name}}"
            }
          ],
          "title": "Chassis Fan RPM",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "orange", "value": 200},
                  {"color": "green", "value": 500}
                ]
              },
              "unit": "rotrpm",
              "min": 0,
              "max": 8000
            }
          },
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 43},
          "id": 15,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "horizontal",
            "displayMode": "gradient"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "ipmi_fan_speed_rpm{instance=\"hestia\"}",
              "legendFormat": "{{name}}"
            }
          ],
          "title": "Current Fan RPM",
          "type": "bargauge"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 51},
          "id": 300,
          "title": "Power & Energy — CPU RAPL + SoC; cost is an estimate (set $cost_per_kwh)",
          "type": "row",
          "panels": []
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Per-node CPU package power from the RAPL energy counter (rate over 5m). Backed by the instance:thermalscope_cpu_package_watts:rate5m recording rule.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "spanNulls": false},
              "unit": "watt",
              "min": 0
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 52},
          "id": 301,
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "instance:thermalscope_cpu_package_watts:rate5m{instance=~\"$instance\"}",
              "legendFormat": "{{instance}}"
            }
          ],
          "title": "CPU Package Power (RAPL)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Per-node SoC rail power reported by the amdgpu chip sensor.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "spanNulls": false},
              "unit": "watt",
              "min": 0
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 52},
          "id": 302,
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "thermalscope_power_watts{instance=~\"$instance\", chip=\"amdgpu\"}",
              "legendFormat": "{{instance}}"
            }
          ],
          "title": "SoC Power (amdgpu)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Total CPU package energy across all nodes over the trailing 24h. Backed by the instance:thermalscope_cpu_package_kwh:increase1d recording rule.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "kwatth",
              "decimals": 3,
              "min": 0
            }
          },
          "gridPos": {"h": 5, "w": 12, "x": 0, "y": 60},
          "id": 303,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": ""},
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(instance:thermalscope_cpu_package_kwh:increase1d{instance=~\"$instance\"})",
              "legendFormat": "Total CPU energy / day"
            }
          ],
          "title": "Energy per day (kWh)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Estimated monthly CPU-package electricity cost: daily kWh × 30 × $cost_per_kwh. This is an ESTIMATE driven by the editable cost_per_kwh template variable — set it to your actual rate. Covers CPU package (RAPL) only, not whole-system draw.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "currencyUSD",
              "decimals": 2,
              "min": 0
            }
          },
          "gridPos": {"h": 5, "w": 12, "x": 12, "y": 60},
          "id": 304,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": ""},
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(instance:thermalscope_cpu_package_kwh:increase1d{instance=~\"$instance\"}) * 30 * $cost_per_kwh",
              "legendFormat": "Est. CPU cost / month"
            }
          ],
          "title": "Estimated cost / month ($) — estimate, see $cost_per_kwh",
          "type": "stat"
        },
        {
          "collapsed": true,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 65},
          "id": 600,
          "title": "Wall Power (UniFi PDU) — measured per-device draw from the USP PDU Pro, not RAPL estimate",
          "type": "row",
          "panels": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "description": "Measured WALL power per PDU outlet from the UniFi USP PDU Pro (real per-device draw, not a CPU-only RAPL estimate). Only energized outlets shown (> 0 W), sorted descending. Some outlets carry an operator-set name (DS923+, 805 G6, UCG Fiber, XB8); unnamed ones show as their outlet index.",
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "thresholds"},
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {"color": "green", "value": null},
                      {"color": "orange", "value": 100},
                      {"color": "red", "value": 200}
                    ]
                  },
                  "unit": "watt",
                  "min": 0
                }
              },
              "gridPos": {"h": 10, "w": 12, "x": 0, "y": 66},
              "id": 601,
              "options": {
                "reduceOptions": {"calcs": ["lastNotNull"], "fields": ""},
                "orientation": "horizontal",
                "displayMode": "gradient",
                "sortBy": "Value",
                "sortDescending": true
              },
              "targets": [
                {
                  "datasource": {"type": "prometheus", "uid": "${datasource}"},
                  "expr": "unpoller_device_outlet_outlet_power{name=\"USP PDU Pro\"} > 0",
                  "legendFormat": "{{outlet_name}}"
                }
              ],
              "title": "Wall power per device (PDU outlets)",
              "type": "bargauge"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "description": "Total AC power consumption reported by the UniFi USP PDU Pro — the true whole-rack wall draw for everything plugged into it.",
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "palette-classic"},
                  "custom": {"lineWidth": 2, "spanNulls": false},
                  "unit": "watt",
                  "min": 0
                }
              },
              "gridPos": {"h": 5, "w": 12, "x": 12, "y": 66},
              "id": 602,
              "options": {
                "tooltip": {"mode": "multi"},
                "legend": {"displayMode": "list", "placement": "bottom"}
              },
              "targets": [
                {
                  "datasource": {"type": "prometheus", "uid": "${datasource}"},
                  "expr": "unpoller_device_outlet_ac_power_consumption{name=\"USP PDU Pro\"}",
                  "legendFormat": "PDU total"
                }
              ],
              "title": "PDU total (W)",
              "type": "timeseries"
