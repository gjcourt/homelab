apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  - httproute.yaml
  # SOPS-encrypted, operator-created from the .example templates. CI / kustomize
  # build fails until both exist — the intended gate.
  - secret-positions.yaml
  - secret-ghcr.yaml
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: finance-dashboard
      app.kubernetes.io/component: web
      app.kubernetes.io/part-of: homelab
      app.kubernetes.io/managed-by: flux
