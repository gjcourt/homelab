apiVersion: batch/v1
kind: Job
metadata:
  name: immich-db-init
  # Flux/Helm hook annotations to ensure it runs during sync/upgrade
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      name: immich-db-init
    spec:
      serviceAccountName: immich
      automountServiceAccountToken: false
      containers:
        - name: db-init
          # postgres 18-alpine
          image: postgres@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a
          command: ["/bin/sh", "-c"]
          args:
            - echo "Patch me"
          env:
            - name: PGPASSWORD
            - name: PGHOST
      restartPolicy: OnFailure
