# Staging storage - patches base storage with staging-specific sizes
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-pvc
  namespace: jellyfin
  labels:
    app: jellyfin
    env: staging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Actual usage: ~220Mi; minimum LUN size on Synology iSCSI is 1Gi.
      # Requires PVC deletion to take effect (PVCs cannot shrink in-place).
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache-pvc
  namespace: jellyfin
  labels:
    app: jellyfin
    env: staging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Actual usage: ~14Mi; minimum LUN size on Synology iSCSI is 1Gi.
      # Was 10Gi (massively over-provisioned).
      # Requires PVC deletion to take effect.
      storage: 1Gi
