apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: snapcast-http
  namespace: snapcast-prod
spec:
  hostnames:
    - snapcast.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: snapcast-https
  namespace: snapcast-prod
spec:
  hostnames:
    - snapcast.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: https
  rules:
    - backendRefs:
        - name: snapcast
          port: 1780
---
# Mopidy-Iris web client at cast.burntbytes.com. LAN-only — matches the
# *.burntbytes.com wildcard gateway listener + AdGuard rewrite; NOT added to
# the Cloudflare tunnel (only the blog is exposed off-LAN). The bare host
# redirects to /iris/ since Mopidy's HTTP root only lists apps.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: cast-http
  namespace: snapcast-prod
spec:
  hostnames:
    - cast.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: cast-https
  namespace: snapcast-prod
spec:
  hostnames:
    - cast.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: https
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /iris/
            statusCode: 302
    - backendRefs:
        - name: snapcast
          port: 6680
