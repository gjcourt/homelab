# Production storage - patches base storage with larger sizes
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-pvc
  namespace: jellyfin
  labels:
    app: jellyfin
    env: production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Actual usage: ~227Mi; minimum LUN size on Synology iSCSI is 1Gi.
      # Requires PVC deletion to take effect (PVCs cannot shrink in-place).
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache-pvc
  namespace: jellyfin
  labels:
    app: jellyfin
    env: production
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: synology-iscsi
  resources:
    requests:
      # Actual usage: ~32Mi; minimum LUN size on Synology iSCSI is 1Gi.
      # Was 50Gi (massively over-provisioned).
      # Requires PVC deletion to take effect.
      storage: 1Gi
