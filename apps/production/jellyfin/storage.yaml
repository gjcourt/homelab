# Production storage - patches base storage with larger sizes
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-pvc
  namespace: jellyfin
  labels:
    app: jellyfin
    env: production
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi
  resources:
    requests:
      # Actual usage: ~227Mi. Jellyfin 10.11+ requires 2GiB free in /config/data;
      # bumped from 1Gi to 5Gi to satisfy that check.
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache-pvc
  namespace: jellyfin
  labels:
    app: jellyfin
    env: production
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi
  resources:
    requests:
      # /cache holds transcode segments + image/metadata cache and grows with use.
      # Hit 5Gi (99.6% full, 0 bytes free) on 2026-07-02, firing
      # KubePersistentVolumeFillingUp (critical). Bumped 5Gi -> 20Gi for transcode
      # headroom; storageClassName truenas-iscsi has allowVolumeExpansion=true so
      # this expands online.
      storage: 20Gi
