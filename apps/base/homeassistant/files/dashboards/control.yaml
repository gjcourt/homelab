views:
- title: Control
  type: sections
  max_columns: 3
  sections:
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Bathroom Fan Timers
      heading_style: title
    - type: markdown
      content: '**How it works:** when a bathroom exhaust fan switch turns on, a timer starts using the per-bathroom **Minutes** value. When the timer expires, the switch turns off automatically. Flipping the switch off manually cancels the timer.'
  - type: grid
    column_span: 1
    cards:
    - type: heading
      heading: Hall Bathroom
      heading_style: title
    - type: tile
      entity: switch.hall_bathroom_exhaust_fan
      name: Fan
      color: amber
      tap_action:
        action: toggle
    - type: tile
      entity: timer.hall_bathroom_fan_timer
      name: Timer
    - type: tile
      entity: input_number.hall_bathroom_fan_minutes
      name: Minutes
      features_position: bottom
      features:
      - type: numeric-input
    - type: button
      name: Cancel Timer
      icon: mdi:timer-off
      tap_action:
        action: call-service
        service: timer.cancel
        data:
          entity_id: timer.hall_bathroom_fan_timer
  - type: grid
    column_span: 1
    cards:
    - type: heading
      heading: Master Bathroom
      heading_style: title
    - type: tile
      entity: switch.master_bathroom_exhaust_fan
      name: Fan
      color: amber
      tap_action:
        action: toggle
    - type: tile
      entity: timer.master_bathroom_fan_timer
      name: Timer
    - type: tile
      entity: input_number.master_bathroom_fan_minutes
      name: Minutes
      features_position: bottom
      features:
      - type: numeric-input
    - type: button
      name: Cancel Timer
      icon: mdi:timer-off
      tap_action:
        action: call-service
        service: timer.cancel
        data:
          entity_id: timer.master_bathroom_fan_timer
  - type: grid
    column_span: 1
    cards:
    - type: heading
      heading: Powder Bathroom
      heading_style: title
    - type: tile
      entity: switch.powder_bathroom_exhaust_fan
      name: Fan
      color: amber
      tap_action:
        action: toggle
    - type: tile
      entity: timer.powder_bathroom_fan_timer
      name: Timer
    - type: tile
      entity: input_number.powder_bathroom_fan_minutes
      name: Minutes
      features_position: bottom
      features:
      - type: numeric-input
    - type: button
      name: Cancel Timer
      icon: mdi:timer-off
      tap_action:
        action: call-service
        service: timer.cancel
        data:
          entity_id: timer.powder_bathroom_fan_timer
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Laundry Room Lights
      heading_style: title
    - type: markdown
      content: '**How it works:** when either laundry room light turns on, a timer starts using the **Minutes** value. When the timer expires, both lights turn off. Turning both lights off manually before the timer expires cancels the timer.'
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Laundry Room
      heading_style: title
    - type: tile
      entity: light.laundry_room_main_lights
      name: Main Lights
      color: amber
      tap_action:
        action: toggle
    - type: tile
      entity: light.laundry_room_cove
      name: Cove
      color: amber
      tap_action:
        action: toggle
    - type: tile
      entity: timer.laundry_room_light_timer
      name: Timer
    - type: tile
      entity: input_number.laundry_room_light_minutes
      name: Minutes
      features_position: bottom
      features:
      - type: numeric-input
    - type: button
      name: Cancel Timer
      icon: mdi:timer-off
      tap_action:
        action: call-service
        service: timer.cancel
        data:
          entity_id: timer.laundry_room_light_timer
    - type: button
      name: Turn Off Both
      icon: mdi:lightbulb-off
      tap_action:
        action: call-service
        service: light.turn_off
        target:
          entity_id:
          - light.laundry_room_main_lights
          - light.laundry_room_cove
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Nightlight
      heading_style: title
    - type: markdown
      content: '**How it works:** at sundown, if the master Lutron switch is off, turn it on and set both chandelier LEDs to **Preset Brightness**. If the switch is already on, only LEDs that are currently off get bumped to preset; running LEDs are left alone. At the **Turn-Off Time + today''s jitter**, the master switch turns off.'
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Dining Room Chandelier
      heading_style: title
    - type: tile
      entity: switch.dining_room_chandelier
      name: Master Switch
      color: amber
      tap_action:
        action: toggle
    - type: tile
      entity: light.0xa4c138b55dac7973
      name: Chandelier Central
      color: amber
    - type: tile
      entity: light.0xa4c138a9f6011cac
      name: Chandelier Flowers
      color: amber
    - type: tile
      entity: sensor.nightlight_turn_off_time
      name: Tonight's Off Time
      color: blue
  - type: grid
    column_span: 3
    cards:
    - type: heading
      heading: Nightlight Settings
      heading_style: title
    - type: tile
      entity: input_number.nightlight_brightness
      name: Preset Brightness
      features_position: bottom
      features:
      - type: numeric-input
    - type: tile
      entity: input_datetime.nightlight_turnoff_time
      name: Turn-Off Time
    - type: tile
      entity: input_number.nightlight_random_offset
      name: Jitter (max)
      features_position: bottom
      features:
      - type: numeric-input
    - type: tile
      entity: input_number.nightlight_offset_today
      name: Jitter (today)
