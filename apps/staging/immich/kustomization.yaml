apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: immich-stage
resources:
  - ../../base/immich/
  - cronjob-photos-30d.yaml
  - database.yaml
  - httproute.yaml
  - nfs-photos.yaml
  - objectstore.yaml
  - scheduledbackup.yaml
  - secret-aws-creds.yaml
  - secret-db-credentials.yaml
  - secret-sso.yaml

labels:
  - pairs:
      env: staging
      app.kubernetes.io/instance: staging
    includeSelectors: false

# OAuth/OIDC config template. The init container in deployment-patch.yaml
# reads /config-template/immich-config.json, substitutes the SOPS-decrypted
# CLIENT_SECRET, and writes the rendered file to an emptyDir volume that
# immich-server reads as IMMICH_CONFIG_FILE. The hash suffix on the
# generated ConfigMap name guarantees a rolling restart on edit, with
# Kustomize's nameReference transformer rewriting the volume reference.
configMapGenerator:
  - name: immich-config-file
    namespace: immich
    files:
      - config/immich-config.json

patches:
  - path: deployment-patch.yaml
  - path: storage.yaml
  - path: job-patch.yaml
  - target:
      kind: Namespace
      name: immich
    patch: |
      - op: replace
        path: /metadata/name
        value: immich-stage
