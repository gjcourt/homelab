# alcatraz — NAS (10.4.2.11)
# Adjust port to match the device's actual web UI port.
---
apiVersion: v1
kind: Service
metadata:
  name: alcatraz
  namespace: external-services
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: alcatraz
  namespace: external-services
subsets:
  - addresses:
      - ip: 10.4.2.11
    ports:
      - name: http
        port: 80
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: alcatraz-http
  namespace: external-services
spec:
  hostnames:
    - alcatraz.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: alcatraz-https
  namespace: external-services
spec:
  hostnames:
    - alcatraz.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: https
  rules:
    - backendRefs:
        - name: alcatraz
          port: 80
