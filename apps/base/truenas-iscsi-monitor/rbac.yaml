# Read-only access to PersistentVolumes is required so the exporter can
# join TrueNAS extents (named csi-pvc-<UUID>-k8s) back to a Kubernetes
# claimRef (namespace/PVC). PVs are cluster-scoped, so this has to be a
# ClusterRole; we limit verbs to the minimum and bind to the singleton
# ServiceAccount in the truenas-iscsi-monitor namespace.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: truenas-iscsi-monitor-pv-reader
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: truenas-iscsi-monitor-pv-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: truenas-iscsi-monitor-pv-reader
subjects:
  - kind: ServiceAccount
    name: truenas-iscsi-monitor
    namespace: truenas-iscsi-monitor
