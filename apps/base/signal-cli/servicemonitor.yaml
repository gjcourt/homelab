apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: signal-cli-bridge
  namespace: signal-cli
  labels:
    app: signal-cli
spec:
  selector:
    matchLabels:
      app: signal-cli
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 5s
