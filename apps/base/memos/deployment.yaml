apiVersion: apps/v1
kind: Deployment
metadata:
  name: memos
  namespace: memos
  labels:
    app: memos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memos
  # Single-replica Deployment with an RWO data PVC.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: memos
    spec:
      # App runs as the upstream `nonroot` user (UID/GID 10001) per the Memos
      # Dockerfile (https://github.com/usememos/memos/blob/main/scripts/Dockerfile).
      # The entrypoint chown's /var/opt/memos only when started as root; running
      # as 10001 directly skips that branch and execs the binary, so the
      # readOnlyRootFilesystem container securityContext is safe. fsGroup is
      # set to 10001 so the data PVC is group-owned by the app's group.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: memos
          image: neosmemo/memos@sha256:6088f656db8ffa928338d174295b35403d7b7c0015dce93bbc8a48ceb6932362
          ports:
            - containerPort: 5230

          envFrom:
            - configMapRef:
                name: memos-container-env

          volumeMounts:
            - name: memos-data
              mountPath: /var/opt/memos
            # Go binary + entrypoint shell script need a writable /tmp
            # (tempfile uploads, intermediate files); required when
            # readOnlyRootFilesystem is enabled.
            - name: tmp
              mountPath: /tmp

          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      volumes:
        - name: memos-data
          persistentVolumeClaim:
            claimName: memos-data-pvc
        - name: tmp
          emptyDir: {}
