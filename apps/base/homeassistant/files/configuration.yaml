# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Lovelace runs in storage mode (the default). All dashboards (Map, Floor Plan,
# Switchboard, Control) are registered in /config/.storage/lovelace_dashboards
# and edited via the HA UI's Lovelace editor. We do not register any YAML-mode
# dashboards from this file: HA's slug validator hard-rejects single-word slugs
# like `control` / `switchboard`, and `mode: yaml` in the storage registry is
# silently ignored (HA always uses LovelaceStorage for storage-registered
# dashboards regardless of the `mode` field).

# Auto-off helpers. Each has:
#   timer.<name>_timer       — counts down once triggered
#   input_number.<name>_minutes — operator-configurable timeout
#
# Bathroom fans (via Lutron Caseta switches):
#   timer.hall_bathroom_fan_timer / input_number.hall_bathroom_fan_minutes
#   timer.master_bathroom_fan_timer / input_number.master_bathroom_fan_minutes
#   timer.powder_bathroom_fan_timer / input_number.powder_bathroom_fan_minutes
#
# Laundry room lights (via Lutron Caseta):
#   timer.laundry_room_light_timer / input_number.laundry_room_light_minutes
#
# The auto-off automations in automations.yaml tie them to the corresponding
# Lutron Caseta switch/light entities.
input_number:
  hall_bathroom_fan_minutes:
    name: Hall Bathroom Fan Timer
    min: 4
    max: 45
    step: 1
    initial: 30
    unit_of_measurement: min
    mode: slider
  master_bathroom_fan_minutes:
    name: Master Bathroom Fan Timer
    min: 4
    max: 45
    step: 1
    initial: 30
    unit_of_measurement: min
    mode: slider
  powder_bathroom_fan_minutes:
    name: Powder Bathroom Fan Timer
    min: 4
    max: 45
    step: 1
    initial: 30
    unit_of_measurement: min
    mode: slider
  nightlight_brightness:
    name: Nightlight Brightness
    min: 1
    max: 100
    step: 1
    initial: 6
    unit_of_measurement: "%"
    mode: slider
  nightlight_random_offset:
    # Max jitter (in minutes) applied to the configured turn-off time.
    # The actual jitter for today is picked at midnight and stored in
    # `nightlight_offset_today` below — this entry is just the user-facing
    # cap. See the "Nightlight" automations in automations.yaml.
    name: Nightlight Random Offset (max)
    min: 0
    max: 120
    step: 5
    initial: 30
    unit_of_measurement: min
    mode: slider
  nightlight_offset_today:
    # Today's actual jitter, in minutes. Written at midnight by the
    # "Nightlight — pick today's random offset" automation; read by the
    # `sensor.nightlight_turnoff_time` template. Defaults to 0 on cold
    # start; the homeassistant-start priming automation re-rolls it.
    name: Nightlight Offset (today)
    min: 0
    max: 120
    step: 1
    initial: 0
    unit_of_measurement: min
    mode: box
  laundry_room_light_minutes:
    name: Laundry Room Light Timer
    min: 5
    max: 120
    step: 5
    initial: 30
    unit_of_measurement: min
    mode: slider

timer:
  hall_bathroom_fan_timer:
    name: Hall Bathroom Fan Timer
  master_bathroom_fan_timer:
    name: Master Bathroom Fan Timer
  powder_bathroom_fan_timer:
    name: Powder Bathroom Fan Timer
  laundry_room_light_timer:
    name: Laundry Room Light Timer

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
binary_sensor: !include binary_sensors.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 10.244.0.0/16  # Trust Cluster Pod CIDR
    - 10.42.2.0/24 # Trust Node Network (Envoy HostNetwork)
    - 127.0.0.1

input_datetime:
  nightlight_turnoff_time:
    name: Nightlight Turn Off Time
    has_date: false
    has_time: true
    initial: "23:00"

# Nightlight template sensor — turn-off time = base time + today's offset.
# Today's offset is held in input_number.nightlight_offset_today (single
# source of truth; written at midnight by the priming automation). The
# previous design had a template `sensor.nightlight_random_offset` that
# read input_number.nightlight_random_offset.max (the *schema* max, always
# 120) and produced a non-random `day_of_year % 121` value — and the
# midnight automation simultaneously corrupted the user's max setting by
# writing a random into the state. Both have been retired.
template:
  - sensor:
      - name: "Nightlight Turn Off Time"
        unique_id: nightlight_turnoff_time
        state: >
          {% set ts = state_attr('input_datetime.nightlight_turnoff_time', 'timestamp') %}
          {% if ts is none %}
            {% set base_minutes = 23 * 60 %}
          {% elif ts is string %}
            {% set base_time = strptime(ts, '%H:%M') %}
            {% set base_minutes = base_time.hour * 60 + base_time.minute %}
          {% else %}
            {# timestamp is SECONDS since midnight (verified live: 23:00 → 82800) #}
            {% set base_minutes = (ts | int) // 60 %}
          {% endif %}
          {% set offset = states('input_number.nightlight_offset_today') | int(0) %}
          {% set total_minutes = (base_minutes + offset) % 1440 %}
          {{ '%02d:%02d' | format(total_minutes // 60, total_minutes % 60) }}
