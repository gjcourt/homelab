apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:47fb115af718abfc7722358bf8286a498ba6b818
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
