# hestia — TrueNAS GPU server (10.42.2.10)
# TrueNAS web UI runs HTTPS on 443. appProtocol: kubernetes.io/https tells
# Cilium Envoy to use TLS for the upstream connection (requires
# enable-gateway-api-app-protocol: true in cilium-config, which is set).
# BackendTLSPolicy (v1) is retained but currently a no-op: Cilium 1.19 only
# reconciles the deprecated v1alpha3 version of this resource.
# Prereq: TrueNAS must have a valid TLS cert for hestia.burntbytes.com.
---
apiVersion: v1
kind: Service
metadata:
  name: hestia
  namespace: external-services
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443
      appProtocol: kubernetes.io/https
---
apiVersion: v1
kind: Endpoints
metadata:
  name: hestia
  namespace: external-services
subsets:
  - addresses:
      - ip: 10.42.2.10
    ports:
      - name: https
        port: 443
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: hestia-http
  namespace: external-services
spec:
  hostnames:
    - hestia.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: hestia-https
  namespace: external-services
spec:
  hostnames:
    - hestia.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: https
  rules:
    - backendRefs:
        - name: hestia
          port: 443
---
# BackendTLSPolicy: gateway uses TLS to reach hestia:443 and validates the
# cert against system (Let's Encrypt) CAs.
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: hestia-tls
  namespace: external-services
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: hestia
  validation:
    wellKnownCACertificates: System
    hostname: hestia.burntbytes.com
