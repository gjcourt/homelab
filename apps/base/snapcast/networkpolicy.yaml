---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: snapcast
  namespace: snapcast
  labels:
    app.kubernetes.io/name: snapcast
    app.kubernetes.io/part-of: network-policies
spec:
  description: Snapserver ingress on 1704/1705 from LAN; web UI on 1780 from gateway; egress DNS + HTTPS for Spotify Connect.
  endpointSelector:
    matchLabels:
      app: snapcast
  ingress:
    # Snapserver stream + control: allow from anywhere on the LAN (snapclients
    # connect directly, not through the gateway).
    - fromEntities:
        - world
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "1704"
              protocol: TCP
            - port: "1705"
              protocol: TCP
    # Snapweb UI: routed through the Cilium gateway.
    - fromEntities:
        - host
        - remote-node
        - ingress
      toPorts:
        - ports:
            - port: "1780"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # go-librespot (Spotify Connect) connects to Spotify's servers over HTTPS.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
