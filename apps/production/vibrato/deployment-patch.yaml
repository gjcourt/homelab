apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:f4eac75bc3d4a36ec1e86ee5b107332f0cca0be3
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
