# hestia — TrueNAS GPU server (10.42.2.10)
# TrueNAS UI is served over HTTP on port 80 (no redirect to HTTPS when
# ui_httpsredirect is false). The gateway terminates TLS at the edge and
# proxies plaintext HTTP to hestia:80 — no backend TLS required.
# Note: BackendTLSPolicy (v1) is unsupported in Cilium 1.19 (only v1alpha3
# was implemented); appProtocol: kubernetes.io/https triggers the GAMMA
# reconciler and breaks gateway routing. Port-80 approach avoids both issues.
---
apiVersion: v1
kind: Service
metadata:
  name: hestia
  namespace: external-services
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: hestia
  namespace: external-services
subsets:
  - addresses:
      - ip: 10.42.2.10
    ports:
      - name: http
        port: 80
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: hestia-http
  namespace: external-services
spec:
  hostnames:
    - hestia.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: hestia-https
  namespace: external-services
spec:
  hostnames:
    - hestia.burntbytes.com
  parentRefs:
    - name: app-gateway-production
      namespace: default
      sectionName: https
  rules:
    - backendRefs:
        - name: hestia
          port: 80
