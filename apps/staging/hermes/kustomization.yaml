apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes-stage
resources:
  - ../../base/hermes/

labels:
  - pairs:
      env: staging
      app.kubernetes.io/instance: staging
    includeSelectors: false

patches:
  - target:
      kind: Namespace
      name: hermes
    patch: |
      - op: replace
        path: /metadata/name
        value: hermes-stage
  # Staging targets signal-cli-stage namespace
  - target:
      kind: ConfigMap
      name: hermes-config
    patch: |
      - op: replace
        path: /data/SIGNAL_HTTP_URL
        value: http://signal-cli-bridge.signal-cli-stage.svc.cluster.local:8080
  # Tighter checkpoint retention to keep the smaller staging PVC in check
  - target:
      kind: ConfigMap
      name: hermes-config-yaml
    patch: |
      - op: replace
        path: /data/config.yaml
        value: |
          model:
            default: Qwen3.6-35B-A3B
            provider: custom
            base_url: http://10.42.2.10:8000/v1
          providers: {}
          fallback_providers: []
          toolsets:
            - hermes-signal
            - file
            - web
          agent:
            max_turns: 90
            gateway_timeout: 1800
            restart_drain_timeout: 60
            api_max_retries: 3
            tool_use_enforcement: auto
            reasoning_effort: medium
            verbose: true
          checkpoints:
            enabled: true
            max_snapshots: 5
            auto_prune: true
            retention_days: 3
            delete_orphans: true
            min_interval_hours: 24
          prompt_caching:
            cache_ttl: 5m
          display:
            personality: helpful
            streaming: true
          code_execution:
            mode: project
            max_tool_calls: 50
            timeout: 300
          logging:
            level: DEBUG
            max_size_mb: 5
            backup_count: 3
