# Static PV for the hestia NFS movies library (canonical: family/media/video/*).
# PVs are cluster-scoped, so this is a separate resource file.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-movies-pv
  labels:
    app: jellyfin
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 10.42.2.10
    path: /mnt/main/family/media/video/movies
    readOnly: true
  mountOptions:
    - nfsvers=3
    - rsize=1048576
    - wsize=1048576
    - hard
    - timeo=600
    - retrans=2
    - nolock
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-movies-pvc
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: jellyfin-movies-pv
  resources:
    requests:
      storage: 1Ti
---
