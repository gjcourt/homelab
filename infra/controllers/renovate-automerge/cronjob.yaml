apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-automerge
  namespace: renovate
spec:
  # Every 6 hours at :00 (00:00, 06:00, 12:00, 18:00 UTC)
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      # Auto-delete finished jobs after 1h so a stray failure doesn't linger as a
      # persistent KubeJobFailed alert.
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          containers:
            - name: automerge
              # python 3.14-slim
              image: python@sha256:09b29c360b84742bf98eba40b214f7f6b4b53286bb2c8a8b5b1afa188a8d9c0e
              command: ["python3", "/scripts/automerge.py"]
              env:
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: secret-renovate-container-env
                      key: RENOVATE_TOKEN
              envFrom:
                - configMapRef:
                    name: renovate-automerge-env
                - secretRef:
                    name: secret-renovate-automerge-env
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: renovate-automerge-script
          restartPolicy: Never
