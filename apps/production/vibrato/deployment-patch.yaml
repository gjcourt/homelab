apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:c7210cc06e2527e387c20bb2f58702a1be7c9d8a
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
