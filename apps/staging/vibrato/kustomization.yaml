apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vibrato-stage
resources:
  - ../../base/vibrato/
  - httproute.yaml
labels:
  - pairs:
      env: staging
      app.kubernetes.io/instance: staging
    includeSelectors: false
patches:
  - path: deployment-patch.yaml
  - target:
      kind: Namespace
      name: vibrato
    patch: |
      - op: replace
        path: /metadata/name
        value: vibrato-stage
