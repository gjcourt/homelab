# Staging storage - patches base storage with staging-specific sizes
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-pvc
  namespace: jellyfin
  labels:
    app: jellyfin
    env: staging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Actual usage: ~220Mi. Jellyfin 10.11+ requires 2GiB free in /config/data;
      # bumped from 1Gi to 5Gi to satisfy that check.
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache-pvc
  namespace: jellyfin
  labels:
    app: jellyfin
    env: staging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Actual usage: ~14Mi. Jellyfin 10.11+ requires 2GiB free in /cache;
      # bumped from 1Gi to 5Gi to satisfy that check.
      storage: 5Gi
