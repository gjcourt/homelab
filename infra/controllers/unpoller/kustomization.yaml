apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# unpoller — Prometheus exporter for UniFi (UCG-Fiber + USW + UAP).
# Powers the UniFi Thermals row on the ThermalScope dashboard and the
# alerts in infra/configs/unpoller/prometheus-rule.yaml.
#
# secret.sops.yaml is an out-of-tree dependency: the operator creates
# the UniFi API key, fills secret.sops.yaml.example, renames, encrypts
# with sops, and commits to this branch. Until that file exists,
# `kustomize build infra/controllers` will fail on this resource —
# that's the intentional gate.
resources:
  - repository.yaml
  - helmrelease.yaml
  - service.yaml
  - secret.sops.yaml
