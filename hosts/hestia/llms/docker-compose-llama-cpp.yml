services:
  llama:
    image: ghcr.io/gjcourt/llama-cpp-bench:latest
    container_name: llama
    restart: unless-stopped
    volumes:
      - /mnt/main/ai/models/gguf:/models
    ports:
      - "8000:8080"
    command: >
      -m /models/Qwen3.6-35B-A3B-UD-IQ4_NL.gguf
      --alias Qwen3.6-35B-A3B
      --host 0.0.0.0
      --port 8080
      --ctx-size 409600
      --cache-type-k q8_0
      --cache-type-v q8_0
      --n-gpu-layers 99
      --parallel 1
      --cont-batching
      --threads 8
      --temp 0.6
      --top-k 20
      --top-p 0.95
      --min-p 0
      --presence-penalty 0
      --repeat-penalty 1
      --chat-template-kwargs '{"preserve_thinking":true}'
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
                - utility
              count: all
              driver: nvidia
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
