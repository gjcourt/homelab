apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:63e82444118893ddc18c3d9ec522e62005b581ea
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
