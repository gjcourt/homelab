apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi-truenas-iscsi
  namespace: democratic-csi
spec:
  interval: 12h
  chart:
    spec:
      chart: democratic-csi
      version: ">=0.14.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: democratic-csi
      interval: 12h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediationStrategy: uninstall
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: democratic-csi-truenas-iscsi-helm-values
