apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: mosquitto
  labels:
    app: mosquitto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          # eclipse-mosquitto 2.0
          image: eclipse-mosquitto@sha256:6f8d8a947c506f8a2290ec65cd4bd2bc7cb4d43fb5f6271f861cb013e2ef9797
          ports:
            - containerPort: 1883
              name: mqtt
            - containerPort: 9001
              name: websockets
          readinessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
            # Mount each secret key as a real file via subPath, NOT the whole
            # secret as a directory. A directory mount projects each key as a
            # symlink (passwordfile -> ..data/passwordfile); mosquitto 2.1.2
            # refuses to open the symlinked password_file ("Unable to open
            # pwfile") and crashloops. subPath yields a real file it can open.
            - name: auth
              mountPath: /mosquitto/auth/passwordfile
              subPath: passwordfile
              readOnly: true
            - name: auth
              mountPath: /mosquitto/auth/acl
              subPath: acl
              readOnly: true
            - name: data
              mountPath: /mosquitto/data
      volumes:
        - name: config
          configMap:
            name: mosquitto-config
        - name: auth
          secret:
            secretName: mosquitto-auth
        - name: data
          persistentVolumeClaim:
            claimName: mosquitto-data-pvc
