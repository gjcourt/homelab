apiVersion: v1
kind: ServiceAccount
metadata:
  name: truenas-iscsi-monitor
  namespace: truenas-iscsi-monitor
# automountServiceAccountToken=true (the implicit default) is intentional:
# unlike the synology exporter, this one needs the projected SA token to call
# the in-cluster Kubernetes API for the PV->claimRef join. The deployment
# scopes that to a read-only ClusterRole (see rbac.yaml).
