apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      serviceAccountName: hermes
      automountServiceAccountToken: false
      securityContext:
        # Upstream image runs as the `hermes` user, UID 10000. fsGroup ensures
        # the iSCSI-mounted PVC is writable by that user without an init chown.
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hermes
          # nousresearch/hermes-agent:v2026.4.30 (linux/amd64)
          image: nousresearch/hermes-agent@sha256:4f7a906f5baea3a1e5b8e286fb298e6897f013372d52d1faf1e3b67a784881e8
          imagePullPolicy: IfNotPresent
          # Use `args` (not `command`) so the upstream entrypoint chain
          # (tini → uv venv → `hermes`) stays intact. Setting `command`
          # replaces ENTRYPOINT, which strips the venv from PATH and the
          # `hermes` binary becomes unfindable.
          args: ["gateway", "run"]
          envFrom:
            - configMapRef:
                name: hermes-config
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
          # No HTTP listener; readiness/liveness use the hermes process check.
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f 'hermes gateway' > /dev/null"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f 'hermes gateway' > /dev/null"
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: config
          configMap:
            name: hermes-config-yaml
            items:
              - key: config.yaml
                path: config.yaml
