apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:ce9542ff7aa7c5d3f74fe871407864cac08a92f1
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
