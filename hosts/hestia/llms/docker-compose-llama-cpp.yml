# RETIRED 2026-05-09 — vLLM took over port 8000 as the production LLM endpoint.
# This file is preserved as the prior-prod reference; do NOT start this app
# while vllm is running (port 8000 conflict). To roll back to llama.cpp:
#   midclt call app.stop vllm
#   midclt call app.start llama-cpp
# The vllm winner (Qwen3.6-35B-A3B-AWQ-4bit / TP=2 / 160K) and the rationale
# for the cutover are in:
#   docs/research/2026-05-07-vllm-frontier-experiments.md
#   docs/plans/2026-05-07-vllm-frontier-model-experiments.md
# Reference numbers from this config (Phase 0 baseline, 2026-05-04):
#   medium-workload TTFT 0.071 s, decode 173.9 t/s, VRAM peak 22.3 GiB
# vLLM v0.20.1 measurement on the same model family beats this:
#   TTFT 0.090 s, decode 194.3 t/s, plus 626 t/s aggregate at concurrency 8.
services:
  llama:
    image: ghcr.io/gjcourt/llama-cpp-bench:2026-05-04
    container_name: llama
    restart: unless-stopped
    volumes:
      - /mnt/main/ai/models/gguf:/models
    ports:
      - "8000:8080"
    command: >
      -m /models/Qwen3.6-35B-A3B-UD-IQ4_NL.gguf
      --alias Qwen3.6-35B-A3B
      --host 0.0.0.0
      --port 8080
      --ctx-size 262144
      --cache-type-k q8_0
      --cache-type-v q8_0
      --n-gpu-layers 99
      --flash-attn on
      --parallel 1
      --cont-batching
      --ubatch-size 2048
      --threads 12
      --temp 0.6
      --top-k 20
      --top-p 0.95
      --min-p 0
      --presence-penalty 0
      --repeat-penalty 1
      --chat-template-kwargs '{"preserve_thinking":true}'
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
                - utility
              count: all
              driver: nvidia
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
