apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: jellyfin
  # Jellyfin mounts several single-writer PVCs; RollingUpdate can leave the new
  # pod stuck in ContainerCreating until the old pod fully exits.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      serviceAccountName: jellyfin
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin@sha256:1694ff069f0c9dafb283c36765175606866769f5d72f2ed56b6a0f1be922fc37
          ports:
            - containerPort: 8096
              name: http

          env:
            - name: JELLYFIN_FFmpeg__probesize
              value: "50000000"
            - name: JELLYFIN_FFmpeg__analyzeduration
              value: "50000000"
          envFrom:
            - configMapRef:
                name: jellyfin-container-env

          volumeMounts:
            - name: jellyfin-config
              mountPath: /config
            - name: jellyfin-cache
              mountPath: /cache
            - name: dri
              mountPath: /dev/dri
            - name: movies
              mountPath: /media/movies
              readOnly: true
            - name: tvshows
              mountPath: /media/tvshows
              readOnly: true
            - name: tvanime
              mountPath: /media/tv-anime
              readOnly: true

          securityContext:
            privileged: true # Required for GPU access

          # startupProbe gates liveness/readiness until Jellyfin is up.
          # Allows up to 5 minutes for first-run library scans.
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

          # Resource limits - generous for transcoding bursts
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 4Gi
              cpu: 4000m

      volumes:
        - name: jellyfin-config
          persistentVolumeClaim:
            claimName: jellyfin-config-pvc
        - name: jellyfin-cache
          persistentVolumeClaim:
            claimName: jellyfin-cache-pvc
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: movies
          persistentVolumeClaim:
            claimName: jellyfin-movies-pvc
        - name: tvshows
          persistentVolumeClaim:
            claimName: jellyfin-tvshows-pvc
        - name: tvanime
          persistentVolumeClaim:
            claimName: jellyfin-tvanime-pvc
