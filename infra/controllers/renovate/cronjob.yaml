apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "@hourly"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate@sha256:335dc7b3822727477a60768199311044249602b4596e5a6991febb13f5656b2f

              args:
                - gjcourt/homelab
                - gjcourt/llmux
                - gjcourt/tempo-interview
                - gjcourt/drift
                - gjcourt/Pingo
                - gjcourt/golinks
                - gjcourt/vitals
                - gjcourt/soundbyte
                - gjcourt/python-nginx-signing

              envFrom:
                - configMapRef:
                    name: renovate-container-env
                - secretRef:
                    name: secret-renovate-container-env

          restartPolicy: Never
