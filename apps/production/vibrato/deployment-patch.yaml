apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:6ba9f5c02a7e0df8c24e09caff25edad79d556cf
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
