apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: mqttscope
  namespace: mqttscope
  labels:
    app.kubernetes.io/name: mqttscope
    app.kubernetes.io/part-of: network-policies
spec:
  description: |
    MQTT broker health exporter. Ingress: Prometheus scrape on 9103 + host/
    remote-node for kubectl port-forward. Egress: DNS + the in-cluster
    mosquitto broker on 1883.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: mqttscope
  ingress:
    # kubectl port-forward arrives via the kubelet/API path = host + remote-node.
    - fromEntities:
        - host
        - remote-node
        - ingress
      toPorts:
        - ports:
            - port: "9103"
              protocol: TCP
    # Prometheus scrape.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9103"
              protocol: TCP
  egress:
    # DNS.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # The mosquitto broker (ClusterIP path). mosquitto pods carry app: mosquitto
    # in the mosquitto namespace.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: mosquitto
            app: mosquitto
      toPorts:
        - ports:
            - port: "1883"
              protocol: TCP
