apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "@hourly"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate@sha256:ee3128386326065ab62ea5dd2ccfc00e5fe98d1b4c2c57297133e2640d456aa9

              args:
                - gjcourt/homelab
                - gjcourt/llmux
                - gjcourt/tempo-interview
                - gjcourt/drift
                - gjcourt/Pingo
                - gjcourt/golinks
                - gjcourt/vitals
                - gjcourt/soundbyte
                - gjcourt/python-nginx-signing

              envFrom:
                - configMapRef:
                    name: renovate-container-env
                - secretRef:
                    name: secret-renovate-container-env

          restartPolicy: Never
