apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "@hourly"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate@sha256:47421f2f3f82048e969b5195dd808d5ac2c5f69d43d192191c4a3dca390afe06

              args:
                - gjcourt/homelab
                - gjcourt/llmux
                - gjcourt/tempo-interview
                - gjcourt/drift
                - gjcourt/Pingo
                - gjcourt/golinks
                - gjcourt/vitals
                - gjcourt/soundbyte
                - gjcourt/python-nginx-signing

              envFrom:
                - configMapRef:
                    name: renovate-container-env
                - secretRef:
                    name: secret-renovate-container-env

          restartPolicy: Never
