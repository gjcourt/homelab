apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:8db7bee2957b65d50152d0595ada828af0eb99a2
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
