---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: snapcast
  namespace: snapcast
  labels:
    app.kubernetes.io/name: snapcast
    app.kubernetes.io/part-of: network-policies
spec:
  description: Gateway ingress on 1780 (web UI); LAN snapclients on 1704/1705/1780; egress DNS + Spotify HTTPS.
  endpointSelector:
    matchLabels:
      app: snapcast
  ingress:
    - fromEntities:
        - host
        - remote-node
        - ingress
      toPorts:
        - ports:
            - port: "1780"
              protocol: TCP
    # snapclient connections from LAN (HifiBerry devices at .38/.39 and any
    # future client on the compute VLAN). 1704=audio, 1705=control, 1780=MPRIS JSON-RPC.
    - fromCIDR:
        - 10.42.2.0/24
      toPorts:
        - ports:
            - port: "1704"
              protocol: TCP
            - port: "1705"
              protocol: TCP
            - port: "1780"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # go-librespot (Spotify Connect) connects to Spotify's servers over HTTPS.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
