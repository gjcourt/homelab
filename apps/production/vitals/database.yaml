apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vitals-db-production-cnpg-v1
  namespace: vitals-prod
spec:
  description: Postgres cluster for the vitals application (production)
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 3
  inheritedMetadata:
    labels:
      app: vitals-database
      env: production
      policy-type: "database"
  monitoring:
    enablePodMonitor: true
  # Cross-cluster spread: see apps/production/golinks/database.yaml for
  # full rationale. Soft (ScheduleAnyway) balance of CNPG postgres pods
  # across nodes via topologySpreadConstraints.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          policy-type: database
  storage:
    # Actual usage: ~178Mi; rounding to 1Gi for headroom.
    # Requires cluster recreation (CNPG cannot shrink PVCs in-place).
    size: 1Gi
    storageClass: truenas-iscsi
  postgresql:
    parameters:
      # Safety valve against a runaway/inactive replication slot pinning WAL and
      # filling this small 1Gi PVC — the failure mode behind the 2026-07-10 immich
      # incident (stale slots pinned ~13Gi of WAL → CrashLoop + blocked reconcile).
      # Past this cap CNPG invalidates the lagging slot instead of retaining WAL
      # unbounded. Kept conservative (baseline usage + cap stays well under 1Gi).
      # Reloadable GUC (SIGHUP, no restart).
      max_slot_wal_keep_size: "256MB"
  # WAL archiving and base backups via the Barman Cloud Plugin (v0.11.0).
  # S3 configuration is defined in objectstore.yaml (ObjectStore CRD).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: vitals-db-production-cnpg-v1-backup
        serverName: vitals-db-production-cnpg-v1
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: vitals-db-credentials
  # externalClusters references the ObjectStore via the plugin for PITR/restore.
  externalClusters:
    - name: vitals-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: vitals-db-production-cnpg-v1-backup
          serverName: vitals-db-production-cnpg-v1
