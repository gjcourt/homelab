apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibrato
  namespace: vibrato
spec:
  template:
    spec:
      containers:
        - name: vibrato
          image: ghcr.io/gjcourt/vibrato:43ad0afa0d4d6d5d71269d1d3343d13bdc4e55c8
          env:
            - name: LEVA_NODE_ID
              value: "espresso"
