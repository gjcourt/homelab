apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - namespace.yaml
  - networkpolicy.yaml
  - pdb.yaml
  - service.yaml
  - serviceaccount.yaml
  - storage.yaml

# The homeassistant-config ConfigMap is generated from real files on disk so
# Kustomize emits a name-suffixed-by-content-hash (e.g. homeassistant-config-abc123).
# When any input file changes, the hash changes, the deployment's volume reference
# is auto-rewritten by Kustomize, the pod template hash changes, and the
# Deployment rolls. Without this, subPath-mounted ConfigMap updates are silently
# ignored by running pods until something else triggers a restart.
configMapGenerator:
  - name: homeassistant-config
    namespace: homeassistant
    files:
      - configuration.yaml=files/configuration.yaml
      - automations.yaml=files/automations.yaml
      - binary_sensors.yaml=files/binary_sensors.yaml
      # Lovelace dashboards bundled as flat keys (K8s ConfigMap data keys
      # cannot contain `/`). The Deployment mounts each via subPath into
      # /config/dashboards/<name>.yaml so HA finds them at the path declared
      # in lovelace.dashboards.<slug>.filename.
      - dashboards_control.yaml=files/dashboards/control.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: homeassistant
      app.kubernetes.io/component: web
      app.kubernetes.io/part-of: homelab
      app.kubernetes.io/managed-by: flux
