x-deploy:
  # Archived 2026-05-16 — GPUs removed from hestia. nvtop has nothing to
  # report. Flip `archived: false` to re-activate when GPUs return.
  archived: true
  archived-at: 2026-05-16
  archived-reason: GPUs sold from hestia

services:
  nvtop:
    image: onmoon/nvtop
    container_name: nvtop
    stdin_open: true
    tty: true
    pid: host
    privileged: true
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
                - utility
              count: all
              driver: nvidia
