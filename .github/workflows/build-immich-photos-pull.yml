name: Build immich-photos-pull

on:
  push:
    branches: [master]
    paths:
      - 'images/immich-photos-pull/**'
      - '.github/workflows/build-immich-photos-pull.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gjcourt/immich-photos-pull

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Mirrors the YYYY-MM-DD / YYYY-MM-DD-N convention in AGENTS.md and the
      # immich-photos-backup / homelabscope-heartbeat workflows.
      - name: Generate date tag
        id: tag
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ATTEMPT="${{ github.run_attempt }}"
          if [ "$ATTEMPT" = "1" ]; then
            echo "tag=$DATE" >> $GITHUB_OUTPUT
          else
            echo "tag=$DATE-$ATTEMPT" >> $GITHUB_OUTPUT
          fi

      # NOTE: platforms is linux/amd64 (matches images/immich-photos-backup). If
      # alcatraz turns out to be aarch64 (plan prerequisite P3), add linux/arm64
      # here so the pulled image has a matching arch — otherwise the alcatraz
      # runner's `docker compose pull` fails clearly on arch mismatch.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: images/immich-photos-pull
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### immich-photos-pull published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pin the digest in \`hosts/alcatraz/immich-photos-pull/docker-compose.yml\` and flip \`x-deploy.archived\` to false in a follow-up PR." >> $GITHUB_STEP_SUMMARY
