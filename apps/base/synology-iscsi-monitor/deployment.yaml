apiVersion: apps/v1
kind: Deployment
metadata:
  name: synology-iscsi-exporter
  namespace: synology-iscsi-monitor
  labels:
    app: synology-iscsi-exporter
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: synology-iscsi-exporter
  template:
    metadata:
      labels:
        app: synology-iscsi-exporter
    spec:
      serviceAccountName: synology-iscsi-monitor
      automountServiceAccountToken: false
      # The python:3.14-slim base image has no USER directive and runs as
      # root by default; pinning the pod to UID 1000 with fsGroup is
      # intentional. The exporter only ever talks to the Synology over SSH
      # and serves Prometheus metrics — it has no on-disk state.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          # python 3.14-slim
          image: python@sha256:0ba001803c72c128063cfa88863755f905cefabe73c026c66a5a86d8f1d63e98
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --user paramiko prometheus_client && python /app/exporter.py
          env:
            # HOME=/tmp lets `pip install --user` and paramiko (which writes
            # ~/.ssh/known_hosts via AutoAddPolicy) work under
            # readOnlyRootFilesystem — the /tmp emptyDir below is the
            # writable target for both.
            - name: HOME
              value: "/tmp"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SYNOLOGY_IP
              value: "10.42.2.11"
            - name: SYNOLOGY_USER
              value: "melodic-muse-app"
            - name: SYNOLOGY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: synology-secret
                  key: password
          ports:
            - containerPort: 8000
              name: metrics
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            # The exporter installs paramiko/prometheus_client via pip on
            # startup before listening, so allow a generous initial delay.
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: script-volume
              mountPath: /app
            # `pip install --user` writes to $HOME/.local and paramiko writes
            # ~/.ssh/known_hosts; both resolve under HOME=/tmp. Required when
            # readOnlyRootFilesystem is enabled.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: script-volume
          configMap:
            name: synology-iscsi-exporter-script
        - name: tmp
          emptyDir: {}
