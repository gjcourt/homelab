apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-automerge-script
  namespace: renovate
data:
  automerge.py: |
    #!/usr/bin/env python3
    """
    Renovate automerge: merges digest/patch-only Renovate PRs with passing CI.
    Covers all repos listed in GITHUB_REPOS (comma-separated).
    Non-safe PRs are reported by email to EMAIL_TO.
    """
    import json
    import os
    import re
    import smtplib
    import sys
    import urllib.request
    import urllib.error
    from datetime import datetime, timezone
    from email.mime.multipart import MIMEMultipart
    from email.mime.text import MIMEText

    GITHUB_TOKEN = os.environ["GITHUB_TOKEN"]
    EMAIL_TO     = os.environ.get("EMAIL_TO", "gjcourt@gmail.com")
    SMTP_HOST    = os.environ.get("SMTP_HOST", "smtp.gmail.com")
    SMTP_PORT    = int(os.environ.get("SMTP_PORT", "587"))
    SMTP_USER    = os.environ["SMTP_USER"]
    SMTP_PASS    = os.environ["SMTP_PASS"]

    _repos_env = os.environ.get("GITHUB_REPOS") or os.environ.get("GITHUB_REPO", "gjcourt/homelab")
    REPOS = [r.strip() for r in _repos_env.split(",") if r.strip()]


    def gh(path, method="GET", body=None):
        url = "https://api.github.com" + path
        data = json.dumps(body).encode() if body else None
        req = urllib.request.Request(url, data=data, method=method)
        req.add_header("Authorization", f"token {GITHUB_TOKEN}")
        req.add_header("Accept", "application/vnd.github.v3+json")
        req.add_header("Content-Type", "application/json")
        with urllib.request.urlopen(req) as resp:
            return json.loads(resp.read())


    def is_renovate_pr(pr):
        return (
            pr["title"].startswith("chore(deps):")
            or "renovate" in pr["user"]["login"].lower()
        )


    def classify_pr(pr):
        """Return (safe: bool, reason: str) based on title and PR body."""
        title = pr["title"].lower()

        # Digest pins are always safe — content-addressed, same logical version.
        if "digest" in title:
            return True, "digest pin"

        # Renovate includes an update-type column in its PR body table.
        # Values: digest, pinDigest, pin, patch, minor, major, rollback
        body = pr.get("body") or ""
        types = re.findall(
            r"\|\s*(major|minor|patch|digest|pin|pinDigest|rollback)\s*\|",
            body,
            re.IGNORECASE,
        )
        if types:
            kinds = {t.lower() for t in types}
            if kinds <= {"patch", "digest", "pin", "pindigest"}:
                return True, "update type: " + ", ".join(sorted(kinds))
            return False, "update type: " + ", ".join(sorted(kinds))

        # Fallback: parse two version strings from title and compare.
        versions = re.findall(r"\d+\.\d+(?:\.\d+)*", pr["title"])
        if len(versions) >= 2:
            a = [int(x) for x in versions[0].split(".")]
            b = [int(x) for x in versions[-1].split(".")]
            while len(a) < 3:
                a.append(0)
            while len(b) < 3:
                b.append(0)
            if a[0] != b[0]:
                return False, f"major bump ({versions[0]} -> {versions[-1]})"
            if a[1] != b[1]:
                return False, f"minor bump ({versions[0]} -> {versions[-1]})"
            return True, f"patch bump ({versions[0]} -> {versions[-1]})"

        return False, "cannot determine update type"


    def ci_passing(repo, pr):
        """True only when every completed check has succeeded."""
        sha = pr["head"]["sha"]
        try:
            result = gh(f"/repos/{repo}/commits/{sha}/check-runs")
            runs = result.get("check_runs", [])
            if not runs:
                combined = gh(f"/repos/{repo}/commits/{sha}/status")
                state = combined.get("state", "")
                return state in ("success", "pending")
            completed = [r for r in runs if r["status"] == "completed"]
            return all(r["conclusion"] == "success" for r in completed)
        except Exception as exc:
            print(f"    CI check error: {exc}", flush=True)
            return False


    def merge_pr(repo, pr):
        number = pr["number"]
        try:
            gh(
                f"/repos/{repo}/pulls/{number}/merge",
                method="PUT",
                body={"merge_method": "merge", "commit_title": pr["title"]},
            )
            return True
        except urllib.error.HTTPError as exc:
            print(f"    merge failed: {exc.code} {exc.reason}", flush=True)
            return False


    def process_repo(repo):
        prs = gh(f"/repos/{repo}/pulls?state=open&per_page=100")
        renovate = [pr for pr in prs if is_renovate_pr(pr)]
        print(f"  Open PRs: {len(prs)} total, {len(renovate)} from Renovate", flush=True)

        merged, held = [], []
        for pr in renovate:
            print(f"\n  PR #{pr['number']}: {pr['title']}", flush=True)
            safe, reason = classify_pr(pr)
            if not safe:
                print(f"    -> hold: {reason}", flush=True)
                held.append({"pr": pr, "reason": reason})
                continue

            print(f"    -> {reason}, checking CI ...", flush=True)
            if not ci_passing(repo, pr):
                reason += " (CI not passing)"
                print(f"    -> hold: {reason}", flush=True)
                held.append({"pr": pr, "reason": reason})
                continue

            if merge_pr(repo, pr):
                print(f"    -> merged", flush=True)
                merged.append({"pr": pr, "reason": reason})
            else:
                held.append({"pr": pr, "reason": reason + " (merge failed)"})

        return merged, held


    def send_report(results):
        total_merged = sum(len(r["merged"]) for r in results)
        total_held = sum(len(r["held"]) for r in results)

        lines = [
            f"Renovate automerge -- {datetime.now(timezone.utc).strftime('%Y-%m-%d')}",
            "",
        ]
        for r in results:
            if not r["merged"] and not r["held"]:
                continue
            lines.append(f"── {r['repo']} ──")
            if r["merged"]:
                lines.append(f"  Merged ({len(r['merged'])}):")
                for item in r["merged"]:
                    pr = item["pr"]
                    lines.append(f"    #{pr['number']}: {pr['title']}")
                    lines.append(f"      ({item['reason']})")
            if r["held"]:
                lines.append(f"  Needs review ({len(r['held'])}):")
                for item in r["held"]:
                    pr = item["pr"]
                    lines.append(f"    #{pr['number']}: {pr['title']}")
                    lines.append(f"      https://github.com/{r['repo']}/pull/{pr['number']}")
                    lines.append(f"      ({item['reason']})")
            lines.append("")

        body = "\n".join(lines)
        subject = f"[renovate] {total_merged} merged, {total_held} pending review"
        msg = MIMEMultipart("alternative")
        msg["Subject"] = subject
        msg["From"] = SMTP_USER
        msg["To"] = EMAIL_TO
        msg.attach(MIMEText(body, "plain"))

        with smtplib.SMTP(SMTP_HOST, SMTP_PORT) as server:
            server.ehlo()
            server.starttls()
            server.login(SMTP_USER, SMTP_PASS)
            server.sendmail(SMTP_USER, EMAIL_TO, msg.as_string())
        print("Email sent.", flush=True)


    def main():
        run_at = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
        print(f"renovate-automerge {run_at}  repos={','.join(REPOS)}", flush=True)

        results = []
        for repo in REPOS:
            print(f"\n=== {repo} ===", flush=True)
            merged, held = process_repo(repo)
            results.append({"repo": repo, "merged": merged, "held": held})
            print(f"  -> {len(merged)} merged, {len(held)} held", flush=True)

        total_merged = sum(len(r["merged"]) for r in results)
        total_held = sum(len(r["held"]) for r in results)
        print(f"\nTotal: {total_merged} merged, {total_held} held.", flush=True)

        if total_merged or total_held:
            try:
                send_report(results)
            except Exception as exc:
                # Email is best-effort notification; don't fail the job over it.
                # The merge/hold decisions above already completed successfully.
                print(f"Email failed (non-fatal): {exc}", file=sys.stderr, flush=True)


    if __name__ == "__main__":
        main()
