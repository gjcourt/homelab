apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: linkding-db-staging-cnpg-v1
  namespace: linkding-stage

spec:
  description: Postgres cluster for the linkding application
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5

  instances: 1

  inheritedMetadata:
    labels:
      app: linkding-database
      env: staging
      policy-type: "database"

  monitoring:
    enablePodMonitor: true

  # Cross-cluster spread: see apps/production/golinks/database.yaml for
  # full rationale. Soft (ScheduleAnyway) balance of CNPG postgres pods
  # across nodes via topologySpreadConstraints.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          policy-type: database

  storage:
    storageClass: truenas-iscsi
    size: 2Gi

  # Bootstrap from backup if available, otherwise initialize fresh
  # To restore: uncomment recovery section and comment out initdb
  # NOTE: Recovery requires a base backup in S3 (not just WALs)
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: linkding-db-credentials
        # recovery:
        #   source: linkding-db-backup
