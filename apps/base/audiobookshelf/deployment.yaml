apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
  labels:
    app: audiobookshelf
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: audiobookshelf
  # Single-replica Deployment with RWO PVCs: force old pod deletion before the
  # replacement is created to avoid volume attach deadlocks during rollouts.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      serviceAccountName: audiobookshelf
      automountServiceAccountToken: false
      # The upstream advplyr/audiobookshelf image has no USER directive (runs
      # as root by default); we pin it to a non-root UID 1000 here. CONFIG_PATH
      # and METADATA_PATH are overridden via configmap to point at PVC mounts
      # owned by this UID via fsGroup.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - image: ghcr.io/advplyr/audiobookshelf@sha256:4143292c530f6ac6700afd13360c04f477e4f1a81c1c97c4224b1c7e4330c5c4
          name: audiobookshelf
          ports:
            - containerPort: 13378
          envFrom:
            - configMapRef:
                name: audiobookshelf-container-env
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 13378
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: audiobookshelf-data
              mountPath: /usr/share/audiobookshelf/config
            - name: audiobookshelf-meta-data
              mountPath: /usr/share/audiobookshelf/metadata
            # ffmpeg / Node write temp output (transcodes, intermediate
            # thumbnails) under /tmp; required when readOnlyRootFilesystem is
            # enabled.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: audiobookshelf-data
          persistentVolumeClaim:
            claimName: audiobookshelf-data-pvc
        - name: audiobookshelf-meta-data
          persistentVolumeClaim:
            claimName: audiobookshelf-meta-data-pvc
        - name: tmp
          emptyDir: {}
