apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes-prod
resources:
  - ../../base/hermes/

labels:
  - pairs:
      env: production
      app.kubernetes.io/instance: production
    includeSelectors: false

patches:
  - target:
      kind: Namespace
      name: hermes
    patch: |
      - op: replace
        path: /metadata/name
        value: hermes-prod
