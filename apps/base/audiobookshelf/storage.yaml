apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-data-pvc
  namespace: audiobookshelf
  labels:
    app: audiobookshelf
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Actual usage: ~6Mi; minimum LUN size on Synology iSCSI is 1Gi.
      # Requires PVC deletion to take effect (PVCs cannot shrink in-place).
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-meta-data-pvc
  namespace: audiobookshelf
  labels:
    app: audiobookshelf
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Actual usage: ~6Mi; minimum LUN size on Synology iSCSI is 1Gi.
      # Requires PVC deletion to take effect (PVCs cannot shrink in-place).
      storage: 1Gi
