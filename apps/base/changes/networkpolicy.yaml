---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: changes
  namespace: changes
  labels:
    app.kubernetes.io/name: changes
    app.kubernetes.io/part-of: network-policies
spec:
  description: Gateway ingress on 8080; egress DNS only (corpus is embedded, no DB).
  endpointSelector:
    matchLabels:
      app: changes
  ingress:
    - fromEntities:
        - host
        - remote-node
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
