apiVersion: apps/v1
kind: Deployment
metadata:
  name: memos
  namespace: memos
spec:
  template:
    spec:
      # Authelia OIDC issuerUrl must resolve from within the pod.
      # AdGuard DNS rewrites are not visible to CoreDNS, so we add
      # a hostAlias pointing at the production gateway.
      hostAliases:
        - ip: "10.42.2.40"
          hostnames:
            - auth.burntbytes.com
      initContainers:
        - name: init-dsn
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "postgresql://${MEMOS_DB_USER}:${MEMOS_DB_PASSWORD}@${MEMOS_DB_HOST}:${MEMOS_DB_PORT}/${MEMOS_DB_NAME}?sslmode=require" > /dsn/MEMOS_DSN
          envFrom:
            - configMapRef:
                name: memos-container-env
          env:
            - name: MEMOS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: memos-db-credentials
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # Small but non-zero so the pod stays Burstable (not BestEffort)
          # alongside the main container's requests/limits. Plan PR 2.1.
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: dsn-volume
              mountPath: /dsn
      containers:
        - name: memos
          env:
            - name: MEMOS_DSN
              value: ""
          command:
            - sh
            - -c
            - |
              export MEMOS_DSN=$(cat /dsn/MEMOS_DSN)
              exec /usr/local/memos/memos
          volumeMounts:
            - name: dsn-volume
              mountPath: /dsn
      volumes:
        - name: dsn-volume
          emptyDir: {}
