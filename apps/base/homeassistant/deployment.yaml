apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app: homeassistant
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: homeassistant
  # Home Assistant uses a single RWO config PVC. RollingUpdate can wedge the
  # rollout with one old pod still holding the volume and one new pod pending.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      serviceAccountName: homeassistant
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-files
          image: busybox@sha256:32015ee641bfecc97161986c9d24957068175444f66fbcbe08a664b6cf5c1c2e
          # Write an empty YAML list for each include file if it doesn't already exist
          # or is empty (0 bytes). A bare touch creates a 0-byte file which HA refuses
          # to parse as a list, causing it to enter recovery mode and drop trusted_proxies.
          command:
            - sh
            - -c
            - |
              for f in /config/automations.yaml /config/scripts.yaml /config/scenes.yaml; do
                [ ! -s "$f" ] && printf '[]' > "$f"
              done
              true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # Tiny budget so the pod stays Burstable alongside the main
          # container. Closes the init-container portion of finding #7
          # (docs/plans/2026-05-02-critique-remediation.md).
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - image: ghcr.io/home-assistant/home-assistant:2026.5.4@sha256:ceb1202133a5a036e8b03e20a10eb113186cc2f871968323c6fc6c3fc4205716
          name: homeassistant
          ports:
            - containerPort: 8123
          readinessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-file
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
            - name: config-file
              mountPath: /config/binary_sensors.yaml
              subPath: binary_sensors.yaml
            - name: config-file
              mountPath: /config/automations.yaml
              subPath: automations.yaml
            # Lovelace YAML-mode dashboards. ConfigMap data keys cannot
            # contain `/`, so the dashboard file is stored as a flat key
            # (dashboards_control.yaml) and subPath-mounted into the
            # /config/dashboards/ directory HA expects.
            - name: config-file
              mountPath: /config/dashboards/control.yaml
              subPath: dashboards_control.yaml
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homeassistant-config-pvc
        - name: config-file
          configMap:
            name: homeassistant-config
